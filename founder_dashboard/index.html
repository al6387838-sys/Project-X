<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080810" />
  <meta name="description" content="LifeOS — Founder Dashboard V1. Painel exclusivo de administração da plataforma." />
  <title>LifeOS — Founder Dashboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Design System (referenciando o existente) -->
  <link rel="stylesheet" href="../premium_ui/design_system/variables.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    /* ============================================================
       FOUNDER DASHBOARD — CORE STYLES
       ============================================================ */

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-primary, #F1F5F9);
      background-color: var(--bg-base, #080810);
      min-height: 100vh;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.5); }

    /* ============================================================
       KEYFRAMES
       ============================================================ */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(99,102,241,0.2), 0 0 40px rgba(99,102,241,0.08); }
      50%       { box-shadow: 0 0 40px rgba(99,102,241,0.45), 0 0 80px rgba(99,102,241,0.18); }
    }
    @keyframes shimmer {
      0%   { background-position: -400% 0; }
      100% { background-position: 400% 0; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes countUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes borderGlow {
      0%, 100% { border-color: rgba(99,102,241,0.25); }
      50%       { border-color: rgba(99,102,241,0.7); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ============================================================
       APP SHELL
       ============================================================ */
    .app-shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: #080810;
    }

    /* ============================================================
       SIDEBAR
       ============================================================ */
    .sidebar {
      width: 240px;
      height: 100vh;
      background: #0D0D1A;
      border-right: 1px solid rgba(99,102,241,0.12);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 50;
      position: relative;
    }

    .sidebar.collapsed { width: 64px; }

    .sidebar-header {
      padding: 20px 16px 16px;
      border-bottom: 1px solid rgba(99,102,241,0.08);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-weight: 800;
      font-size: 14px;
      color: #fff;
      letter-spacing: -0.5px;
      animation: glowPulse 3s ease-in-out infinite;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: opacity 0.2s, width 0.3s;
    }

    .sidebar.collapsed .logo-text { opacity: 0; width: 0; }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: #F1F5F9;
      letter-spacing: -0.3px;
      white-space: nowrap;
    }

    .logo-badge {
      font-size: 9px;
      font-weight: 600;
      color: #6366F1;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-section-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(148,163,184,0.5);
      padding: 8px 8px 4px;
      white-space: nowrap;
      overflow: hidden;
      transition: opacity 0.2s;
    }

    .sidebar.collapsed .nav-section-label { opacity: 0; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
      overflow: hidden;
      white-space: nowrap;
      border: 1px solid transparent;
      text-decoration: none;
      color: rgba(148,163,184,0.8);
    }

    .nav-item:hover {
      background: rgba(99,102,241,0.08);
      color: #A5B4FC;
      border-color: rgba(99,102,241,0.12);
    }

    .nav-item.active {
      background: rgba(99,102,241,0.15);
      color: #818CF8;
      border-color: rgba(99,102,241,0.25);
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: #6366F1;
      border-radius: 0 3px 3px 0;
    }

    .nav-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-icon svg { width: 16px; height: 16px; }

    .nav-label {
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.2s;
      flex: 1;
    }

    .sidebar.collapsed .nav-label { opacity: 0; width: 0; overflow: hidden; }

    .nav-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 99px;
      background: rgba(99,102,241,0.2);
      color: #818CF8;
      transition: opacity 0.2s;
    }

    .nav-badge.danger { background: rgba(244,63,94,0.2); color: #FB7185; }
    .nav-badge.success { background: rgba(16,185,129,0.2); color: #34D399; }
    .nav-badge.warning { background: rgba(245,158,11,0.2); color: #FBBF24; }

    .sidebar.collapsed .nav-badge { opacity: 0; }

    .sidebar-footer {
      padding: 12px 8px;
      border-top: 1px solid rgba(99,102,241,0.08);
      flex-shrink: 0;
    }

    .founder-profile {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .founder-profile:hover { background: rgba(99,102,241,0.08); }

    .founder-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      border: 2px solid rgba(99,102,241,0.4);
    }

    .founder-info {
      overflow: hidden;
      transition: opacity 0.2s;
    }

    .sidebar.collapsed .founder-info { opacity: 0; width: 0; }

    .founder-name {
      font-size: 12px;
      font-weight: 600;
      color: #F1F5F9;
      white-space: nowrap;
    }

    .founder-role {
      font-size: 10px;
      color: rgba(148,163,184,0.6);
      white-space: nowrap;
    }

    .sidebar-toggle {
      position: absolute;
      right: -12px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #1A1A2E;
      border: 1px solid rgba(99,102,241,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 60;
      transition: all 0.2s;
      color: rgba(148,163,184,0.7);
    }

    .sidebar-toggle:hover {
      background: rgba(99,102,241,0.2);
      color: #818CF8;
      border-color: rgba(99,102,241,0.5);
    }

    .sidebar-toggle svg { width: 12px; height: 12px; }

    /* ============================================================
       MAIN CONTENT
       ============================================================ */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #080810;
    }

    /* ============================================================
       TOP BAR
       ============================================================ */
    .topbar {
      height: 56px;
      background: rgba(13,13,26,0.95);
      border-bottom: 1px solid rgba(99,102,241,0.1);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      flex-shrink: 0;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .topbar-breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }

    .breadcrumb-item {
      font-size: 13px;
      color: rgba(148,163,184,0.6);
    }

    .breadcrumb-item.current {
      color: #F1F5F9;
      font-weight: 600;
    }

    .breadcrumb-sep {
      color: rgba(148,163,184,0.3);
      font-size: 12px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topbar-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid rgba(99,102,241,0.15);
      background: rgba(99,102,241,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      color: rgba(148,163,184,0.7);
      position: relative;
    }

    .topbar-btn:hover {
      background: rgba(99,102,241,0.15);
      border-color: rgba(99,102,241,0.35);
      color: #818CF8;
    }

    .topbar-btn svg { width: 15px; height: 15px; }

    .alert-dot {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #F43F5E;
      border: 1.5px solid #080810;
      animation: pulse-dot 1.5s ease-in-out infinite;
    }

    .topbar-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: rgba(148,163,184,0.5);
      padding: 0 8px;
      border-left: 1px solid rgba(99,102,241,0.1);
    }

    .system-status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 99px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.2);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #10B981;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .status-text {
      font-size: 11px;
      font-weight: 600;
      color: #34D399;
      letter-spacing: 0.3px;
    }

    /* ============================================================
       PAGE CONTENT
       ============================================================ */
    .page-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 24px;
    }

    /* ============================================================
       SECTIONS (PANELS)
       ============================================================ */
    .dashboard-section {
      display: none;
      animation: fadeInUp 0.3s ease forwards;
    }

    .dashboard-section.active { display: block; }

    /* ============================================================
       PAGE HEADER
       ============================================================ */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
    }

    .page-title-group {}

    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: #F1F5F9;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 13px;
      color: rgba(148,163,184,0.6);
    }

    .page-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .btn svg { width: 13px; height: 13px; }

    .btn-primary {
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
      color: #fff;
      border-color: rgba(99,102,241,0.5);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99,102,241,0.35);
    }

    .btn-secondary {
      background: rgba(99,102,241,0.1);
      color: #818CF8;
      border-color: rgba(99,102,241,0.2);
    }

    .btn-secondary:hover {
      background: rgba(99,102,241,0.18);
      border-color: rgba(99,102,241,0.35);
    }

    .btn-ghost {
      background: transparent;
      color: rgba(148,163,184,0.7);
      border-color: rgba(99,102,241,0.12);
    }

    .btn-ghost:hover {
      background: rgba(99,102,241,0.08);
      color: #818CF8;
    }

    /* ============================================================
       GRID LAYOUTS
       ============================================================ */
    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .grid-2-1 {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .grid-1-2 {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .grid-3-2 {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    /* ============================================================
       CARDS
       ============================================================ */
    .card {
      background: #0D0D1A;
      border: 1px solid rgba(99,102,241,0.1);
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover {
      border-color: rgba(99,102,241,0.22);
    }

    .card-glass {
      background: rgba(13,13,26,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(99,102,241,0.12);
      border-radius: 12px;
      padding: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(148,163,184,0.8);
      letter-spacing: 0.2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-title svg { width: 14px; height: 14px; color: #6366F1; }

    .card-action {
      font-size: 11px;
      color: #6366F1;
      cursor: pointer;
      font-weight: 500;
      transition: color 0.15s;
    }

    .card-action:hover { color: #818CF8; }

    /* ============================================================
       METRIC CARDS (KPI)
       ============================================================ */
    .metric-card {
      background: #0D0D1A;
      border: 1px solid rgba(99,102,241,0.1);
      border-radius: 12px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
      transition: all 0.2s;
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--metric-color, #6366F1), transparent);
      opacity: 0.6;
    }

    .metric-card:hover {
      border-color: rgba(99,102,241,0.25);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .metric-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .metric-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(148,163,184,0.6);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .metric-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(99,102,241,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--metric-color, #6366F1);
    }

    .metric-icon svg { width: 15px; height: 15px; }

    .metric-value {
      font-size: 26px;
      font-weight: 800;
      color: #F1F5F9;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 8px;
      animation: countUp 0.5s ease forwards;
    }

    .metric-value span {
      font-size: 14px;
      font-weight: 500;
      color: rgba(148,163,184,0.5);
      letter-spacing: 0;
    }

    .metric-footer {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .metric-trend {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 99px;
    }

    .metric-trend.up {
      background: rgba(16,185,129,0.12);
      color: #34D399;
    }

    .metric-trend.down {
      background: rgba(244,63,94,0.12);
      color: #FB7185;
    }

    .metric-trend.neutral {
      background: rgba(245,158,11,0.12);
      color: #FBBF24;
    }

    .metric-trend svg { width: 10px; height: 10px; }

    .metric-period {
      font-size: 11px;
      color: rgba(148,163,184,0.4);
    }

    /* ============================================================
       STATUS BADGES
       ============================================================ */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }

    .badge-success {
      background: rgba(16,185,129,0.12);
      color: #34D399;
      border: 1px solid rgba(16,185,129,0.2);
    }

    .badge-success .badge-dot { background: #10B981; animation: pulse-dot 2s infinite; }

    .badge-warning {
      background: rgba(245,158,11,0.12);
      color: #FBBF24;
      border: 1px solid rgba(245,158,11,0.2);
    }

    .badge-warning .badge-dot { background: #F59E0B; animation: pulse-dot 2s infinite; }

    .badge-danger {
      background: rgba(244,63,94,0.12);
      color: #FB7185;
      border: 1px solid rgba(244,63,94,0.2);
    }

    .badge-danger .badge-dot { background: #F43F5E; animation: pulse-dot 1.5s infinite; }

    .badge-info {
      background: rgba(59,130,246,0.12);
      color: #60A5FA;
      border: 1px solid rgba(59,130,246,0.2);
    }

    .badge-neutral {
      background: rgba(99,102,241,0.1);
      color: #818CF8;
      border: 1px solid rgba(99,102,241,0.2);
    }

    /* ============================================================
       PROGRESS BAR
       ============================================================ */
    .progress-bar {
      height: 6px;
      background: rgba(99,102,241,0.1);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #6366F1, #8B5CF6);
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-fill.success { background: linear-gradient(90deg, #10B981, #34D399); }
    .progress-fill.warning { background: linear-gradient(90deg, #F59E0B, #FBBF24); }
    .progress-fill.danger  { background: linear-gradient(90deg, #F43F5E, #FB7185); }

    /* ============================================================
       TABLE
       ============================================================ */
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table th {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: rgba(148,163,184,0.5);
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid rgba(99,102,241,0.08);
    }

    .data-table td {
      font-size: 13px;
      color: rgba(241,245,249,0.85);
      padding: 10px 12px;
      border-bottom: 1px solid rgba(99,102,241,0.05);
    }

    .data-table tr:last-child td { border-bottom: none; }

    .data-table tr:hover td { background: rgba(99,102,241,0.04); }

    /* ============================================================
       CHART CONTAINER
       ============================================================ */
    .chart-container {
      position: relative;
      width: 100%;
    }

    /* ============================================================
       TIMELINE / LOG ITEMS
       ============================================================ */
    .log-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .log-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(99,102,241,0.04);
      border: 1px solid rgba(99,102,241,0.07);
      transition: background 0.15s;
    }

    .log-item:hover { background: rgba(99,102,241,0.08); }

    .log-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .log-dot.success { background: #10B981; }
    .log-dot.warning { background: #F59E0B; }
    .log-dot.danger  { background: #F43F5E; }
    .log-dot.info    { background: #3B82F6; }
    .log-dot.neutral { background: #6366F1; }

    .log-content { flex: 1; }

    .log-title {
      font-size: 12px;
      font-weight: 500;
      color: #F1F5F9;
      margin-bottom: 2px;
    }

    .log-meta {
      font-size: 11px;
      color: rgba(148,163,184,0.5);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ============================================================
       ROADMAP ITEMS
       ============================================================ */
    .roadmap-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(99,102,241,0.06);
    }

    .roadmap-item:last-child { border-bottom: none; }

    .roadmap-phase-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
      min-width: 60px;
      text-align: center;
    }

    .roadmap-phase-badge.done {
      background: rgba(16,185,129,0.15);
      color: #34D399;
      border: 1px solid rgba(16,185,129,0.25);
    }

    .roadmap-phase-badge.active {
      background: rgba(99,102,241,0.15);
      color: #818CF8;
      border: 1px solid rgba(99,102,241,0.3);
      animation: borderGlow 2s ease-in-out infinite;
    }

    .roadmap-phase-badge.planned {
      background: rgba(148,163,184,0.08);
      color: rgba(148,163,184,0.5);
      border: 1px solid rgba(148,163,184,0.12);
    }

    .roadmap-info { flex: 1; }

    .roadmap-title {
      font-size: 13px;
      font-weight: 600;
      color: #F1F5F9;
      margin-bottom: 2px;
    }

    .roadmap-desc {
      font-size: 11px;
      color: rgba(148,163,184,0.5);
    }

    /* ============================================================
       OKR ITEMS
       ============================================================ */
    .okr-item {
      padding: 14px 0;
      border-bottom: 1px solid rgba(99,102,241,0.06);
    }

    .okr-item:last-child { border-bottom: none; }

    .okr-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .okr-title {
      font-size: 13px;
      font-weight: 600;
      color: #F1F5F9;
    }

    .okr-progress-text {
      font-size: 12px;
      font-weight: 700;
      color: #818CF8;
    }

    .okr-desc {
      font-size: 11px;
      color: rgba(148,163,184,0.5);
      margin-bottom: 8px;
    }

    /* ============================================================
       ALERT ITEMS
       ============================================================ */
    .alert-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 8px;
      border: 1px solid;
    }

    .alert-item.critical {
      background: rgba(244,63,94,0.06);
      border-color: rgba(244,63,94,0.2);
    }

    .alert-item.warning {
      background: rgba(245,158,11,0.06);
      border-color: rgba(245,158,11,0.2);
    }

    .alert-item.info {
      background: rgba(59,130,246,0.06);
      border-color: rgba(59,130,246,0.2);
    }

    .alert-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .alert-icon svg { width: 14px; height: 14px; }

    .alert-item.critical .alert-icon { background: rgba(244,63,94,0.15); color: #FB7185; }
    .alert-item.warning  .alert-icon { background: rgba(245,158,11,0.15); color: #FBBF24; }
    .alert-item.info     .alert-icon { background: rgba(59,130,246,0.15); color: #60A5FA; }

    .alert-content { flex: 1; }

    .alert-title {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .alert-item.critical .alert-title { color: #FB7185; }
    .alert-item.warning  .alert-title { color: #FBBF24; }
    .alert-item.info     .alert-title { color: #60A5FA; }

    .alert-desc {
      font-size: 11px;
      color: rgba(148,163,184,0.6);
    }

    .alert-time {
      font-size: 10px;
      color: rgba(148,163,184,0.4);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    /* ============================================================
       FEATURE LIST
       ============================================================ */
    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(99,102,241,0.05);
    }

    .feature-item:last-child { border-bottom: none; }

    .feature-check {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .feature-check.done { background: rgba(16,185,129,0.15); color: #34D399; }
    .feature-check.wip  { background: rgba(99,102,241,0.15); color: #818CF8; }
    .feature-check.todo { background: rgba(148,163,184,0.08); color: rgba(148,163,184,0.3); }

    .feature-check svg { width: 10px; height: 10px; }

    .feature-name {
      flex: 1;
      font-size: 12px;
      color: rgba(241,245,249,0.8);
    }

    .feature-name.done { text-decoration: line-through; color: rgba(148,163,184,0.4); }

    .feature-tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .feature-tag.core { background: rgba(99,102,241,0.12); color: #818CF8; }
    .feature-tag.ai   { background: rgba(139,92,246,0.12); color: #A78BFA; }
    .feature-tag.ux   { background: rgba(59,130,246,0.12); color: #60A5FA; }
    .feature-tag.infra { background: rgba(16,185,129,0.12); color: #34D399; }

    /* ============================================================
       COMPANION STATUS
       ============================================================ */
    .companion-orb {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #818CF8, #6366F1 50%, #4338CA);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      box-shadow: 0 0 30px rgba(99,102,241,0.35), 0 0 60px rgba(99,102,241,0.15);
      animation: glowPulse 3s ease-in-out infinite;
      position: relative;
    }

    .companion-orb::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid rgba(99,102,241,0.3);
      animation: spin 8s linear infinite;
      border-top-color: #818CF8;
    }

    .companion-orb svg { width: 32px; height: 32px; color: #fff; }

    .companion-status-card {
      text-align: center;
    }

    .companion-name {
      font-size: 16px;
      font-weight: 700;
      color: #F1F5F9;
      margin-bottom: 4px;
    }

    .companion-model {
      font-size: 11px;
      color: rgba(148,163,184,0.5);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 12px;
    }

    /* ============================================================
       SECURITY SCORE
       ============================================================ */
    .security-score-ring {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 12px;
    }

    .security-score-ring svg { transform: rotate(-90deg); }

    .security-score-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .security-score-value {
      font-size: 22px;
      font-weight: 800;
      color: #F1F5F9;
      line-height: 1;
    }

    .security-score-label {
      font-size: 9px;
      color: rgba(148,163,184,0.5);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ============================================================
       MINI SPARKLINE
       ============================================================ */
    .sparkline-container {
      height: 40px;
      position: relative;
    }

    /* ============================================================
       DIVIDER
       ============================================================ */
    .divider {
      height: 1px;
      background: rgba(99,102,241,0.08);
      margin: 16px 0;
    }

    /* ============================================================
       SECTION TITLE (within card)
       ============================================================ */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(148,163,184,0.4);
      margin-bottom: 12px;
    }

    /* ============================================================
       STAT ROW
       ============================================================ */
    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(99,102,241,0.05);
    }

    .stat-row:last-child { border-bottom: none; }

    .stat-key {
      font-size: 12px;
      color: rgba(148,163,184,0.6);
    }

    .stat-val {
      font-size: 12px;
      font-weight: 600;
      color: #F1F5F9;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ============================================================
       VERSION BADGE
       ============================================================ */
    .version-display {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: rgba(99,102,241,0.06);
      border: 1px solid rgba(99,102,241,0.15);
      border-radius: 10px;
      margin-bottom: 16px;
    }

    .version-number {
      font-size: 28px;
      font-weight: 800;
      color: #818CF8;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -1px;
    }

    .version-info { flex: 1; }

    .version-name {
      font-size: 13px;
      font-weight: 600;
      color: #F1F5F9;
    }

    .version-date {
      font-size: 11px;
      color: rgba(148,163,184,0.5);
    }

    /* ============================================================
       OVERVIEW OVERVIEW (landing)
       ============================================================ */
    .overview-hero {
      background: linear-gradient(135deg, rgba(99,102,241,0.08) 0%, rgba(139,92,246,0.05) 100%);
      border: 1px solid rgba(99,102,241,0.15);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .overview-hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .overview-hero-title {
      font-size: 18px;
      font-weight: 700;
      color: #F1F5F9;
      margin-bottom: 4px;
    }

    .overview-hero-sub {
      font-size: 13px;
      color: rgba(148,163,184,0.6);
      margin-bottom: 16px;
    }

    .overview-hero-stats {
      display: flex;
      gap: 24px;
    }

    .hero-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hero-stat-value {
      font-size: 20px;
      font-weight: 800;
      color: #F1F5F9;
      letter-spacing: -0.5px;
    }

    .hero-stat-label {
      font-size: 10px;
      color: rgba(148,163,184,0.5);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 1200px) {
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
      .grid-3 { grid-template-columns: repeat(2, 1fr); }
      .grid-2-1, .grid-1-2, .grid-3-2 { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      .sidebar { width: 64px; }
      .sidebar .logo-text,
      .sidebar .nav-label,
      .sidebar .nav-badge,
      .sidebar .nav-section-label,
      .sidebar .founder-info { opacity: 0; width: 0; overflow: hidden; }
      .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
      .page-content { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="app-shell">

  <!-- ============================================================
       SIDEBAR
       ============================================================ -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <div class="logo-mark">L</div>
      <div class="logo-text">
        <span class="logo-name">LifeOS</span>
        <span class="logo-badge">Founder Dashboard</span>
      </div>
    </div>

    <nav class="sidebar-nav">

      <!-- Overview -->
      <div class="nav-section-label">Visão Geral</div>
      <div class="nav-item active" onclick="showSection('overview', this)">
        <div class="nav-icon"><i data-lucide="layout-dashboard"></i></div>
        <span class="nav-label">Overview</span>
      </div>

      <!-- Empresa -->
      <div class="nav-section-label">Empresa</div>
      <div class="nav-item" onclick="showSection('empresa', this)">
        <div class="nav-icon"><i data-lucide="building-2"></i></div>
        <span class="nav-label">Empresa</span>
        <span class="nav-badge success">Live</span>
      </div>

      <!-- Produto -->
      <div class="nav-section-label">Produto</div>
      <div class="nav-item" onclick="showSection('produto', this)">
        <div class="nav-icon"><i data-lucide="package"></i></div>
        <span class="nav-label">Produto</span>
        <span class="nav-badge">v1.0-rc</span>
      </div>

      <!-- IA -->
      <div class="nav-section-label">Inteligência</div>
      <div class="nav-item" onclick="showSection('ia', this)">
        <div class="nav-icon"><i data-lucide="brain-circuit"></i></div>
        <span class="nav-label">IA & Companion</span>
        <span class="nav-badge success">Online</span>
      </div>

      <!-- Plataforma -->
      <div class="nav-section-label">Infraestrutura</div>
      <div class="nav-item" onclick="showSection('plataforma', this)">
        <div class="nav-icon"><i data-lucide="server"></i></div>
        <span class="nav-label">Plataforma</span>
        <span class="nav-badge success">99.9%</span>
      </div>

      <!-- Segurança -->
      <div class="nav-item" onclick="showSection('seguranca', this)">
        <div class="nav-icon"><i data-lucide="shield-check"></i></div>
        <span class="nav-label">Segurança</span>
        <span class="nav-badge warning">2</span>
      </div>

      <!-- CEO -->
      <div class="nav-section-label">Estratégia</div>
      <div class="nav-item" onclick="showSection('ceo', this)">
        <div class="nav-icon"><i data-lucide="target"></i></div>
        <span class="nav-label">CEO View</span>
        <span class="nav-badge">OKRs</span>
      </div>

    </nav>

    <div class="sidebar-footer">
      <div class="founder-profile">
        <div class="founder-avatar">F</div>
        <div class="founder-info">
          <div class="founder-name">Founder</div>
          <div class="founder-role">CEO & Co-Founder</div>
        </div>
      </div>
    </div>

    <button class="sidebar-toggle" onclick="toggleSidebar()" title="Colapsar sidebar">
      <i data-lucide="chevron-left" id="toggle-icon"></i>
    </button>

  </aside>

  <!-- ============================================================
       MAIN CONTENT
       ============================================================ -->
  <div class="main-content">

    <!-- TOP BAR -->
    <header class="topbar">
      <div class="topbar-breadcrumb">
        <span class="breadcrumb-item">LifeOS</span>
        <span class="breadcrumb-sep">/</span>
        <span class="breadcrumb-item current" id="breadcrumb-current">Overview</span>
      </div>
      <div class="topbar-actions">
        <div class="system-status">
          <div class="status-dot"></div>
          <span class="status-text">SISTEMA OPERACIONAL</span>
        </div>
        <button class="topbar-btn" title="Alertas">
          <i data-lucide="bell"></i>
          <span class="alert-dot"></span>
        </button>
        <button class="topbar-btn" title="Atualizar" onclick="refreshData()">
          <i data-lucide="refresh-cw" id="refresh-icon"></i>
        </button>
        <button class="topbar-btn" title="Configurações">
          <i data-lucide="settings"></i>
        </button>
        <div class="topbar-time" id="topbar-time">--:--:--</div>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <div class="page-content" id="page-content">

      <!-- ========================================================
           SECTION: OVERVIEW
           ======================================================== -->
      <div class="dashboard-section active" id="section-overview">
        <!-- Será preenchido pelo JS -->
      </div>

      <!-- ========================================================
           SECTION: EMPRESA
           ======================================================== -->
      <div class="dashboard-section" id="section-empresa">
        <!-- Será preenchido pelo JS -->
      </div>

      <!-- ========================================================
           SECTION: PRODUTO
           ======================================================== -->
      <div class="dashboard-section" id="section-produto">
        <!-- Será preenchido pelo JS -->
      </div>

      <!-- ========================================================
           SECTION: IA
           ======================================================== -->
      <div class="dashboard-section" id="section-ia">
        <!-- Será preenchido pelo JS -->
      </div>

      <!-- ========================================================
           SECTION: PLATAFORMA
           ======================================================== -->
      <div class="dashboard-section" id="section-plataforma">
        <!-- Será preenchido pelo JS -->
      </div>

      <!-- ========================================================
           SECTION: SEGURANÇA
           ======================================================== -->
      <div class="dashboard-section" id="section-seguranca">
        <!-- Será preenchido pelo JS -->
      </div>

      <!-- ========================================================
           SECTION: CEO
           ======================================================== -->
      <div class="dashboard-section" id="section-ceo">
        <!-- Será preenchido pelo JS -->
      </div>

    </div>
  </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
