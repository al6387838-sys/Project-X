<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Redefinir Senha — LifeOS Enterprise</title><meta name="robots" content="noindex,nofollow"><link rel="manifest" href="/manifest.webmanifest"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="icon" type="image/x-icon" href="/favicon.ico"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="/precision_graphite.css?v=13.0.0"><style>*,::after,::before{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg-base,#0a0a0a);color:var(--text-primary,#fff);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.auth-card{background:var(--bg-elevated,#111);border:1px solid var(--border,#222);border-radius:16px;padding:40px;width:100%;max-width:420px}.auth-logo{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}.auth-logo span{color:var(--accent,#3b82f6)}.auth-title{font-size:20px;font-weight:700;margin-bottom:6px}.auth-subtitle{font-size:14px;color:var(--text-secondary,#888);margin-bottom:28px}.form-group{margin-bottom:16px}.form-label{display:block;font-size:13px;font-weight:500;color:var(--text-secondary,#888);margin-bottom:6px}.form-input{width:100%;background:var(--bg-base,#0a0a0a);border:1px solid var(--border,#222);border-radius:8px;padding:10px 14px;color:var(--text-primary,#fff);font-family:inherit;font-size:14px;outline:0;transition:border-color .2s}.form-input:focus{border-color:var(--accent,#3b82f6)}.btn-submit{width:100%;background:var(--accent,#3b82f6);color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:8px}.btn-submit:hover{opacity:.9}.btn-submit:disabled{opacity:.5;cursor:not-allowed}.status-msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}.status-msg.show{display:block}.status-msg.success{background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.2)}.status-msg.error{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}.status-msg.info{background:rgba(59,130,246,.1);color:#3b82f6;border:1px solid rgba(59,130,246,.2)}.auth-footer{text-align:center;margin-top:20px;font-size:13px}.auth-footer a{color:var(--accent,#3b82f6);text-decoration:none}.strength-bar{height:4px;border-radius:2px;margin-top:6px;background:var(--border,#222);overflow:hidden}.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}</style></head><body><div class="auth-card"><div class="auth-logo">Life<span>OS</span></div><div id="view-request"><div class="auth-title">Redefinir senha</div><div class="auth-subtitle">Informe seu e-mail para receber o link de recuperação</div><div class="status-msg" id="req-status"></div><form id="request-form" novalidate><div class="form-group"><label class="form-label" for="req-email">E-mail</label> <input type="email" id="req-email" class="form-input" placeholder="seu@email.com" autocomplete="email" required></div><button type="submit" class="btn-submit" id="req-btn">Enviar link de recuperação</button></form></div><div id="view-reset" style="display:none"><div class="auth-title">Nova senha</div><div class="auth-subtitle">Defina uma nova senha segura para sua conta</div><div class="status-msg" id="reset-status"></div><form id="reset-form" novalidate><div class="form-group"><label class="form-label" for="new-password">Nova senha</label> <input type="password" id="new-password" class="form-input" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required oninput="checkStrength(this.value)"><div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div></div><div class="form-group"><label class="form-label" for="confirm-password">Confirmar senha</label> <input type="password" id="confirm-password" class="form-input" placeholder="Repita a nova senha" autocomplete="new-password" required></div><button type="submit" class="btn-submit" id="reset-btn">Redefinir senha</button></form></div><div class="auth-footer"><a href="/login">← Voltar ao login</a></div></div><script>"use strict";const params=new URLSearchParams(location.search),resetToken=params.get("token");function showStatus(e,t,s){const n=document.getElementById(e);n.className=`status-msg show ${t}`,n.textContent=s}function checkStrength(e){const t=document.getElementById("strength-fill");let s=0;e.length>=8&&s++,e.length>=12&&s++,/[A-Z]/.test(e)&&s++,/[0-9]/.test(e)&&s++,/[^A-Za-z0-9]/.test(e)&&s++;t.style.width=20*s+"%",t.style.background=["#EF4444","#F97316","#EAB308","#10B981","#3B82F6"][s-1]||"#222"}resetToken&&fetch("/api/password-reset",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({action:"verify",token:resetToken})}).then(e=>e.json()).then(e=>{e.ok?(document.getElementById("view-request").style.display="none",document.getElementById("view-reset").style.display="block"):showStatus("req-status","error",e.error||"Token inv\xe1lido ou expirado.")}).catch(()=>{showStatus("req-status","error","Erro ao verificar token. Solicite um novo link.")}),document.getElementById("request-form").addEventListener("submit",async e=>{e.preventDefault();const t=document.getElementById("req-email").value.trim();if(!t)return void showStatus("req-status","error","Informe seu e-mail.");const s=document.getElementById("req-btn");s.disabled=!0,s.textContent="Enviando...";try{const e=await fetch("/api/password-reset",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({action:"request",email:t})}),n=await e.json();if(!e.ok)throw new Error(n.error||"N\xe3o foi poss\xedvel enviar o link de recupera\xe7\xe3o.");showStatus("req-status","success",n.message||"Link enviado! Verifique seu e-mail."),s.textContent="Link enviado"}catch(e){showStatus("req-status","error",e.message||"Erro ao enviar. Tente novamente."),s.disabled=!1,s.textContent="Enviar link de recupera\xe7\xe3o"}}),document.getElementById("reset-form").addEventListener("submit",async e=>{e.preventDefault();const t=document.getElementById("new-password").value,s=document.getElementById("confirm-password").value;if(t.length<8)return void showStatus("reset-status","error","Senha deve ter pelo menos 8 caracteres.");if(t!==s)return void showStatus("reset-status","error","As senhas n\xe3o coincidem.");const n=document.getElementById("reset-btn");n.disabled=!0,n.textContent="Redefinindo...";try{const e=await fetch("/api/password-reset",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({action:"reset",token:resetToken,password:t})}),s=await e.json();if(!e.ok)throw new Error(s.error||"Erro ao redefinir senha.");showStatus("reset-status","success","\u2713 Senha redefinida! Redirecionando para o login..."),setTimeout(()=>location.replace("/login"),2e3)}catch(e){showStatus("reset-status","error",e.message),n.disabled=!1,n.textContent="Redefinir senha"}})</script><script src="/precision_graphite.js?v=13.0.0" defer data-visual-system="precision-graphite"></script></body></html>
