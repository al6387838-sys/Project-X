<!-- LifeOS Enterprise — Live Surface for migrated legacy routes -->
<style>
  .lifeos-live-surface{display:none}.lifeos-live-surface .ls-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:18px}.lifeos-live-surface .ls-title{font-size:22px;font-weight:850;letter-spacing:-.4px}.lifeos-live-surface .ls-subtitle{font-size:13px;color:var(--text-secondary);margin-top:4px;max-width:680px}.lifeos-live-surface .ls-actions{display:flex;gap:8px;flex-wrap:wrap}.lifeos-live-surface .ls-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.lifeos-live-surface .ls-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:17px}.lifeos-live-surface .ls-label{font-size:12px;color:var(--text-muted)}.lifeos-live-surface .ls-value{font-size:22px;font-weight:800;line-height:1.2;margin-top:7px}.lifeos-live-surface .ls-detail{font-size:11px;color:var(--text-secondary);margin-top:5px}.lifeos-live-surface .ls-section{margin-top:16px}.lifeos-live-surface .ls-section-title{font-size:14px;font-weight:800;margin-bottom:9px}.lifeos-live-surface .ls-list{display:grid;gap:0}.lifeos-live-surface .ls-row{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.055)}.lifeos-live-surface .ls-row:last-child{border:0}.lifeos-live-surface .ls-row-title{font-size:13px;font-weight:650}.lifeos-live-surface .ls-row-detail{font-size:11px;color:var(--text-muted);margin-top:4px}.lifeos-live-surface .ls-badge{font-size:11px;white-space:nowrap;padding:4px 8px;border-radius:999px;background:rgba(99,102,241,.12);color:var(--accent-light)}.lifeos-live-surface .ls-empty{padding:28px 18px;text-align:center;color:var(--text-muted);font-size:13px;line-height:1.55}.lifeos-live-surface .ls-empty i{display:block;margin:0 auto 8px;width:28px;height:28px}.lifeos-live-surface .ls-status{font-size:12px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;color:var(--text-secondary);background:rgba(255,255,255,.025)}.lifeos-live-surface .ls-status.error{color:var(--red);border-color:rgba(239,68,68,.3)}
</style>
<div id="module-live-surface" class="lifeos-live-surface">
  <div id="page-live-surface">
    <div class="ls-header"><div><div class="ls-title" data-live-title>Carregando</div><div class="ls-subtitle" data-live-subtitle>Consultando dados persistidos.</div></div><div class="ls-actions"><button type="button" class="btn btn-ghost" data-live-refresh><i data-lucide="refresh-cw" class="pg-icon" aria-hidden="true"></i> Atualizar</button><button type="button" class="btn btn-primary" data-live-primary hidden></button></div></div>
    <div class="ls-status" data-live-status>Carregando dados persistidos…</div>
    <div class="ls-grid" data-live-kpis style="margin-top:16px"></div>
    <section class="ls-section"><div class="ls-section-title" data-live-list-title>Registros</div><div class="ls-card"><div class="ls-list" data-live-list></div></div></section>
  </div>
</div>
<script>
(() => {
  'use strict';
  const script = document.currentScript;
  const host = script?.parentElement;
  const root = host?.querySelector(':scope > #module-live-surface');
  if (!host || !root || root.dataset.initialized) return;
  root.dataset.initialized = 'true';
  const hostId = host.id;
  const configs = {
    'module-finance-container': { key:'finance', title:'Finance Hub', subtitle:'Saldos, movimentações e contas calculados a partir dos registros financeiros persistidos.', list:'Movimentações recentes', primary:'Abrir Finance Hub', action:'finance-pix' },
    'module-communication-container': { key:'communication', title:'Communication Hub', subtitle:'Status de provedores e filas de sincronização configurados para a sua conta.', list:'Provedores de comunicação', primary:'Gerenciar integrações', action:'integration-center' },
    'module-email-container': { key:'email', title:'E-mail Center', subtitle:'Conexões de e-mail reais e suas condições de sincronização.', list:'Conexões de e-mail', primary:'Configurar provedores', action:'integration-center' },
    'module-calendar-container': { key:'calendar', title:'Calendário', subtitle:'Eventos persistidos e agenda disponível para a sua conta.', list:'Próximos eventos', primary:'Abrir agenda', action:'agenda' },
    'module-ai-center-container': { key:'ai', title:'AI Center', subtitle:'Insights e sugestões disponíveis exclusivamente a partir dos seus dados.', list:'Insights disponíveis', primary:'Abrir assistente', action:'ai' },
    'module-documents-container': { key:'documents', title:'Document Center', subtitle:'Documentos e notas persistidos para sua conta.', list:'Documentos recentes', primary:'Abrir arquivos', action:'file-center' },
    'module-productivity-container': { key:'productivity', title:'Produtividade', subtitle:'Tarefas, hábitos e metas presentes nos seus registros.', list:'Visão de produtividade', primary:'Abrir tarefas', action:'tasks' },
    'module-marketplace-container': { key:'marketplace', title:'Marketplace de integrações', subtitle:'Catálogo e status de integrações configuradas para sua organização.', list:'Integrações disponíveis', primary:'Gerenciar integrações', action:'integration-center' },
    'module-app-ecosystem-container': { key:'ecosystem', title:'App Ecosystem', subtitle:'Aplicações e conectores disponíveis de acordo com suas integrações reais.', list:'Ecossistema conectado', primary:'Gerenciar integrações', action:'integration-center' },
    'module-integration-center-container': { key:'integrations', title:'Integration Center', subtitle:'Conectores e provedores disponíveis para configuração pela sua conta.', list:'Integrações', primary:'Configurar comunicação', action:'communication' },
    'module-personal-hub-container': { key:'personal', title:'Personal Hub', subtitle:'Resumo de produtividade, hábitos, metas e notificações com dados persistidos.', list:'Seu resumo', primary:'Abrir Command Center', action:'command-center' },
    'module-enterprise-settings-container': { key:'settings', title:'Configurações Enterprise', subtitle:'Configurações da sua organização e segurança, sem valores de demonstração.', list:'Estado de configuração', primary:'Abrir identidade', action:'identity' },
    'module-observability-container': { key:'observability', title:'Observabilidade', subtitle:'Monitoramento expõe somente telemetria efetivamente registrada, sem métricas sintéticas.', list:'Telemetria registrada', primary:'Atualizar', action:null }
  };
  const config = configs[hostId] || { key:'generic', title:'LifeOS Enterprise', subtitle:'Dados persistidos da sua conta.', list:'Registros', primary:'Atualizar', action:null };
  const one = (selector) => root.querySelector(selector);
  const esc = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[char]));
  const number = (value) => new Intl.NumberFormat('pt-BR').format(Number(value) || 0);
  const money = (value) => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(Number(value) || 0);
  const date = (value) => { if (!value) return 'Sem data'; const parsed = new Date(value); return Number.isNaN(parsed.getTime()) ? String(value) : parsed.toLocaleDateString('pt-BR'); };
  const setStatus = (text, error = false) => { const node = one('[data-live-status]'); if (node) { node.textContent = text; node.classList.toggle('error', error); } };
  const cards = (items) => { const node = one('[data-live-kpis]'); if (node) node.innerHTML = items.map((item) => `<article class="ls-card"><div class="ls-label">${esc(item.label)}</div><div class="ls-value" style="color:${item.tone || 'var(--accent)'}">${esc(item.value)}</div>${item.detail ? `<div class="ls-detail">${esc(item.detail)}</div>` : ''}</article>`).join(''); };
  const empty = (text) => `<div class="ls-empty"><i data-lucide="inbox" aria-hidden="true"></i>${esc(text)}</div>`;
  const list = (items, title, detail, badge) => { const node = one('[data-live-list]'); if (!node) return; node.innerHTML = items?.length ? items.map((item) => `<div class="ls-row"><div><div class="ls-row-title">${esc(title(item))}</div>${detail(item) ? `<div class="ls-row-detail">${esc(detail(item))}</div>` : ''}</div>${badge(item) ? `<span class="ls-badge">${esc(badge(item))}</span>` : ''}</div>`).join('') : empty('Nenhum registro persistido foi encontrado neste contexto.'); try { window.lucide?.createIcons?.(); } catch (_) {} };
  const get = async (url) => { const response = await fetch(url,{credentials:'same-origin'}); const payload = await response.json().catch(() => ({})); if (!response.ok || !payload.ok) throw new Error(payload.error || 'Não foi possível carregar os dados.'); return payload; };
  const endpointRows = (data) => data?.items || data?.data?.items || data?.events || data?.documents || data?.notes || data?.tasks || data?.integrations || data?.providers || data?.insights || data?.data?.insights || [];
  async function loadFinance() { const [summaryResult, accountsResult, txResult] = await Promise.all([get('/api/finance/hub?view=summary'),get('/api/finance/hub?view=accounts'),get('/api/finance/hub?view=transactions&limit=10')]); const s = summaryResult.summary || {}; cards([{label:'Saldo consolidado',value:money(s.totalBalance),tone:'var(--green)'},{label:'Receitas no mês',value:money(s.monthlyIncome),tone:'var(--accent)'},{label:'Despesas no mês',value:money(s.monthlyExpenses),tone:'var(--red)'},{label:'Contas cadastradas',value:number(s.accountCount),detail:`${number(s.pixKeyCount)} chave(s) PIX`,tone:'var(--cyan)'}]); const transactions = txResult.transactions || []; if (transactions.length) list(transactions,(item)=>item.description || item.title || 'Movimentação registrada',(item)=>`${date(item.date || item.createdAt)} · ${item.type === 'credit' ? 'Entrada' : item.type === 'debit' ? 'Saída' : 'Movimentação'}`,(item)=>money(item.amount)); else { const accounts = accountsResult.accounts || []; list(accounts,(item)=>item.name || item.institution || 'Conta registrada',(item)=>item.type || 'Conta financeira',(item)=>money(item.balance)); } }
  async function loadCommunication(emailOnly = false) { const result = await get('/api/communication/hub?view=status'); const providers = (result.providers || []).filter((item) => !emailOnly || ['gmail','outlook','smtp'].includes(item.id)); const s = result.summary || {}; cards([{label:'Provedores conectados',value:number(providers.filter((item)=>item.connected).length),detail:`de ${number(providers.length)} disponível(is)`,tone:'var(--green)'},{label:'Provedores configurados',value:number(providers.filter((item)=>item.configured).length),tone:'var(--accent)'},{label:'Fila pendente',value:number(s.queueSize),tone:'var(--amber)'}]); list(providers,(item)=>item.name,(item)=>item.connected ? `Conectado${item.accountEmail ? ` · ${item.accountEmail}` : ''}` : item.setupMessage || 'Aguardando configuração',(item)=>item.connected ? 'Conectado' : item.needsRefresh ? 'Reconectar' : 'Não conectado'); }
  async function loadCalendar() { const result = await get('/api/events'); const events = endpointRows(result); cards([{label:'Eventos registrados',value:number(events.length),tone:'var(--accent)'},{label:'Próximo evento',value:events[0]?.startAt || events[0]?.date ? date(events[0].startAt || events[0].date) : 'Nenhum',tone:'var(--cyan)'}]); list(events,(item)=>item.title || item.name || 'Evento',(item)=>`${date(item.startAt || item.date || item.createdAt)}${item.description ? ` · ${item.description}` : ''}`,(item)=>item.status || 'Registrado'); }
  async function loadAI() { const result = await get('/api/ai-insights'); const insights = endpointRows(result); cards([{label:'Insights disponíveis',value:number(insights.length),tone:'var(--purple)'},{label:'Fonte',value:result.source === 'real' ? 'Dados reais' : 'Sem dados',tone:'var(--cyan)'}]); list(insights,(item)=>item.title || item.text || item.content || 'Insight',(item)=>item.description || item.createdAt ? `${item.description || ''}${item.createdAt ? ` · ${date(item.createdAt)}` : ''}` : 'Gerado a partir de dados persistidos',(item)=>item.type || item.category || 'Insight'); }
  async function loadDocuments() { const result = await get('/api/documents'); const documents = endpointRows(result); cards([{label:'Documentos',value:number(documents.length),tone:'var(--accent)'},{label:'Última atualização',value:documents[0]?.updatedAt ? date(documents[0].updatedAt) : 'Nenhuma',tone:'var(--cyan)'}]); list(documents,(item)=>item.name || item.title || 'Documento',(item)=>`${item.type || item.mimeType || 'Documento'} · ${date(item.updatedAt || item.createdAt)}`,(item)=>item.version ? `v${item.version}` : 'Registrado'); }
  async function loadProductivity() { const [tasks, habits, goals] = await Promise.all([get('/api/tasks'),get('/api/habits'),get('/api/goals')]); const taskItems = endpointRows(tasks), habitItems = endpointRows(habits), goalItems = endpointRows(goals); const done = taskItems.filter((item)=>item.status === 'done').length; cards([{label:'Tarefas',value:number(taskItems.length),detail:`${number(done)} concluída(s)`,tone:'var(--accent)'},{label:'Hábitos ativos',value:number(habitItems.filter((item)=>item.active !== false).length),tone:'var(--green)'},{label:'Metas ativas',value:number(goalItems.filter((item)=>item.status === 'active').length),tone:'var(--purple)'}]); list(taskItems,(item)=>item.title || 'Tarefa',(item)=>`${item.status || 'Pendente'}${item.dueDate ? ` · ${date(item.dueDate)}` : ''}`,(item)=>item.priority || 'Sem prioridade'); }
  async function loadIntegrations(mode) { const result = await get('/api/communication/hub?view=status'); const items = result.providers || []; cards([{label:'Integrações disponíveis',value:number(items.length),tone:'var(--accent)'},{label:'Conectadas',value:number(items.filter((item)=>item.connected).length),tone:'var(--green)'},{label:'Configuradas',value:number(items.filter((item)=>item.configured).length),tone:'var(--cyan)'}]); list(items,(item)=>item.name || item.title || item.provider || 'Integração',(item)=>item.description || item.category || 'Integração configurável',(item)=>item.connected ? 'Conectada' : item.configured ? 'Disponível' : 'Configuração necessária'); }
  async function loadPersonal() { const [dashboard, briefing] = await Promise.all([get('/api/dashboard'),get('/api/briefing')]); const d = dashboard.dashboard || {}, b = briefing.briefing || {}; cards([{label:'Tarefas concluídas',value:number(d.tasks?.completed),detail:`${number(d.tasks?.total)} registradas`,tone:'var(--green)'},{label:'Hábitos ativos',value:number(d.habits?.active),tone:'var(--accent)'},{label:'Metas ativas',value:number(d.goals?.active),tone:'var(--purple)'},{label:'Notificações não lidas',value:number(d.notifications?.unread),tone:'var(--amber)'}]); list(b.priorities || [],(item)=>item.title,(item)=>item.meta || 'Prioridade registrada',(item)=>item.urgent ? 'Atenção' : 'Pendente'); }
  async function loadSettings() { const result = await get('/api/settings'); const settings = result.settings || result.data || {}; const items = Object.entries(settings).filter(([,value]) => typeof value !== 'object').map(([key,value]) => ({key,value})); cards([{label:'Configurações disponíveis',value:number(items.length),tone:'var(--accent)'},{label:'Segurança',value:'Gerenciada',detail:'Acesso pela central de identidade',tone:'var(--green)'}]); list(items,(item)=>item.key,(item)=>String(item.value),'Configurado'); }
  async function loadObservability() { cards([{label:'Telemetria disponível',value:'Aguardando dados',tone:'var(--text-secondary)'},{label:'Métricas sintéticas',value:'Desativadas',detail:'Somente registros efetivos são exibidos',tone:'var(--green)'}]); list([],()=>'',()=>'',()=>{}); }
  async function load() { setStatus('Carregando dados persistidos…'); one('[data-live-title]').textContent = config.title; one('[data-live-subtitle]').textContent = config.subtitle; const button = one('[data-live-primary]'); if (button) { button.hidden = !config.primary; button.textContent = config.primary || ''; button.onclick = () => config.action ? window.showPage?.(config.action) : load(); }
    one('[data-live-list-title]').textContent = config.list;
    try { if (config.key === 'finance') await loadFinance(); else if (config.key === 'communication') await loadCommunication(false); else if (config.key === 'email') await loadCommunication(true); else if (config.key === 'calendar') await loadCalendar(); else if (config.key === 'ai') await loadAI(); else if (config.key === 'documents') await loadDocuments(); else if (config.key === 'productivity') await loadProductivity(); else if (['marketplace','ecosystem','integrations'].includes(config.key)) await loadIntegrations(config.key); else if (config.key === 'personal') await loadPersonal(); else if (config.key === 'settings') await loadSettings(); else if (config.key === 'observability') await loadObservability(); else { cards([]); list([],()=>'',()=>'',()=>{}); } setStatus('Dados exibidos a partir de registros persistidos.'); } catch (error) { cards([{label:'Dados indisponíveis',value:'—',detail:'Tente atualizar em instantes',tone:'var(--text-secondary)'}]); list([],()=>'',()=>'',()=>{}); setStatus(error instanceof Error ? error.message : 'Não foi possível carregar os dados.',true); }
    try { window.lucide?.createIcons?.(); } catch (_) {}
  }
  one('[data-live-refresh]')?.addEventListener('click',load);
  window.setTimeout(load,0);
})();
</script>
