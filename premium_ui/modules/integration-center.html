<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Central de Integrações — LifeOS</title>
  <style>
    .ic-root{color:var(--text-primary);font-family:Inter,-apple-system,sans-serif}.ic-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:20px}.ic-title{font-size:22px;font-weight:800}.ic-sub{color:var(--text-secondary);font-size:13px;margin-top:4px}.ic-summary{display:flex;gap:8px;flex-wrap:wrap}.ic-chip{border:1px solid var(--border);background:var(--bg-card);padding:7px 11px;border-radius:999px;color:var(--text-secondary);font-size:11px}.ic-chip b{color:var(--text-primary)}.ic-toolbar{display:flex;gap:10px;margin-bottom:18px}.ic-search{flex:1;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);padding:10px 13px;border-radius:10px;outline:none}.ic-search:focus{border-color:rgba(99,102,241,.45)}.ic-select{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);padding:10px;border-radius:10px}.ic-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.ic-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px;transition:.2s}.ic-card:hover{border-color:rgba(99,102,241,.25);transform:translateY(-1px)}.ic-card-head{display:flex;align-items:center;gap:11px}.ic-logo{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;background:rgba(99,102,241,.13);color:var(--accent-light);font-size:13px;font-weight:900}.ic-name{font-weight:750}.ic-category{font-size:11px;color:var(--text-muted);margin-top:2px}.ic-status{margin-left:auto;font-size:10px;font-weight:800;padding:4px 7px;border-radius:999px;background:rgba(74,85,104,.15);color:var(--text-muted)}.ic-status.connected{background:rgba(16,185,129,.12);color:var(--green)}.ic-status.pending{background:rgba(245,158,11,.12);color:#F59E0B}.ic-desc{font-size:12px;line-height:1.5;color:var(--text-secondary);margin:13px 0}.ic-meta{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}.ic-meta div{background:var(--bg-elevated);padding:8px;border-radius:8px;font-size:10px;color:var(--text-muted)}.ic-meta strong{display:block;color:var(--text-secondary);font-size:11px;margin-top:2px}.ic-actions{display:flex;gap:7px}.ic-btn{flex:1;border:1px solid var(--border);background:var(--bg-elevated);color:var(--text-secondary);border-radius:8px;padding:8px;font-size:11px;font-weight:700;cursor:pointer}.ic-btn:hover{color:var(--text-primary);border-color:rgba(99,102,241,.3)}.ic-btn.primary{background:linear-gradient(135deg,#6366F1,#8B5CF6);border-color:transparent;color:#fff}.ic-btn:disabled{opacity:.4;cursor:not-allowed}.ic-panel{margin-top:18px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px}.ic-panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.ic-panel-title{font-size:14px;font-weight:750}.ic-log{display:grid;grid-template-columns:110px 150px 1fr 80px;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px;color:var(--text-secondary)}.ic-log:last-child{border-bottom:0}.ic-log strong{color:var(--text-primary)}.ic-ok{color:var(--green);font-weight:750}.ic-err{color:var(--red);font-weight:750}.ic-modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;z-index:2000}.ic-modal.open{display:flex}.ic-dialog{width:min(520px,92vw);background:#0F1520;border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:22px;box-shadow:0 25px 70px rgba(0,0,0,.55)}.ic-dialog h3{font-size:17px;margin-bottom:6px}.ic-dialog p{color:#8892A4;font-size:12px;line-height:1.5}.ic-perms{display:grid;gap:8px;margin:16px 0}.ic-perm{display:flex;justify-content:space-between;align-items:center;background:#141B28;padding:10px;border-radius:9px;font-size:12px}.ic-perm input{margin-left:8px}.ic-envkeys{font-size:11px;color:var(--text-muted);margin:12px 0 0;padding:10px;background:#141B28;border-radius:8px}.ic-envkeys code{font-family:monospace;color:var(--cyan)}.ic-dialog-actions{display:flex;justify-content:flex-end;gap:8px}.ic-toast{position:fixed;right:24px;bottom:24px;background:#141B28;border:1px solid #10B981;color:#F0F4FF;padding:11px 15px;border-radius:10px;font-size:12px;z-index:2500}.ic-loading{text-align:center;color:var(--text-muted);font-size:13px;padding:32px}@media(max-width:1100px){.ic-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:700px){.ic-head,.ic-toolbar{flex-direction:column}.ic-grid{grid-template-columns:1fr}.ic-search,.ic-select{width:100%}.ic-log{grid-template-columns:1fr 1fr}.ic-log span:nth-child(3){grid-column:1/-1}}
  </style>
</head>
<body>
<div class="ic-root">
  <div class="ic-head"><div><div class="ic-title">Central de Integrações</div><div class="ic-sub">Conexões externas, permissões, sincronização e rastreabilidade em um único lugar.</div></div><div class="ic-summary"><span class="ic-chip"><b id="ic-connected">0</b> conectadas</span><span class="ic-chip"><b id="ic-available">0</b> disponíveis</span><span class="ic-chip"><b id="ic-syncs">0</b> sincronizações</span></div></div>
  <div class="ic-toolbar"><input id="ic-search" class="ic-search" placeholder="Buscar integração..." oninput="icRender()" aria-label="Buscar integração"/><select id="ic-filter" class="ic-select" onchange="icRender()" aria-label="Filtrar integrações"><option value="all">Todas</option><option value="connected">Conectadas</option><option value="available">Disponíveis</option></select></div>
  <div id="ic-grid-loading" class="ic-loading">Carregando integrações...</div>
  <div class="ic-grid" id="ic-grid" style="display:none"></div>
  <div class="ic-panel"><div class="ic-panel-head"><div class="ic-panel-title">Logs recentes de sincronização</div><button class="ic-btn" style="flex:0 0 auto" onclick="icClearLogs()">Limpar logs</button></div><div id="ic-logs"><div style="color:var(--text-muted);font-size:12px">Carregando logs...</div></div></div>
</div>
<div class="ic-modal" id="ic-modal" role="dialog" aria-modal="true" aria-labelledby="ic-modal-title"><div class="ic-dialog"><h3 id="ic-modal-title">Configurar integração</h3><p id="ic-modal-copy"></p><div id="ic-modal-envkeys" style="display:none"></div><div class="ic-perms" id="ic-perms"></div><div class="ic-dialog-actions"><button class="ic-btn" style="flex:0 0 auto" onclick="icCloseModal()">Cancelar</button><button class="ic-btn primary" style="flex:0 0 auto" id="ic-authorize">Autorizar conexão</button></div></div></div><script>
(function(){
  'use strict';
  const API = '/api/integrations';
  const AUDIT_API = '/api/operation-audit';
  let integrations = [];
  let connectionState = {};
  let logs = [];
  let syncCount = 0;

  // ─── Catálogo de integrações com metadados completos ─────────────────
  const CATALOG = [
    // Autenticação
    { id: 'google_oauth', logo: 'GO', name: 'Google OAuth 2.0', category: 'Autenticação', color: '#4285F4', desc: 'Login e autenticação via Google', perms: ['openid', 'email', 'profile'], envKeys: ['GOOGLE_CLIENT_ID', 'GOOGLE_CLIENT_SECRET'], docs: 'https://developers.google.com/identity/protocols/oauth2', oauthFlow: true },
    // Comunicação
    { id: 'gmail_api', logo: 'GM', name: 'Gmail API', category: 'Comunicação', color: '#EA4335', desc: 'Leitura e envio de e-mails via Gmail', perms: ['gmail.readonly', 'gmail.send'], envKeys: ['GOOGLE_CLIENT_ID', 'GOOGLE_CLIENT_SECRET'], docs: 'https://developers.google.com/gmail/api', oauthFlow: true },
    { id: 'microsoft_365', logo: 'MS', name: 'Microsoft 365 (Outlook)', category: 'Comunicação', color: '#00A4EF', desc: 'Integração com Outlook, OneDrive e Teams', perms: ['Mail.Read', 'Mail.Send', 'offline_access'], envKeys: ['MICROSOFT_CLIENT_ID', 'MICROSOFT_CLIENT_SECRET'], docs: 'https://learn.microsoft.com/en-us/graph/overview', oauthFlow: true },
    { id: 'whatsapp_business', logo: 'WA', name: 'WhatsApp Business API', category: 'Comunicação', color: '#25D366', desc: 'Mensagens e automação via WhatsApp', perms: ['whatsapp_business_messaging'], envKeys: ['WHATSAPP_APP_ID', 'WHATSAPP_APP_SECRET', 'WHATSAPP_PHONE_ID'], docs: 'https://developers.facebook.com/docs/whatsapp/cloud-api', oauthFlow: true },
    // Pagamentos
    { id: 'stripe', logo: 'ST', name: 'Stripe', category: 'Pagamentos', color: '#635BFF', desc: 'Processamento de pagamentos com cartão', perms: ['charges', 'customers', 'subscriptions'], envKeys: ['STRIPE_PUBLIC_KEY', 'STRIPE_SECRET_KEY', 'STRIPE_WEBHOOK_SECRET'], docs: 'https://stripe.com/docs/api', oauthFlow: false },
    { id: 'mercado_pago', logo: 'MP', name: 'Mercado Pago', category: 'Pagamentos', color: '#009EE3', desc: 'Pagamentos e carteira digital (América Latina)', perms: ['payments', 'refunds', 'customers'], envKeys: ['MERCADO_PAGO_ACCESS_TOKEN', 'MERCADO_PAGO_PUBLIC_KEY'], docs: 'https://www.mercadopago.com.br/developers/pt/reference', oauthFlow: false },
    // Open Finance
    { id: 'open_finance', logo: 'OF', name: 'Open Finance Brasil', category: 'Finanças', color: '#00B4D8', desc: 'Conexão com bancos via Open Finance (Banco Central)', perms: ['accounts.read', 'transactions.read', 'investments.read'], envKeys: ['OPEN_FINANCE_CLIENT_ID', 'OPEN_FINANCE_CLIENT_SECRET'], docs: 'https://openfinancebrasil.org.br/', oauthFlow: true },
    // IA
    { id: 'openai', logo: 'AI', name: 'OpenAI API', category: 'Inteligência Artificial', color: '#10A37F', desc: 'Modelos GPT para IA Copilot e automação', perms: ['chat.completions', 'embeddings'], envKeys: ['OPENAI_API_KEY'], docs: 'https://platform.openai.com/docs/api-reference', oauthFlow: false },
    // Armazenamento
    { id: 'cloudflare_r2', logo: 'R2', name: 'Cloudflare R2', category: 'Armazenamento', color: '#F6821F', desc: 'Armazenamento de objetos (arquivos, imagens)', perms: ['read', 'write', 'delete'], envKeys: ['CLOUDFLARE_R2_BUCKET_NAME', 'CLOUDFLARE_R2_ACCESS_KEY_ID', 'CLOUDFLARE_R2_SECRET_ACCESS_KEY'], docs: 'https://developers.cloudflare.com/r2/', oauthFlow: false },
    { id: 'cloudflare_kv', logo: 'KV', name: 'Cloudflare KV', category: 'Armazenamento', color: '#F6821F', desc: 'Armazenamento de chave-valor (cache, sessões)', perms: ['read', 'write', 'delete'], envKeys: ['LIFEOS_KV'], docs: 'https://developers.cloudflare.com/workers/runtime-apis/kv/', oauthFlow: false },
    // Notificações
    { id: 'smtp', logo: 'SM', name: 'SMTP (Email Transacional)', category: 'Notificações', color: '#6366F1', desc: 'Envio de e-mails transacionais', perms: ['send'], envKeys: ['SMTP_HOST', 'SMTP_PORT', 'SMTP_USER', 'SMTP_PASSWORD'], docs: 'https://en.wikipedia.org/wiki/Simple_Mail_Transfer_Protocol', oauthFlow: false },
    { id: 'push_notifications', logo: 'PN', name: 'Push Notifications', category: 'Notificações', color: '#8B5CF6', desc: 'Notificações push para web e mobile', perms: ['send'], envKeys: ['VAPID_PUBLIC_KEY', 'VAPID_PRIVATE_KEY'], docs: 'https://developer.mozilla.org/en-US/docs/Web/API/Push_API', oauthFlow: false },
    // Desenvolvimento
    { id: 'github', logo: 'GH', name: 'GitHub', category: 'Desenvolvimento', color: '#24292E', desc: 'Repositórios, issues e deploys', perms: ['repo:read', 'issues:read'], envKeys: ['GITHUB_TOKEN'], docs: 'https://docs.github.com/en/rest', oauthFlow: false },
  ];

  // ─── Carregar integrações do backend ─────────────────────────────────
  async function loadIntegrations() {
    try {
      const res = await fetch(API, { credentials: 'same-origin' });
      const d = await res.json().catch(() => ({}));
      // Usar catálogo local como base, enriquecer com status do backend
      integrations = CATALOG.map(item => ({ ...item }));
      connectionState = {};
      // Inicializar estado padrão
      integrations.forEach(i => { connectionState[i.id] = { connected: false, lastSync: 'Nunca' }; });
      // Enriquecer com dados do backend
      if (d.ok) {
        const allInteg = d.allIntegrations || [];
        allInteg.forEach(bi => {
          const local = integrations.find(i => i.id === bi.id || i.id === bi.key);
          if (local) {
            connectionState[local.id] = {
              connected: bi.status === 'connected' || bi.connected === true,
              lastSync: bi.lastSync || 'Nunca',
              configured: bi.configured,
              missingKeys: bi.missingKeys || [],
            };
          }
        });
        // Verificar conexões salvas no KV via check-status
        for (const integ of integrations) {
          try {
            const cr = await fetch(API, {
              method: 'POST', credentials: 'same-origin',
              headers: {'content-type':'application/json'},
              body: JSON.stringify({ action: 'check-status', integrationId: integ.id })
            });
            const cd = await cr.json().catch(() => ({}));
            if (cd.ok && cd.connected) {
              connectionState[integ.id] = { ...connectionState[integ.id], connected: true, lastSync: cd.lastSync || 'Nunca', tokenExpired: cd.tokenExpired, hasRefreshToken: cd.hasRefreshToken };
            }
          } catch {}
        }
      }
      document.getElementById('ic-grid-loading').style.display = 'none';
      document.getElementById('ic-grid').style.display = '';
      icRender();
    } catch(e) {
      document.getElementById('ic-grid-loading').textContent = 'Erro ao carregar integrações. Verifique sua conexão.';
    }
  }

  async function loadLogs() {
    try {
      const res = await fetch(AUDIT_API, { credentials: 'same-origin' });
      if (res.ok) {
        const d = await res.json();
        if (d.ok && d.logs) {
          logs = d.logs.slice(0, 12).map(l => ({
            time: new Date(l.timestamp || l.createdAt || Date.now()).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
            name: l.action || l.type || 'Sistema',
            event: l.detail || l.message || l.action || 'Evento registrado',
            status: l.success !== false ? 'Sucesso' : 'Erro'
          }));
          renderLogs();
          return;
        }
      }
    } catch {}
    logs = [];
    renderLogs();
  }

  function renderLogs() {
    const el = document.getElementById('ic-logs');
    if (!el) return;
    el.innerHTML = logs.length
      ? logs.map(l => `<div class="ic-log"><span>${l.time}</span><strong>${escHtml(l.name)}</strong><span>${escHtml(l.event)}</span><span class="${l.status === 'Erro' ? 'ic-err' : 'ic-ok'}">${escHtml(l.status)}</span></div>`).join('')
      : '<div style="color:var(--text-muted);font-size:12px">Nenhum log registrado.</div>';
  }

  // ─── Renderizar cards ─────────────────────────────────────────────────
  function icRender() {
    const grid = document.getElementById('ic-grid');
    if (!grid) return;
    const q = (document.getElementById('ic-search')?.value || '').toLowerCase();
    const filter = document.getElementById('ic-filter')?.value || 'all';
    let visible = integrations.filter(i => {
      if (q && !i.name.toLowerCase().includes(q) && !i.category.toLowerCase().includes(q) && !i.desc.toLowerCase().includes(q)) return false;
      if (filter === 'connected' && !connectionState[i.id]?.connected) return false;
      if (filter === 'available' && connectionState[i.id]?.connected) return false;
      return true;
    });
    const connected = integrations.filter(i => connectionState[i.id]?.connected).length;
    document.getElementById('ic-connected').textContent = connected;
    document.getElementById('ic-available').textContent = integrations.length - connected;
    document.getElementById('ic-syncs').textContent = syncCount;
    if (!visible.length) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)">Nenhuma integração encontrada</div>';
      return;
    }
    grid.innerHTML = visible.map(item => {
      const state = connectionState[item.id] || {};
      const isConnected = !!state.connected;
      const tokenExpired = !!state.tokenExpired;
      return `<div class="ic-card" onclick="icOpenModal('${escHtml(item.id)}')">
        <div class="ic-card-head">
          <div class="ic-logo" style="background:${item.color || '#6366F1'}22;color:${item.color || '#6366F1'};font-size:13px;font-weight:800">${escHtml(item.logo)}</div>
          <div style="flex:1;min-width:0">
            <div class="ic-name">${escHtml(item.name)}</div>
            <div class="ic-cat">${escHtml(item.category)}</div>
          </div>
          <span class="ic-status ${isConnected ? 'connected' : ''}">${isConnected ? (tokenExpired ? '⚠ Token expirado' : '● Conectado') : '○ Disponível'}</span>
        </div>
        <div class="ic-desc">${escHtml(item.desc)}</div>
        <div class="ic-meta">
          <div><div>Última sincronização</div><strong>${escHtml(state.lastSync || 'Nunca')}</strong></div>
          <div><div>Tipo</div><strong>${escHtml(item.oauthFlow ? 'OAuth 2.0' : 'API Key')}</strong></div>
        </div>
        <div class="ic-actions">
          ${isConnected ? `
            <button class="ic-btn" onclick="event.stopPropagation();icSync('${escHtml(item.id)}')">Sincronizar</button>
            ${tokenExpired && state.hasRefreshToken ? `<button class="ic-btn" onclick="event.stopPropagation();icRefreshToken('${escHtml(item.id)}')">Renovar Token</button>` : ''}
            <button class="ic-btn" style="color:#EF4444;border-color:#EF444440" onclick="event.stopPropagation();icDisconnect('${escHtml(item.id)}')">Desconectar</button>
          ` : `
            <button class="ic-btn primary" onclick="event.stopPropagation();icConnect('${escHtml(item.id)}')">Conectar</button>
          `}
        </div>
      </div>`;
    }).join('');
  }

  // ─── Conectar integração ──────────────────────────────────────────────
  window.icConnect = async function(id) {
    const item = integrations.find(x => x.id === id);
    if (!item) return;
    icToast(`Iniciando conexão com ${item.name}...`, 'info');
    try {
      const res = await fetch(API, {
        method: 'POST', credentials: 'same-origin',
        headers: {'content-type':'application/json'},
        body: JSON.stringify({ action: 'oauth-url', integrationId: id })
      });
      const d = await res.json();
      if (d.authUrl) {
        // OAuth flow — abrir janela de autenticação
        const popup = window.open(d.authUrl, `oauth_${id}`, 'width=600,height=700,noopener');
        icToast(`Janela de autorização aberta. Após conectar, clique em Atualizar.`, 'info');
        // Verificar se a janela foi fechada
        const checkClosed = setInterval(() => {
          if (popup && popup.closed) {
            clearInterval(checkClosed);
            // Recarregar status
            setTimeout(() => loadIntegrations(), 1000);
          }
        }, 1000);
        icCloseModal();
      } else if (d.ok && d.status === 'connected') {
        connectionState[id] = { connected: true, lastSync: 'agora' };
        addLog(item.name, 'Conexão autorizada via API Key', true);
        icRender();
        icToast(`${item.name} conectada com sucesso!`, 'success');
        icCloseModal();
      } else if (d.setupRequired) {
        icToast(`Configure as variáveis: ${(d.missingKeys || []).join(', ')}`, 'error');
      } else {
        icToast(d.error || `Erro ao conectar ${item.name}`, 'error');
      }
    } catch(e) {
      icToast('Erro de conexão. Tente novamente.', 'error');
    }
  };

  // ─── Desconectar integração ───────────────────────────────────────────
  window.icDisconnect = async function(id) {
    const item = integrations.find(x => x.id === id);
    if (!item) return;
    if (!confirm(`Desconectar ${item.name}? Você precisará reconectar para usar esta integração.`)) return;
    try {
      const res = await fetch(API, {
        method: 'POST', credentials: 'same-origin',
        headers: {'content-type':'application/json'},
        body: JSON.stringify({ action: 'disconnect', integrationId: id })
      });
      const d = await res.json();
      if (d.ok) {
        connectionState[id] = { connected: false, lastSync: 'Nunca' };
        addLog(item.name, 'Desconectado pelo usuário', true);
        icRender();
        icCloseModal();
        icToast(`${item.name} desconectada.`, 'success');
      } else {
        icToast(d.error || 'Erro ao desconectar', 'error');
      }
    } catch {
      // Fallback: desconectar localmente
      connectionState[id] = { connected: false, lastSync: 'Nunca' };
      icRender();
      icCloseModal();
      icToast(`${item.name} desconectada.`, 'success');
    }
  };

  // ─── Renovar token ────────────────────────────────────────────────────
  window.icRefreshToken = async function(id) {
    const item = integrations.find(x => x.id === id);
    if (!item) return;
    icToast(`Renovando token de ${item.name}...`, 'info');
    try {
      const res = await fetch(API, {
        method: 'POST', credentials: 'same-origin',
        headers: {'content-type':'application/json'},
        body: JSON.stringify({ action: 'refresh-token', integrationId: id })
      });
      const d = await res.json();
      if (d.ok) {
        connectionState[id] = { ...connectionState[id], tokenExpired: false };
        addLog(item.name, 'Token renovado automaticamente', true);
        icRender();
        icToast(`Token de ${item.name} renovado!`, 'success');
      } else {
        icToast(d.error || 'Erro ao renovar token. Reconecte a integração.', 'error');
      }
    } catch {
      icToast('Erro ao renovar token', 'error');
    }
  };

  // ─── Sincronizar ──────────────────────────────────────────────────────
  window.icSync = async function(id) {
    if (!connectionState[id]?.connected) return;
    const item = integrations.find(x => x.id === id);
    if (!item) return;
    icToast(`Sincronizando ${item.name}...`, 'info');
    try {
      const res = await fetch(API, {
        method: 'POST', credentials: 'same-origin',
        headers: {'content-type':'application/json'},
        body: JSON.stringify({ action: 'sync', integrationId: id })
      });
      const d = await res.json();
      connectionState[id].lastSync = new Date().toLocaleTimeString('pt-BR');
      addLog(item.name, d.ok ? 'Sincronização concluída' : 'Sincronização manual', d.ok);
      syncCount++;
      icRender();
      renderLogs();
      icToast(`${item.name} sincronizada.`, 'success');
    } catch {
      icToast('Erro na sincronização', 'error');
    }
  };

  function addLog(name, event, success) {
    logs.unshift({
      time: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
      name, event,
      status: success ? 'Sucesso' : 'Erro'
    });
    logs = logs.slice(0, 12);
    renderLogs();
  }

  // ─── Modal de detalhes ────────────────────────────────────────────────
  window.icOpenModal = function(id) {
    const item = integrations.find(x => x.id === id);
    if (!item) return;
    const state = connectionState[id] || {};
    const isConnected = !!state.connected;
    document.getElementById('ic-modal-title').textContent = item.name;
    document.getElementById('ic-modal-copy').innerHTML = `
      <div style="margin-bottom:8px">${escHtml(item.desc)}</div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">Categoria: <strong>${escHtml(item.category)}</strong> · Tipo: <strong>${escHtml(item.oauthFlow ? 'OAuth 2.0' : 'API Key')}</strong></div>
      ${state.lastSync && state.lastSync !== 'Nunca' ? `<div style="font-size:11px;color:var(--text-muted)">Última sincronização: ${escHtml(state.lastSync)}</div>` : ''}
      ${item.docs ? `<a href="${escHtml(item.docs)}" target="_blank" style="display:inline-block;margin-top:8px;font-size:11px;color:var(--cyan)">Documentação oficial ↗</a>` : ''}
    `;
    // Permissões
    const permsEl = document.getElementById('ic-perms');
    permsEl.innerHTML = item.perms.length ? item.perms.map(p => `
      <div class="ic-perm">
        <span>${escHtml(p)}</span>
        <span style="font-size:10px;padding:2px 6px;background:rgba(16,185,129,.1);color:var(--green);border-radius:4px">Necessário</span>
      </div>`).join('') : '<div style="color:var(--text-muted);font-size:12px">Sem permissões especiais</div>';
    // Variáveis de ambiente
    const envEl = document.getElementById('ic-modal-envkeys');
    if (item.envKeys && item.envKeys.length) {
      envEl.style.display = 'block';
      envEl.innerHTML = `<div class="ic-envkeys">Variáveis necessárias: ${item.envKeys.map(k => `<code>${escHtml(k)}</code>`).join(', ')}</div>`;
    } else {
      envEl.style.display = 'none';
    }
    // Botão de ação
    const btn = document.getElementById('ic-authorize');
    if (isConnected) {
      btn.textContent = 'Desconectar';
      btn.style.background = 'rgba(239,68,68,0.15)';
      btn.style.color = '#EF4444';
      btn.style.borderColor = '#EF444440';
      btn.onclick = () => icDisconnect(id);
    } else {
      btn.textContent = 'Conectar';
      btn.style.background = 'linear-gradient(135deg,#6366F1,#8B5CF6)';
      btn.style.color = '#fff';
      btn.style.borderColor = 'transparent';
      btn.onclick = () => icConnect(id);
    }
    document.getElementById('ic-modal').classList.add('open');
  };

  window.icCloseModal = () => {
    document.getElementById('ic-modal').classList.remove('open');
  };

  window.icClearLogs = async function() {
    try {
      await fetch(AUDIT_API, { method: 'DELETE', credentials: 'same-origin' });
    } catch {}
    logs = [];
    renderLogs();
    icToast('Logs limpos', 'success');
  };

  function icToast(msg, type) {
    const e = document.createElement('div');
    e.className = 'ic-toast';
    e.textContent = msg;
    if (type === 'error') e.style.borderColor = '#EF4444';
    else if (type === 'info') e.style.borderColor = '#6366F1';
    document.body.appendChild(e);
    setTimeout(() => e.remove(), 3000);
  }

  function escHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }

  document.getElementById('ic-modal').addEventListener('click', e => {
    if (e.target.id === 'ic-modal') icCloseModal();
  });

  // ─── Inicializar ──────────────────────────────────────────────────────
  loadIntegrations();
  loadLogs();
})();
</script>
</body>
</html>
