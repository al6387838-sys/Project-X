<!-- LifeOS Enterprise — Email Module v2.0 -->
<!-- Real API integration: /api/communication/hub (providers) + /api/comm-hub (send/history) -->
<div id="module-email" style="display:none">

<!-- ─── INBOX UNIFICADA ─── -->
<div class="page" id="page-email">
  <div class="page-header">
    <div>
      <div class="page-title"><i data-lucide="mail" class="pg-icon" aria-hidden="true"></i> Email</div>
      <div class="page-subtitle">Inbox unificada — seus emails e envio direto</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="emailShowPage('integrations')">Contas</button>
      <button class="btn btn-primary" onclick="emailOpenCompose()"><i data-lucide="pencil" class="pg-icon" aria-hidden="true"></i> Novo Email</button>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:200px 1fr;gap:0;height:calc(100vh - 160px);background:var(--bg-card);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden">
    <!-- Sidebar -->
    <div style="border-right:1px solid var(--border);display:flex;flex-direction:column">
      <div style="padding:12px;border-bottom:1px solid var(--border)">
        <div style="font-size:10px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px">Provedores</div>
        <div id="email-providers-list" style="font-size:12px;color:var(--text-muted)">Carregando...</div>
      </div>
      <!-- Pastas -->
      <div style="flex:1;overflow-y:auto;padding:8px">
        <div class="email-folder active" onclick="emailSetView('history',this)">
          <span><i data-lucide="clock" class="pg-icon" aria-hidden="true"></i></span><span style="flex:1;margin-left:8px">Histórico</span><span class="email-count" id="email-count-history">—</span>
        </div>
        <div class="email-folder" onclick="emailSetView('inbox',this)">
          <span><i data-lucide="download" class="pg-icon" aria-hidden="true"></i></span><span style="flex:1;margin-left:8px">Inbox</span><span class="email-count" id="email-count-inbox">—</span>
        </div>
        <div class="email-folder" onclick="emailSetView('sent',this)">
          <span><i data-lucide="upload" class="pg-icon" aria-hidden="true"></i></span><span style="flex:1;margin-left:8px">Enviados</span>
        </div>
        <div class="email-folder" onclick="emailSetView('queue',this)">
          <span><i data-lucide="loader" class="pg-icon" aria-hidden="true"></i></span><span style="flex:1;margin-left:8px">Fila</span><span class="email-count" id="email-count-queue">—</span>
        </div>
        <div class="email-folder" onclick="emailSetView('logs',this)">
          <span><i data-lucide="activity" class="pg-icon" aria-hidden="true"></i></span><span style="flex:1;margin-left:8px">Logs</span>
        </div>
      </div>
    </div>

    <!-- Lista + Visualizador -->
    <div style="display:flex;flex-direction:column">
      <div style="padding:10px;border-bottom:1px solid var(--border);display:flex;gap:8px">
        <input type="text" class="form-input" id="email-search" placeholder=" Buscar no histórico..." style="flex:1;font-size:12px" oninput="emailFilterList(this.value)" />
        <button class="btn btn-ghost" style="padding:8px" onclick="emailRefresh()">↻</button>
      </div>
      <div style="flex:1;overflow-y:auto" id="email-list">
        <div style="padding:32px;text-align:center;color:var(--text-muted)">Carregando emails...</div>
      </div>
    </div>
  </div>
</div>

<!-- ─── EMAIL INTEGRATIONS ─── -->
<div class="page" id="page-email-integrations" style="display:none">
  <div class="page-header">
    <div>
      <div class="page-title"><i data-lucide="mail" class="pg-icon" aria-hidden="true"></i> Contas de Email</div>
      <div class="page-subtitle">Gerencie suas contas e provedores de email</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="emailShowPage('inbox')">Inbox</button>
    </div>
  </div>
  <div id="email-integrations-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px">
    <div style="padding:32px;text-align:center;color:var(--text-muted);grid-column:1/-1">Carregando provedores...</div>
  </div>
</div>

<!-- ─── COMPOSE MODAL ─── -->
<div id="modal-email-compose" class="modal" style="display:none">
  <div class="modal-backdrop" onclick="emailCloseCompose()"></div>
  <div class="modal-content" style="width:600px;max-width:90vw">
    <div class="modal-header">
      <div class="modal-title"><i data-lucide="pencil" class="pg-icon" aria-hidden="true"></i> Novo Email</div>
      <button class="modal-close" onclick="emailCloseCompose()"><i data-lucide="x" class="pg-icon" aria-hidden="true"></i></button>
    </div>
    <div class="modal-body">
      <form id="email-compose-form">
        <div style="margin-bottom:10px">
          <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Provedor</label>
          <select id="compose-provider" class="form-input" style="width:100%">
            <option value="gmail">Gmail</option>
            <option value="outlook">Outlook</option>
            <option value="smtp">SMTP</option>
          </select>
        </div>
        <div style="margin-bottom:10px">
          <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Para</label>
          <input type="email" id="compose-to" class="form-input" style="width:100%" required placeholder="destinatario@email.com">
        </div>
        <div style="margin-bottom:10px">
          <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Assunto</label>
          <input type="text" id="compose-subject" class="form-input" style="width:100%" placeholder="Assunto do email">
        </div>
        <div style="margin-bottom:10px">
          <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Mensagem</label>
          <textarea id="compose-body" class="form-input" style="width:100%;min-height:200px;resize:vertical" placeholder="Escreva sua mensagem..."></textarea>
        </div>
        <div id="compose-attachments" style="margin-bottom:10px"></div>
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <button type="button" class="btn btn-ghost" style="font-size:12px" onclick="emailAttachFile()"><i data-lucide="paperclip" class="pg-icon" aria-hidden="true"></i> Anexar</button>
        </div>
        <div id="compose-error" style="color:var(--red);font-size:12px;margin-bottom:10px;display:none"></div>
        <div style="display:flex;justify-content:flex-end;gap:8px">
          <button type="button" class="btn btn-ghost" onclick="emailCloseCompose()">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="compose-send-btn"><i data-lucide="send" class="pg-icon" aria-hidden="true"></i> Enviar</button>
        </div>
      </form>
    </div>
  </div>
</div>

</div>
<script>
// LifeOS Enterprise — Módulo Email v10.0 — Backend REAL
// Conectado ao /api/comm-hub (Gmail, Outlook OAuth real)
'use strict';

const EMAIL_API = '/api/comm-hub';
const COMM_HUB_STATUS = '/api/communication/hub';

let emailState = {
  providers: [],
  history: [],
  inbox: [],
  queue: [],
  view: 'inbox',  // inbox | sent | trash | history | queue | logs
  filter: '',
  selectedProvider: 'gmail',
  replyTo: null,
  forwardFrom: null,
};

function emailEsc(v) {
  return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function emailFmtDate(d) {
  if (!d) return '—';
  try {
    const date = new Date(d);
    const now = new Date();
    const diff = now - date;
    if (diff < 86400000) return date.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
    return date.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'2-digit'});
  } catch { return String(d); }
}

// ─── Carregar dados ───────────────────────────────────────────────────────────
async function emailLoad() {
  try {
    // Carregar status dos provedores
    const statusRes = await fetch(`${EMAIL_API}?action=status`, { credentials: 'same-origin' });
    const statusData = await statusRes.json().catch(() => ({}));
    emailState.providers = statusData.providers || [];

    // Carregar histórico de envios
    const histRes = await fetch(`${EMAIL_API}?action=history`, { credentials: 'same-origin' });
    const histData = await histRes.json().catch(() => ({}));
    emailState.history = histData.history || [];

    // Carregar fila
    const queueRes = await fetch(`${EMAIL_API}?action=queue`, { credentials: 'same-origin' });
    const queueData = await queueRes.json().catch(() => ({}));
    emailState.queue = queueData.queue || [];

    emailRenderProvidersSidebar();
    emailRenderList();
  } catch(e) {
    console.error('emailLoad error:', e);
  }
}

// ─── Carregar inbox real ──────────────────────────────────────────────────────
async function emailLoadInbox(provider) {
  const listEl = document.getElementById('email-list');
  if (!listEl) return;
  listEl.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted)">Carregando inbox...</div>';
  try {
    const r = await fetch(EMAIL_API, {
      method: 'POST', credentials: 'same-origin',
      headers: {'content-type':'application/json'},
      body: JSON.stringify({ action: 'inbox', provider: provider || emailState.selectedProvider })
    });
    const d = await r.json();
    if (!r.ok || !d.ok) {
      if (d.requiresAuth) {
        listEl.innerHTML = `<div style="padding:32px;text-align:center">
          <div style="color:var(--text-muted);margin-bottom:16px">Conecte o ${emailEsc(provider || emailState.selectedProvider)} para acessar sua inbox</div>
          <button class="btn btn-primary" onclick="emailConnectProvider('${emailEsc(provider || emailState.selectedProvider)}')">Conectar ${emailEsc(provider || emailState.selectedProvider)}</button>
        </div>`;
      } else {
        listEl.innerHTML = `<div style="padding:32px;text-align:center;color:var(--red)">${emailEsc(d.error || 'Erro ao carregar inbox')}</div>`;
      }
      return;
    }
    emailState.inbox = d.messages || [];
    emailRenderInbox(d.messages || []);
  } catch(e) {
    listEl.innerHTML = '<div style="padding:32px;text-align:center;color:var(--red)">Erro de conexão</div>';
  }
}

function emailRenderInbox(messages) {
  const listEl = document.getElementById('email-list');
  if (!listEl) return;
  if (!messages.length) {
    listEl.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted)">Inbox vazia</div>';
    return;
  }
  listEl.innerHTML = messages.map(msg => `
    <div class="email-item${msg.unread ? ' unread' : ''}" style="padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:flex-start;gap:12px;transition:background .15s" onmouseenter="this.style.background='var(--bg-elevated)'" onmouseleave="this.style.background=''" onclick="emailOpenMessage('${emailEsc(msg.id)}','${emailEsc(msg.provider || emailState.selectedProvider)}')">
      <div style="width:8px;height:8px;border-radius:50%;background:${msg.unread ? 'var(--accent)' : 'transparent'};margin-top:6px;flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-weight:${msg.unread ? '700' : '500'};font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${emailEsc(msg.from || '(sem remetente)')}</span>
          <span style="font-size:11px;color:var(--text-muted);flex-shrink:0;margin-left:8px">${emailFmtDate(msg.date)}</span>
        </div>
        <div style="font-size:12px;font-weight:${msg.unread ? '600' : '400'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px">${emailEsc(msg.subject)}</div>
        <div style="font-size:11px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${emailEsc(msg.snippet)}</div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0" onclick="event.stopPropagation()">
        <button class="btn btn-ghost" style="padding:4px 6px;font-size:11px" title="Responder" onclick="emailReply('${emailEsc(msg.id)}','${emailEsc(msg.from || '')}','${emailEsc(msg.subject || '')}','${emailEsc(msg.provider || emailState.selectedProvider)}')">↩</button>
        <button class="btn btn-ghost" style="padding:4px 6px;font-size:11px" title="Encaminhar" onclick="emailForward('${emailEsc(msg.id)}','${emailEsc(msg.subject || '')}','${emailEsc(msg.provider || emailState.selectedProvider)}')">↪</button>
        <button class="btn btn-ghost" style="padding:4px 6px;font-size:11px;color:var(--red)" title="Excluir" onclick="emailDelete('${emailEsc(msg.id)}','${emailEsc(msg.provider || emailState.selectedProvider)}')">🗑</button>
      </div>
    </div>
  `).join('');
}

// ─── Abrir mensagem ───────────────────────────────────────────────────────────
async function emailOpenMessage(emailId, provider) {
  // Marcar como lida
  fetch(EMAIL_API, {
    method: 'POST', credentials: 'same-origin',
    headers: {'content-type':'application/json'},
    body: JSON.stringify({ action: 'mark-read', emailId, provider })
  }).catch(() => {});
  // Atualizar estado local
  const msg = emailState.inbox.find(m => m.id === emailId);
  if (msg) msg.unread = false;
  emailRenderInbox(emailState.inbox);
  // Mostrar preview no painel lateral se existir
  const previewEl = document.getElementById('email-preview');
  if (previewEl) {
    previewEl.innerHTML = `<div style="padding:16px">
      <div style="font-weight:700;font-size:15px;margin-bottom:8px">${emailEsc(msg?.subject || '(sem assunto)')}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">De: ${emailEsc(msg?.from || '')}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px">${emailFmtDate(msg?.date)}</div>
      <div style="font-size:13px;color:var(--text-secondary);line-height:1.6">${emailEsc(msg?.snippet || '')}</div>
      <div style="margin-top:16px;display:flex;gap:8px">
        <button class="btn btn-primary" style="font-size:12px" onclick="emailReply('${emailEsc(emailId)}','${emailEsc(msg?.from || '')}','${emailEsc(msg?.subject || '')}','${emailEsc(provider)}')">↩ Responder</button>
        <button class="btn btn-ghost" style="font-size:12px" onclick="emailForward('${emailEsc(emailId)}','${emailEsc(msg?.subject || '')}','${emailEsc(provider)}')">↪ Encaminhar</button>
        <button class="btn btn-ghost" style="font-size:12px;color:var(--red)" onclick="emailDelete('${emailEsc(emailId)}','${emailEsc(provider)}')">🗑 Excluir</button>
      </div>
    </div>`;
  }
}

// ─── Responder email ──────────────────────────────────────────────────────────
function emailReply(emailId, fromAddress, subject, provider) {
  emailState.replyTo = { emailId, fromAddress, subject, provider };
  emailState.forwardFrom = null;
  const toEl = document.getElementById('compose-to');
  const subjectEl = document.getElementById('compose-subject');
  const bodyEl = document.getElementById('compose-body');
  const provEl = document.getElementById('compose-provider');
  if (toEl) toEl.value = fromAddress || '';
  if (subjectEl) subjectEl.value = subject ? (subject.startsWith('Re:') ? subject : 'Re: ' + subject) : '';
  if (bodyEl) bodyEl.value = '';
  if (provEl && provider) provEl.value = provider;
  // Mostrar modal
  const modal = document.getElementById('modal-email-compose');
  if (modal) modal.style.display = '';
  if (bodyEl) bodyEl.focus();
}

// ─── Encaminhar email ─────────────────────────────────────────────────────────
function emailForward(emailId, subject, provider) {
  emailState.forwardFrom = { emailId, subject, provider };
  emailState.replyTo = null;
  const toEl = document.getElementById('compose-to');
  const subjectEl = document.getElementById('compose-subject');
  const bodyEl = document.getElementById('compose-body');
  const provEl = document.getElementById('compose-provider');
  if (toEl) toEl.value = '';
  if (subjectEl) subjectEl.value = subject ? (subject.startsWith('Fwd:') ? subject : 'Fwd: ' + subject) : '';
  if (bodyEl) bodyEl.value = '';
  if (provEl && provider) provEl.value = provider;
  const modal = document.getElementById('modal-email-compose');
  if (modal) modal.style.display = '';
  if (toEl) toEl.focus();
}

// ─── Excluir email (mover para lixeira) ──────────────────────────────────────
async function emailTrash(emailId, provider) {
  if (!emailId) return;
  try {
    const res = await fetch('/api/comm-hub', {
      method: 'POST', credentials: 'same-origin',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ action: 'trash-email', emailId, provider: provider || emailState.selectedProvider })
    });
    const d = await res.json();
    if (d.ok) {
      emailState.emails = emailState.emails.filter(m => m.id !== emailId);
      emailRenderList();
      emailShowToast('Email movido para lixeira', 'success');
    } else {
      emailShowToast(d.error || 'Erro ao mover para lixeira', 'error');
    }
  } catch {
    emailShowToast('Erro de conexão', 'error');
  }
}
async function emailDelete(emailId, provider) {
  if (!confirm('Mover este email para a lixeira?')) return;
  try {
    const r = await fetch(EMAIL_API, {
      method: 'POST', credentials: 'same-origin',
      headers: {'content-type':'application/json'},
      body: JSON.stringify({ action: 'delete-email', emailId, provider: provider || emailState.selectedProvider })
    });
    const d = await r.json();
    if (d.ok) {
      emailState.inbox = emailState.inbox.filter(m => m.id !== emailId);
      emailRenderInbox(emailState.inbox);
      showToast('Email movido para lixeira', 'success');
    } else {
      showToast(d.error || 'Erro ao excluir email', 'error');
    }
  } catch(e) {
    showToast('Erro de conexão', 'error');
  }
}

// ─── Restaurar email ──────────────────────────────────────────────────────────
async function emailRestore(emailId, provider) {
  try {
    const r = await fetch(EMAIL_API, {
      method: 'POST', credentials: 'same-origin',
      headers: {'content-type':'application/json'},
      body: JSON.stringify({ action: 'restore-email', emailId, provider: provider || emailState.selectedProvider })
    });
    const d = await r.json();
    if (d.ok) {
      showToast('Email restaurado para inbox', 'success');
      emailLoadInbox(provider || emailState.selectedProvider);
    } else {
      showToast(d.error || 'Erro ao restaurar email', 'error');
    }
  } catch(e) {
    showToast('Erro de conexão', 'error');
  }
}

// ─── Mover email ──────────────────────────────────────────────────────────────
async function emailMove(emailId, destination, provider) {
  try {
    const r = await fetch(EMAIL_API, {
      method: 'POST', credentials: 'same-origin',
      headers: {'content-type':'application/json'},
      body: JSON.stringify({ action: 'move-email', emailId, destination, provider: provider || emailState.selectedProvider })
    });
    const d = await r.json();
    if (d.ok) {
      showToast(`Email movido para ${destination}`, 'success');
      emailLoadInbox(provider || emailState.selectedProvider);
    } else {
      showToast(d.error || 'Erro ao mover email', 'error');
    }
  } catch(e) {
    showToast('Erro de conexão', 'error');
  }
}

// ─── Pesquisar emails ─────────────────────────────────────────────────────────
async function emailSearch(q) {
  if (!q || !q.trim()) {
    emailRenderList();
    return;
  }
  try {
    const r = await fetch(EMAIL_API, {
      method: 'POST', credentials: 'same-origin',
      headers: {'content-type':'application/json'},
      body: JSON.stringify({ action: 'search', q: q.trim() })
    });
    const d = await r.json();
    if (d.ok) {
      const listEl = document.getElementById('email-list');
      if (!listEl) return;
      const results = d.results || [];
      if (!results.length) {
        listEl.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted)">Nenhum resultado encontrado</div>';
        return;
      }
      listEl.innerHTML = results.map(item => `
        <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-weight:600;font-size:13px">${emailEsc(item.to || item.from || '')}</span>
            <span style="font-size:11px;color:var(--text-muted)">${emailFmtDate(item.sentAt)}</span>
          </div>
          <div style="font-size:12px;margin-bottom:2px">${emailEsc(item.subject || '(sem assunto)')}</div>
          <div style="font-size:11px;color:var(--text-muted)">${emailEsc(item.status || '')}</div>
        </div>
      `).join('');
    }
  } catch(e) {}
}

// ─── Renderizar lista por view ────────────────────────────────────────────────
function emailRenderList() {
  const listEl = document.getElementById('email-list');
  if (!listEl) return;

  if (emailState.view === 'inbox') {
    emailLoadInbox(emailState.selectedProvider);
    return;
  }

  if (emailState.view === 'sent' || emailState.view === 'history') {
    const items = emailState.history.filter(h => {
      if (!emailState.filter) return true;
      const q = emailState.filter.toLowerCase();
      return (h.to || '').toLowerCase().includes(q) ||
             (h.subject || '').toLowerCase().includes(q);
    });
    if (!items.length) {
      listEl.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted)">Nenhum email enviado</div>';
      return;
    }
    listEl.innerHTML = items.map(item => {
      const statusColor = item.status === 'sent' ? '#10B981' : item.status === 'failed' ? '#EF4444' : '#F59E0B';
      return `<div style="padding:12px 16px;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-weight:600;font-size:13px">${emailEsc(item.to || '')}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:10px;padding:2px 8px;border-radius:4px;background:${statusColor}20;color:${statusColor}">${emailEsc(item.status || '')}</span>
            <span style="font-size:11px;color:var(--text-muted)">${emailFmtDate(item.sentAt)}</span>
          </div>
        </div>
        <div style="font-size:12px;margin-bottom:2px">${emailEsc(item.subject || '(sem assunto)')}</div>
        <div style="font-size:11px;color:var(--text-muted)">${emailEsc(item.provider || '')}</div>
      </div>`;
    }).join('');
    return;
  }

  if (emailState.view === 'queue') {
    const items = emailState.queue;
    if (!items.length) {
      listEl.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted)">Fila vazia</div>';
      return;
    }
    listEl.innerHTML = items.map(item => `
      <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-weight:600;font-size:13px">${emailEsc(item.to || '')}</span>
          <span style="font-size:11px;color:var(--text-muted)">${emailFmtDate(item.queuedAt)}</span>
        </div>
        <div style="font-size:12px">${emailEsc(item.subject || '(sem assunto)')}</div>
        <div style="font-size:11px;color:var(--text-muted)">Tentativas: ${item.attempts || 0}/${item.maxAttempts || 3}</div>
      </div>
    `).join('');
    return;
  }

  listEl.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted)">Selecione uma pasta</div>';
}

// ─── Renderizar sidebar de provedores ─────────────────────────────────────────
function emailRenderProvidersSidebar() {
  const list = document.getElementById('email-providers-list');
  if (!list) return;
  const emailProvs = emailState.providers.filter(p => ['gmail','outlook','smtp'].includes(p.id));
  const connected = emailProvs.filter(p => p.connected);
  list.innerHTML = connected.length
    ? connected.map(p => `
        <div style="margin-bottom:6px;display:flex;align-items:center;gap:6px;cursor:pointer" onclick="emailSelectProvider('${emailEsc(p.id)}')">
          <span style="width:8px;height:8px;border-radius:50%;background:#10B981;flex-shrink:0"></span>
          <span style="font-size:13px;font-weight:${emailState.selectedProvider === p.id ? '700' : '400'}">${emailEsc(p.name)}</span>
          ${p.accountEmail ? `<span style="font-size:11px;color:var(--text-muted)">(${emailEsc(p.accountEmail)})</span>` : ''}
        </div>`).join('')
    : `<div style="color:var(--text-muted);font-size:12px">Nenhuma conta conectada<br>
       <button class="btn btn-ghost" style="margin-top:8px;font-size:11px;padding:4px 8px" onclick="emailShowPage('integrations')">Conectar conta</button></div>`;

  // Atualizar contadores
  const inboxCount = document.getElementById('email-count-inbox');
  const histCount = document.getElementById('email-count-history');
  const queueCount = document.getElementById('email-count-queue');
  if (inboxCount) inboxCount.textContent = emailState.inbox.filter(m => m.unread).length || '—';
  if (histCount) histCount.textContent = emailState.history.length || '—';
  if (queueCount) queueCount.textContent = emailState.queue.length || '—';
}

function emailSelectProvider(providerId) {
  emailState.selectedProvider = providerId;
  emailRenderProvidersSidebar();
  if (emailState.view === 'inbox') emailLoadInbox(providerId);
}

// ─── Conectar provedor ────────────────────────────────────────────────────────
async function emailConnectProvider(providerId) {
  try {
    showToast(`Iniciando conexão com ${providerId}...`, 'info');
    const r = await fetch(EMAIL_API, {
      method: 'POST', credentials: 'same-origin',
      headers: {'content-type':'application/json'},
      body: JSON.stringify({ action: 'connect', provider: providerId })
    });
    const d = await r.json();
    if (d.authUrl) {
      window.open(d.authUrl, '_blank', 'width=600,height=700,noopener');
      showToast('Janela de autorização aberta. Após conectar, clique em Atualizar.', 'info');
    } else if (d.ok && d.status === 'connected') {
      showToast(`${providerId} já está conectado!`, 'success');
      emailLoad();
    } else {
      showToast(d.error || d.reason || `Configure as credenciais de ${providerId} no painel`, 'info');
    }
  } catch(e) {
    showToast('Erro ao conectar', 'error');
  }
}

async function emailSyncProvider(providerId) {
  try {
    showToast(`Sincronizando ${providerId}...`, 'info');
    await emailLoad();
    emailLoadInbox(providerId);
    showToast(`${providerId} sincronizado`, 'success');
  } catch(e) {
    showToast('Erro ao sincronizar', 'error');
  }
}

// ─── Enviar email ─────────────────────────────────────────────────────────────
async function emailSendCompose(e) {
  if (e) e.preventDefault();
  const btn = document.getElementById('compose-send-btn');
  const errEl = document.getElementById('compose-error');
  const to = document.getElementById('compose-to')?.value?.trim();
  const subject = document.getElementById('compose-subject')?.value?.trim();
  const body = document.getElementById('compose-body')?.value?.trim();
  const provider = document.getElementById('compose-provider')?.value;

  if (!to) { if (errEl) { errEl.textContent = 'Destinatário obrigatório'; errEl.style.display = 'block'; } return; }
  if (!body) { if (errEl) { errEl.textContent = 'Mensagem obrigatória'; errEl.style.display = 'block'; } return; }

  if (btn) { btn.disabled = true; btn.textContent = 'Enviando...'; }
  if (errEl) errEl.style.display = 'none';

  try {
    let action = 'send';
    let payload = { provider, to, subject: subject || '(sem assunto)', body };

    if (emailState.replyTo) {
      action = 'reply';
      payload = { ...payload, originalId: emailState.replyTo.emailId, action: 'reply' };
    } else if (emailState.forwardFrom) {
      action = 'forward';
      payload = { ...payload, originalId: emailState.forwardFrom.emailId, action: 'forward' };
    }

    const r = await fetch(`${EMAIL_API}?action=${action}`, {
      method: 'POST', credentials: 'same-origin',
      headers: {'content-type':'application/json'},
      body: JSON.stringify(payload)
    });
    const d = await r.json();

    if (d.ok) {
      emailCloseCompose();
      showToast('Email enviado com sucesso!', 'success');
      emailState.replyTo = null;
      emailState.forwardFrom = null;
      await emailLoad();
    } else {
      if (errEl) { errEl.textContent = d.error || 'Erro ao enviar email'; errEl.style.display = 'block'; }
    }
  } catch(e) {
    if (errEl) { errEl.textContent = 'Erro de conexão'; errEl.style.display = 'block'; }
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i data-lucide="send" class="pg-icon" aria-hidden="true"></i> Enviar'; }
  }
}

// ─── Anexar arquivo ao email ──────────────────────────────────────────────────
function emailAttachFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '*/*';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    // Mostrar nome do arquivo no compose
    const attachEl = document.getElementById('compose-attachments');
    if (attachEl) {
      attachEl.innerHTML += `<div style="display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 8px;background:var(--bg-elevated);border-radius:6px;margin-top:4px">
        <i data-lucide="paperclip" style="width:12px;height:12px" aria-hidden="true"></i>
        ${emailEsc(file.name)} (${(file.size/1024).toFixed(1)}KB)
        <button onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px">×</button>
      </div>`;
      if (window.lucide) lucide.createIcons();
    }
    showToast(`${file.name} anexado`, 'info');
  };
  input.click();
}

// ─── Controles de UI ──────────────────────────────────────────────────────────
function emailSetView(view, el) {
  emailState.view = view;
  document.querySelectorAll('.email-folder').forEach(f => f.classList.remove('active'));
  if (el) el.classList.add('active');
  emailRenderList();
}

function emailFilterList(value) {
  emailState.filter = value;
  if (emailState.view !== 'inbox') emailRenderList();
  else emailSearch(value);
}

function emailRefresh() {
  showToast('Atualizando...', 'info');
  emailLoad().then(() => {
    if (emailState.view === 'inbox') emailLoadInbox(emailState.selectedProvider);
    showToast('Atualizado', 'success');
  });
}

function emailOpenCompose() {
  emailState.replyTo = null;
  emailState.forwardFrom = null;
  const toEl = document.getElementById('compose-to');
  const subjectEl = document.getElementById('compose-subject');
  const bodyEl = document.getElementById('compose-body');
  const errEl = document.getElementById('compose-error');
  if (toEl) toEl.value = '';
  if (subjectEl) subjectEl.value = '';
  if (bodyEl) bodyEl.value = '';
  if (errEl) errEl.style.display = 'none';
  // Atualizar opções de provedor
  const sel = document.getElementById('compose-provider');
  if (sel) {
    const connected = emailState.providers.filter(p => p.connected && ['gmail','outlook','smtp'].includes(p.id));
    sel.innerHTML = connected.length
      ? connected.map(p => `<option value="${emailEsc(p.id)}">${emailEsc(p.name)}</option>`).join('')
      : '<option value="gmail">Gmail</option><option value="outlook">Outlook</option><option value="smtp">SMTP</option>';
  }
  const modal = document.getElementById('modal-email-compose');
  if (modal) modal.style.display = '';
}

function emailCloseCompose() {
  const modal = document.getElementById('modal-email-compose');
  if (modal) modal.style.display = 'none';
}

function emailShowPage(page) {
  if (page === 'integrations') {
    document.getElementById('page-email').style.display = 'none';
    document.getElementById('page-email-integrations').style.display = '';
    emailRenderIntegrationsGrid();
  } else {
    document.getElementById('page-email-integrations').style.display = 'none';
    document.getElementById('page-email').style.display = '';
  }
}

function emailRenderIntegrationsGrid() {
  const grid = document.getElementById('email-integrations-grid');
  if (!grid) return;
  const emailProviders = emailState.providers.filter(p => ['gmail','outlook','smtp'].includes(p.id));
  if (!emailProviders.length) {
    grid.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted);grid-column:1/-1">Carregando provedores...</div>';
    emailLoad().then(() => emailRenderIntegrationsGrid());
    return;
  }
  grid.innerHTML = emailProviders.map(p => `
    <div class="integration-card" style="border-color:${p.color ? p.color + '40' : 'var(--border)'}">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div style="width:48px;height:48px;border-radius:10px;background:${p.color || 'var(--bg-elevated)'};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px">${emailEsc(p.name.charAt(0))}</div>
        <div style="flex:1">
          <div style="font-weight:600">${emailEsc(p.name)}</div>
          <div style="font-size:12px;color:var(--text-muted)">${emailEsc(p.accountEmail || (p.connected ? 'Conectado' : 'Não configurado'))}</div>
        </div>
        <div style="font-size:11px;padding:4px 8px;border-radius:4px;background:${p.connected ? 'rgba(16,185,129,.15)' : 'rgba(245,158,11,.15)'};color:${p.connected ? '#10B981' : '#F59E0B'}">${p.connected ? 'Conectado' : 'Não conectado'}</div>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">${emailEsc(p.setupMessage || (p.connected ? 'Conta conectada e pronta para uso' : 'Clique em Conectar para autorizar'))}</div>
      <div style="display:flex;gap:8px">
        ${p.connected ? `
          <button class="btn btn-ghost" style="flex:1;font-size:12px" onclick="emailSyncProvider('${emailEsc(p.id)}')"><i data-lucide="refresh-cw" class="pg-icon" aria-hidden="true"></i> Sincronizar</button>
          <button class="btn btn-ghost" style="flex:1;font-size:12px" onclick="emailLoadInbox('${emailEsc(p.id)}');emailShowPage('inbox')">Ver Inbox</button>
        ` : `
          <button class="btn btn-primary" style="flex:1;font-size:12px" onclick="emailConnectProvider('${emailEsc(p.id)}')"><i data-lucide="plug-zap" class="pg-icon" aria-hidden="true"></i> Conectar ${emailEsc(p.name)}</button>
        `}
      </div>
    </div>
  `).join('');
  if (window.lucide) lucide.createIcons();
}

// ─── Form handler ─────────────────────────────────────────────────────────────
document.getElementById('email-compose-form')?.addEventListener('submit', emailSendCompose);

// ─── Inicialização ────────────────────────────────────────────────────────────
emailLoad();
// Carregar inbox automaticamente
setTimeout(() => {
  if (emailState.view === 'inbox') emailLoadInbox(emailState.selectedProvider);
}, 500);

// Recarregar quando o módulo for exibido
document.addEventListener('moduleShown', (e) => {
  if (e.detail?.module === 'email') {
    emailLoad();
    if (emailState.view === 'inbox') emailLoadInbox(emailState.selectedProvider);
  }
});
</script>
