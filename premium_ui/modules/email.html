<!-- LifeOS Enterprise — Email Module v2.0 -->
<!-- Real API integration: /api/communication/hub (providers) + /api/comm-hub (send/history) -->
<div id="module-email" style="display:none">

<!-- ─── INBOX UNIFICADA ─── -->
<div class="page" id="page-email">
  <div class="page-header">
    <div>
      <div class="page-title"><i data-lucide="mail" class="pg-icon" aria-hidden="true"></i> Email</div>
      <div class="page-subtitle">Inbox unificada — seus emails e envio direto</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="emailShowPage('integrations')">Contas</button>
      <button class="btn btn-primary" onclick="emailOpenCompose()"><i data-lucide="pencil" class="pg-icon" aria-hidden="true"></i> Novo Email</button>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:200px 1fr;gap:0;height:calc(100vh - 160px);background:var(--bg-card);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden">
    <!-- Sidebar -->
    <div style="border-right:1px solid var(--border);display:flex;flex-direction:column">
      <div style="padding:12px;border-bottom:1px solid var(--border)">
        <div style="font-size:10px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px">Provedores</div>
        <div id="email-providers-list" style="font-size:12px;color:var(--text-muted)">Carregando...</div>
      </div>
      <!-- Pastas -->
      <div style="flex:1;overflow-y:auto;padding:8px">
        <div class="email-folder active" onclick="emailSetView('history',this)">
          <span><i data-lucide="clock" class="pg-icon" aria-hidden="true"></i></span><span style="flex:1;margin-left:8px">Histórico</span><span class="email-count" id="email-count-history">—</span>
        </div>
        <div class="email-folder" onclick="emailSetView('inbox',this)">
          <span><i data-lucide="download" class="pg-icon" aria-hidden="true"></i></span><span style="flex:1;margin-left:8px">Inbox</span><span class="email-count" id="email-count-inbox">—</span>
        </div>
        <div class="email-folder" onclick="emailSetView('sent',this)">
          <span><i data-lucide="upload" class="pg-icon" aria-hidden="true"></i></span><span style="flex:1;margin-left:8px">Enviados</span>
        </div>
        <div class="email-folder" onclick="emailSetView('queue',this)">
          <span><i data-lucide="loader" class="pg-icon" aria-hidden="true"></i></span><span style="flex:1;margin-left:8px">Fila</span><span class="email-count" id="email-count-queue">—</span>
        </div>
        <div class="email-folder" onclick="emailSetView('logs',this)">
          <span><i data-lucide="activity" class="pg-icon" aria-hidden="true"></i></span><span style="flex:1;margin-left:8px">Logs</span>
        </div>
      </div>
    </div>

    <!-- Lista + Visualizador -->
    <div style="display:flex;flex-direction:column">
      <div style="padding:10px;border-bottom:1px solid var(--border);display:flex;gap:8px">
        <input type="text" class="form-input" id="email-search" placeholder=" Buscar no histórico..." style="flex:1;font-size:12px" oninput="emailFilterList(this.value)" />
        <button class="btn btn-ghost" style="padding:8px" onclick="emailRefresh()">↻</button>
      </div>
      <div style="flex:1;overflow-y:auto" id="email-list">
        <div style="padding:32px;text-align:center;color:var(--text-muted)">Carregando emails...</div>
      </div>
    </div>
  </div>
</div>

<!-- ─── EMAIL INTEGRATIONS ─── -->
<div class="page" id="page-email-integrations" style="display:none">
  <div class="page-header">
    <div>
      <div class="page-title"><i data-lucide="mail" class="pg-icon" aria-hidden="true"></i> Contas de Email</div>
      <div class="page-subtitle">Gerencie suas contas e provedores de email</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="emailShowPage('inbox')">Inbox</button>
    </div>
  </div>
  <div id="email-integrations-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px">
    <div style="padding:32px;text-align:center;color:var(--text-muted);grid-column:1/-1">Carregando provedores...</div>
  </div>
</div>

<!-- ─── COMPOSE MODAL ─── -->
<div id="modal-email-compose" class="modal" style="display:none">
  <div class="modal-backdrop" onclick="emailCloseCompose()"></div>
  <div class="modal-content" style="width:600px;max-width:90vw">
    <div class="modal-header">
      <div class="modal-title"><i data-lucide="pencil" class="pg-icon" aria-hidden="true"></i> Novo Email</div>
      <button class="modal-close" onclick="emailCloseCompose()"><i data-lucide="x" class="pg-icon" aria-hidden="true"></i></button>
    </div>
    <div class="modal-body">
      <form id="email-compose-form">
        <div style="margin-bottom:10px">
          <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Provedor</label>
          <select id="compose-provider" class="form-input" style="width:100%">
            <option value="gmail">Gmail</option>
            <option value="outlook">Outlook</option>
            <option value="smtp">SMTP</option>
          </select>
        </div>
        <div style="margin-bottom:10px">
          <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Para</label>
          <input type="email" id="compose-to" class="form-input" style="width:100%" required placeholder="destinatario@email.com">
        </div>
        <div style="margin-bottom:10px">
          <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Assunto</label>
          <input type="text" id="compose-subject" class="form-input" style="width:100%" placeholder="Assunto do email">
        </div>
        <div style="margin-bottom:10px">
          <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Mensagem</label>
          <textarea id="compose-body" class="form-input" style="width:100%;min-height:200px;resize:vertical" placeholder="Escreva sua mensagem..."></textarea>
        </div>
        <div id="compose-error" style="color:var(--red);font-size:12px;margin-bottom:10px;display:none"></div>
        <div style="display:flex;justify-content:flex-end;gap:8px">
          <button type="button" class="btn btn-ghost" onclick="emailCloseCompose()">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="compose-send-btn"><i data-lucide="send" class="pg-icon" aria-hidden="true"></i> Enviar</button>
        </div>
      </form>
    </div>
  </div>
</div>

</div>
<!-- END module-email -->

<script>
(() => {
  'use strict';
  const COMM_HUB = '/api/communication/hub';
  const SEND_API = '/api/comm-hub';
  let state = { providers: [], history: [], queue: [], logs: [], view: 'history', filter: '' };

  function esc(v) { return String(v ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
  function fmtDate(d) { if (!d) return '—'; try { return new Date(d).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' }); } catch { return String(d); } }

  async function fetchJSON(url) {
    const res = await fetch(url, { credentials: 'same-origin' });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) throw new Error(data.error || 'Erro na requisição');
    return data;
  }

  async function sendJSON(url, body) {
    const res = await fetch(url, {
      method: 'POST', credentials: 'same-origin',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) throw new Error(data.error || 'Erro na operação');
    return data;
  }

  async function emailLoad() {
    try {
      const [statusData, histData, queueData] = await Promise.all([
        fetchJSON(`${COMM_HUB}?view=status`),
        fetchJSON(`${SEND_API}?action=history`).catch(() => ({ ok: true, history: [] })),
        fetchJSON(`${SEND_API}?action=queue`).catch(() => ({ ok: true, queue: [] })),
      ]);
      state.providers = statusData.providers || [];
      state.history = histData.history || [];
      state.queue = queueData.queue || [];
      renderProviders();
      renderList();
    } catch (err) {
      /* error handled */
    }
  }

  function renderProviders() {
    const list = document.getElementById('email-providers-list');
    const grid = document.getElementById('email-integrations-grid');
    const connected = state.providers.filter(p => p.connected);
    list.innerHTML = connected.length
      ? connected.map(p => `<div style="margin-bottom:4px;display:flex;align-items:center;gap:6px"><span style="width:6px;height:6px;border-radius:50%;background:#10B981"></span>${esc(p.name)}</div>`).join('')
      : '<div style="color:var(--text-muted)">Nenhum conectado</div>';

    document.getElementById('email-count-history').textContent = state.history.length || '—';
    document.getElementById('email-count-queue').textContent = state.queue.length || '—';

    // Render integrations grid
    const emailProviders = state.providers.filter(p => ['gmail','outlook','smtp'].includes(p.id));
    grid.innerHTML = emailProviders.map(p => `
      <div class="integration-card" style="border-color:${p.color ? p.color + '40' : 'var(--border)'}">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          <div style="width:48px;height:48px;border-radius:10px;background:${p.color || 'var(--bg-elevated)'};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px">${p.name.charAt(0)}</div>
          <div style="flex:1">
            <div style="font-weight:600">${esc(p.name)}</div>
            <div style="font-size:12px;color:var(--text-muted)">${esc(p.accountEmail || 'Não configurado')}</div>
          </div>
          <div style="font-size:11px;padding:4px 8px;border-radius:4px;background:${p.connected ? 'rgba(16,185,129,.15)' : 'rgba(245,158,11,.15)'};color:${p.connected ? '#10B981' : '#F59E0B'}">${p.connected ? 'Conectado' : 'Não conectado'}</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" style="flex:1;font-size:12px" onclick="emailSyncProvider('${esc(p.id)}')"><i data-lucide="refresh-cw" class="pg-icon" aria-hidden="true"></i> Sincronizar</button>
          ${!p.connected ? `<button class="btn btn-primary" style="flex:1;font-size:12px" onclick="emailConnectProvider('${esc(p.id)}')">Conectar</button>` : ''}
        </div>
      </div>
    `).join('') || '<div style="padding:32px;text-align:center;color:var(--text-muted);grid-column:1/-1">Nenhum provedor de email disponível. Configure Gmail ou Outlook nas integrações.</div>';
  }

  function renderList() {
    const container = document.getElementById('email-list');
    let items = [];

    if (state.view === 'history' || state.view === 'sent') {
      items = state.history.filter(h => !state.view || h.status !== 'failed').map(h => ({
        type: 'history',
        from: 'Eu',
        to: h.to || '—',
        subject: h.subject || 'Sem assunto',
        time: fmtDate(h.sentAt),
        status: h.status,
        provider: h.provider || '',
        id: h.id,
        error: h.error,
      }));
    } else if (state.view === 'queue') {
      items = state.queue.map(q => ({
        type: 'queue',
        to: q.to || '—',
        subject: q.subject || 'Sem assunto',
        time: fmtDate(q.queuedAt || q.createdAt),
        status: q.status || 'queued',
        provider: q.provider || '',
        attempts: q.attempts || 0,
      }));
    } else if (state.view === 'inbox') {
      items = []; // Inbox requires Gmail/Outlook API access — show empty with message
    } else if (state.view === 'logs') {
      // Show last 20 history entries as logs
      items = state.history.slice(0, 20).map(h => ({
        type: 'log',
        from: h.provider || '—',
        to: h.to || '—',
        subject: h.subject || '—',
        time: fmtDate(h.sentAt),
        status: h.status,
      }));
    }

    // Apply filter
    if (state.filter) {
      const f = state.filter.toLowerCase();
      items = items.filter(i => (i.to + i.subject + i.from + i.status).toLowerCase().includes(f));
    }

    if (!items.length && state.view === 'inbox') {
      container.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted)">Conecte uma conta Gmail ou Outlook para visualizar a inbox. O inbox real requer OAuth com escopo de leitura de emails.</div>';
      return;
    }

    if (!items.length) {
      container.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted)">Nenhum item nesta visualização.</div>';
      return;
    }

    container.innerHTML = items.map(item => {
      const statusColor = item.status === 'sent' || item.status === 'success' ? 'var(--green)' :
                          item.status === 'failed' ? 'var(--red)' :
                          item.status === 'queued' ? 'var(--amber)' : 'var(--text-muted)';
      return `
      <div class="email-item ${item.status === 'queued' ? '' : ''}" style="padding:12px;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:36px;height:36px;border-radius:50%;background:${item.provider === 'gmail' ? 'linear-gradient(135deg,#EA4335,#FBBC04)' : item.provider === 'outlook' ? 'linear-gradient(135deg,#0078D4,#00B4FF)' : 'var(--bg-elevated)'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff">${(item.from || 'E').charAt(0)}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;justify-content:space-between">
              <span style="font-size:13px;font-weight:600">${esc(item.type === 'history' ? item.to : item.from)}</span>
              <span style="font-size:11px;color:var(--text-muted)">${esc(item.time)}</span>
            </div>
            <div style="font-size:12px;font-weight:600;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.subject)}</div>
            ${item.error ? `<div style="font-size:11px;color:var(--red);margin-top:2px">${esc(item.error)}</div>` : ''}
          </div>
          <span style="font-size:10px;padding:3px 8px;border-radius:4px;background:${statusColor}20;color:${statusColor};flex-shrink:0">${esc(item.status)}</span>
        </div>
      </div>`;
    }).join('');
  }

  // ─── PUBLIC API ───
  window.emailShowPage = (page) => {
    if (page === 'integrations') {
      document.getElementById('page-email').style.display = 'none';
      document.getElementById('page-email-integrations').style.display = '';
      renderProviders();
    } else {
      document.getElementById('page-email-integrations').style.display = 'none';
      document.getElementById('page-email').style.display = '';
    }
  };

  window.emailSetView = (view, el) => {
    state.view = view;
    document.querySelectorAll('.email-folder').forEach(f => f.classList.remove('active'));
    if (el) el.classList.add('active');
    renderList();
  };

  window.emailFilterList = (value) => {
    state.filter = value;
    renderList();
  };

  window.emailRefresh = async () => {
    if (typeof showToast === 'function') showToast('Atualizando...', 'info');
    await emailLoad();
    if (typeof showToast === 'function') showToast('Atualizado', 'success');
  };

  window.emailOpenCompose = () => {
    document.getElementById('compose-error').style.display = 'none';
    document.getElementById('compose-to').value = '';
    document.getElementById('compose-subject').value = '';
    document.getElementById('compose-body').value = '';
    // Update provider options based on connected providers
    const sel = document.getElementById('compose-provider');
    const connected = state.providers.filter(p => p.connected);
    sel.innerHTML = connected.length
      ? connected.filter(p => p.type === 'email').map(p => `<option value="${esc(p.id)}">${esc(p.name)}</option>`).join('')
      : '<option value="gmail">Gmail</option><option value="outlook">Outlook</option><option value="smtp">SMTP</option>';
    document.getElementById('modal-email-compose').style.display = '';
  };

  window.emailCloseCompose = () => {
    document.getElementById('modal-email-compose').style.display = 'none';
  };

  window.emailSyncProvider = async (providerId) => {
    try {
      if (typeof showToast === 'function') showToast('Sincronizando ' + providerId + '...', 'info');
      await sendJSON(`${COMM_HUB}?action=sync&provider=${encodeURIComponent(providerId)}`, {});
      if (typeof showToast === 'function') showToast(providerId + ' sincronizado', 'success');
      await emailLoad();
    } catch (err) {
      if (typeof showToast === 'function') showToast(err.message, 'error');
    }
  };

  window.emailConnectProvider = async (providerId) => {
    try {
      if (typeof showToast === 'function') showToast('Iniciando conexão com ' + providerId + '...', 'info');
      const result = await sendJSON(`${COMM_HUB}?action=connect&provider=${encodeURIComponent(providerId)}`, {});
      if (result.authUrl) {
        window.location.href = result.authUrl;
      } else {
        if (typeof showToast === 'function') showToast(providerId + ': siga as instruções', 'info');
      }
    } catch (err) {
      if (typeof showToast === 'function') showToast(err.message, 'error');
    }
  };

  // ─── FORM HANDLER ───
  document.getElementById('email-compose-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('compose-send-btn');
    btn.disabled = true;
    btn.textContent = 'Enviando...';
    const errEl = document.getElementById('compose-error');

    try {
      const result = await sendJSON(`${SEND_API}?action=send`, {
        provider: document.getElementById('compose-provider').value,
        to: document.getElementById('compose-to').value.trim(),
        subject: document.getElementById('compose-subject').value.trim(),
        body: document.getElementById('compose-body').value.trim(),
      });
      emailCloseCompose();
      if (typeof showToast === 'function') showToast('Email enviado com sucesso', 'success');
      await emailLoad();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="send" class="pg-icon" aria-hidden="true"></i> Enviar';
    }
  });

  // ─── INIT ───
  emailLoad();
})();
</script>
