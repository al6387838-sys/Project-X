<!-- LifeOS Enterprise — Módulo Documentos v8.1 (100% dinâmico) -->
<div id="module-documents" style="display:none">

<!-- ─── DOCUMENTOS ─── -->
<div class="page" id="page-documents">
  <div class="page-header">
    <div>
      <div class="page-title"><i data-lucide="folder" class="pg-icon" aria-hidden="true"></i> Documentos</div>
      <div class="page-subtitle">Armazenamento, OCR e assinatura digital</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="docsView('grid')" id="docs-btn-grid"><i data-lucide="layout-grid" class="pg-icon" aria-hidden="true"></i></button>
      <button class="btn btn-ghost" onclick="docsView('list')" id="docs-btn-list"><i data-lucide="circle-dot" class="pg-icon" aria-hidden="true"></i></button>
      <button class="btn btn-ghost" onclick="docsCreateFolder()"><i data-lucide="folder" class="pg-icon" aria-hidden="true"></i> Nova Pasta</button>
      <button class="btn btn-primary" onclick="docsUpload()">⬆️ Upload</button>
    </div>
  </div>

  <!-- Barra de busca e filtros -->
  <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
    <input type="text" class="form-input" id="docs-search-input" placeholder=" Buscar documentos, conteúdo (OCR)..." style="flex:1;min-width:200px" onkeyup="docsSearch(event)" />
    <select class="form-input" id="docs-type-filter" style="width:auto" onchange="docsLoadCurrent()">
      <option value="">Todos os tipos</option>
      <option value="pdf">PDF</option>
      <option value="png">Imagem</option>
      <option value="doc">Word/Docs</option>
      <option value="xls">Excel/Sheets</option>
      <option value="ppt">Apresentação</option>
    </select>
    <select class="form-input" id="docs-date-filter" style="width:auto" onchange="docsLoadCurrent()">
      <option value="">Qualquer data</option>
      <option value="today">Hoje</option>
      <option value="week">Esta semana</option>
      <option value="month">Este mês</option>
    </select>
  </div>

  <!-- Breadcrumb -->
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:16px;font-size:13px">
    <span style="color:var(--accent);cursor:pointer" onclick="docsGoRoot()"><i data-lucide="folder" class="pg-icon" aria-hidden="true"></i> Meus Documentos</span>
    <span style="color:var(--text-muted)">/</span>
    <span id="docs-breadcrumb-current" style="color:var(--text-secondary)">Raiz</span>
  </div>

  <!-- KPIs de armazenamento -->
  <div class="grid-4" style="margin-bottom:20px" id="docs-kpi-container">
    <div class="card kpi-card">
      <div class="kpi-icon" style="background:rgba(99,102,241,0.15);color:var(--accent)"><i data-lucide="circle-dot" class="pg-icon" aria-hidden="true"></i></div>
      <div class="kpi-value" id="docs-kpi-storage">—</div>
      <div class="kpi-label">Usado de 10 GB</div>
      <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" id="docs-storage-bar" style="width:0%"></div></div>
    </div>
    <div class="card kpi-card">
      <div class="kpi-icon" style="background:rgba(239,68,68,0.15);color:var(--red)"><i data-lucide="file-text" class="pg-icon" aria-hidden="true"></i></div>
      <div class="kpi-value" id="docs-kpi-total">—</div>
      <div class="kpi-label">Documentos</div>
    </div>
    <div class="card kpi-card">
      <div class="kpi-icon" style="background:rgba(16,185,129,0.15);color:var(--green)"><i data-lucide="search" class="pg-icon" aria-hidden="true"></i></div>
      <div class="kpi-value" id="docs-kpi-favorites">—</div>
      <div class="kpi-label">Favoritos</div>
    </div>
    <div class="card kpi-card">
      <div class="kpi-icon" style="background:rgba(245,158,11,0.15);color:var(--amber)"><i data-lucide="circle-dot" class="pg-icon" aria-hidden="true"></i></div>
      <div class="kpi-value" id="docs-kpi-trash">—</div>
      <div class="kpi-label">Na Lixeira</div>
    </div>
  </div>

  <!-- Grade de documentos -->
  <div id="docs-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px">
    <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)">
      <div style="font-size:32px;margin-bottom:8px"><i data-lucide="folder-open" class="pg-icon" aria-hidden="true"></i></div>
      <div style="font-size:14px">Carregando documentos...</div>
    </div>
  </div>
</div>

<!-- ─── VISUALIZADOR DE DOCUMENTO ─── -->
<div class="page" id="page-document-viewer">
  <div class="page-header">
    <div>
      <div class="page-title" id="doc-viewer-title">—</div>
      <div class="page-subtitle" id="doc-viewer-subtitle">—</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="showPage('documents')"><i data-lucide="arrow-left" class="pg-icon" aria-hidden="true"></i> Voltar</button>
      <button class="btn btn-ghost" onclick="docDownloadViewer()"><i data-lucide="download" class="pg-icon" aria-hidden="true"></i> Baixar</button>
      <button class="btn btn-ghost" onclick="docShareViewer()"><i data-lucide="link-2" class="pg-icon" aria-hidden="true"></i> Compartilhar</button>
      <button class="btn btn-primary" onclick="openModal('modal-sign-doc')"><i data-lucide="circle-dot" class="pg-icon" aria-hidden="true"></i> Assinar</button>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 300px;gap:16px">
    <!-- Preview do documento -->
    <div class="card" style="min-height:500px;display:flex;align-items:center;justify-content:center;background:var(--bg-elevated)" id="doc-viewer-preview">
      <div style="text-align:center;padding:40px">
        <div style="font-size:64px;margin-bottom:16px"><i data-lucide="file-text" class="pg-icon" aria-hidden="true"></i></div>
        <div style="font-size:18px;font-weight:700;margin-bottom:8px" id="doc-viewer-name-display">—</div>
        <div style="font-size:13px;color:var(--text-secondary);max-width:400px;line-height:1.6">Selecione um documento para visualizar.</div>
      </div>
    </div>
    <!-- Painel lateral -->
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="card">
        <div class="card-title">Informações</div>
        <div style="display:flex;flex-direction:column;gap:8px;font-size:13px" id="doc-viewer-info">
          <div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">Tipo</span><span id="doc-viewer-type">—</span></div>
          <div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">Tamanho</span><span id="doc-viewer-size">—</span></div>
          <div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">Criado</span><span id="doc-viewer-created">—</span></div>
          <div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">Favorito</span><span id="doc-viewer-favorite">—</span></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Ações</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="btn btn-ghost" style="width:100%;font-size:12px" onclick="docRenameViewer()"><i data-lucide="circle-dot" class="pg-icon" aria-hidden="true"></i> Renomear</button>
          <button class="btn btn-ghost" style="width:100%;font-size:12px" onclick="docEditViewer()"><i data-lucide="circle-dot" class="pg-icon" aria-hidden="true"></i> Editar</button>
          <button class="btn btn-ghost" style="width:100%;font-size:12px" onclick="docUploadNewVersion()"><i data-lucide="circle-dot" class="pg-icon" aria-hidden="true"></i> Nova versão</button>
          <button class="btn btn-ghost" style="width:100%;font-size:12px" onclick="docMoveViewer()"><i data-lucide="circle-dot" class="pg-icon" aria-hidden="true"></i> Mover</button>
          <button class="btn btn-ghost" style="width:100%;font-size:12px" onclick="docToggleFavoriteViewer()"><i data-lucide="circle-dot" class="pg-icon" aria-hidden="true"></i> Favoritar</button>
          <button class="btn btn-ghost" style="width:100%;font-size:12px" onclick="docCopyViewer()"><i data-lucide="circle-dot" class="pg-icon" aria-hidden="true"></i> Copiar</button>
          <button class="btn btn-ghost" style="width:100%;font-size:12px;color:var(--red)" onclick="docDeleteViewer()"><i data-lucide="circle-dot" class="pg-icon" aria-hidden="true"></i> Excluir</button>
        </div>
      </div>
    </div>
  </div>
</div>

</div>
<!-- END module-documents -->
