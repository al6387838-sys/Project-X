<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Smart Search — LifeOS Enterprise</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base: #0A0E14; --bg-elevated: #0F1520; --bg-card: #141B28;
      --border: rgba(255,255,255,0.06); --border-accent: rgba(99,102,241,0.3);
      --text-primary: #F0F4FF; --text-secondary: #8892A4; --text-muted: #4A5568;
      --accent: #6366F1; --accent-light: #818CF8; --purple: #8B5CF6;
      --cyan: #06B6D4; --green: #10B981; --amber: #F59E0B; --red: #EF4444;
      --gradient-primary: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px;
    }
    body { font-family: 'Inter', -apple-system, sans-serif; background: transparent; color: var(--text-primary); font-size: 14px; }

    /* ── SEARCH BAR ── */
    .ss-bar-wrap { position: relative; margin-bottom: 20px; }
    .ss-bar {
      width: 100%; background: var(--bg-card); border: 1.5px solid var(--border-accent);
      border-radius: var(--radius-lg); padding: 14px 20px 14px 52px;
      font-size: 16px; color: var(--text-primary); font-family: inherit; outline: none;
      transition: all 0.2s; box-shadow: 0 0 0 0 rgba(99,102,241,0);
    }
    .ss-bar:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
    .ss-bar-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 18px; color: var(--text-muted); pointer-events: none; }
    .ss-bar-clear { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.06); border: none; border-radius: 6px; width: 26px; height: 26px; display: none; align-items: center; justify-content: center; cursor: pointer; color: var(--text-secondary); font-size: 12px; }
    .ss-bar-clear.visible { display: flex; }
    .ss-bar-clear:hover { background: rgba(255,255,255,0.1); }
    .ss-shortcut { position: absolute; right: 52px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--text-muted); background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; pointer-events: none; }

    /* ── FILTERS ── */
    .ss-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .ss-filter { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); transition: all 0.15s; display: flex; align-items: center; gap: 5px; }
    .ss-filter:hover { border-color: rgba(99,102,241,0.3); color: var(--text-primary); }
    .ss-filter.active { background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.4); color: var(--accent-light); }
    .ss-filter-count { background: rgba(99,102,241,0.2); color: var(--accent-light); font-size: 10px; padding: 1px 5px; border-radius: 8px; }

    /* ── RECENT / FAVORITES ── */
    .ss-section { margin-bottom: 24px; }
    .ss-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 10px; }
    .ss-recent-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .ss-recent-tag { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 12px; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .ss-recent-tag:hover { border-color: var(--border-accent); color: var(--text-primary); }

    /* ── RESULTS ── */
    .ss-results { display: flex; flex-direction: column; gap: 4px; }
    .ss-result-item {
      display: flex; align-items: center; gap: 14px; padding: 12px 16px;
      border-radius: var(--radius-md); cursor: pointer; transition: all 0.15s;
      border: 1px solid transparent;
    }
    .ss-result-item:hover { background: var(--bg-card); border-color: var(--border); }
    .ss-result-item.focused { background: var(--bg-card); border-color: var(--border-accent); }
    .ss-result-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .ss-result-content { flex: 1; min-width: 0; }
    .ss-result-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ss-result-title mark { background: rgba(99,102,241,0.25); color: var(--accent-light); border-radius: 2px; padding: 0 2px; }
    .ss-result-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .ss-result-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; flex-shrink: 0; }
    .ss-result-action { font-size: 11px; color: var(--text-muted); flex-shrink: 0; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; }

    /* ── FAVORITE BUTTON ── */
    .ss-result-fav { font-size: 13px; color: var(--text-muted); flex-shrink: 0; cursor: pointer; padding: 4px; border-radius: 4px; transition: all 0.15s; }
    .ss-result-fav:hover { color: var(--amber); }
    .ss-result-fav.active { color: var(--amber); }

    /* ── GROUP HEADER ── */
    .ss-group-header { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); padding: 12px 16px 6px; display: flex; align-items: center; gap: 8px; }
    .ss-group-divider { flex: 1; height: 1px; background: var(--border); }

    /* ── EMPTY / LOADING ── */
    .ss-empty { text-align: center; padding: 48px 20px; }
    .ss-empty-icon { font-size: 48px; margin-bottom: 12px; }
    .ss-empty-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .ss-empty-desc { font-size: 13px; color: var(--text-muted); }
    .ss-loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 32px; color: var(--text-muted); font-size: 13px; }
    .ss-spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── KEYBOARD HINT ── */
    .ss-keyboard-hints { display: flex; gap: 16px; padding: 12px 16px; border-top: 1px solid var(--border); margin-top: 16px; }
    .ss-hint { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
    .ss-key { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; font-size: 10px; font-weight: 700; color: var(--text-secondary); }

    /* ── STATS BAR ── */
    .ss-stats { display: flex; gap: 16px; padding: 10px 16px; background: var(--bg-card); border-radius: var(--radius-md); margin-bottom: 16px; border: 1px solid var(--border); flex-wrap: wrap; }
    .ss-stat { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
    .ss-stat-val { font-weight: 700; color: var(--text-primary); }
    .ss-stat-sep { color: var(--border); }

    /* ── SUGGESTIONS ── */
    .ss-suggestions { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
    .ss-suggestion { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); cursor: pointer; transition: all 0.15s; }
    .ss-suggestion:hover { border-color: var(--border-accent); background: var(--bg-elevated); }
    .ss-suggestion-icon { font-size: 16px; color: var(--accent-light); }
    .ss-suggestion-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .ss-suggestion-type { font-size: 10px; color: var(--text-muted); }
  </style>
</head>
<body>
  <!-- SEARCH BAR -->
  <div class="ss-bar-wrap">
    <span class="ss-bar-icon"><i data-lucide="search" class="pg-icon" aria-hidden="true"></i></span>
    <input class="ss-bar" id="ss-input" type="text" placeholder="Buscar em tudo: tarefas, documentos, fotos, mensagens, calendário, CRM..." autocomplete="off" />
    <span class="ss-shortcut" id="ss-shortcut-hint">⌘K</span>
    <button class="ss-bar-clear" id="ss-clear" onclick="clearSearch()" title="Limpar"><i data-lucide="x" class="pg-icon" aria-hidden="true"></i></button>
  </div>

  <!-- FILTERS -->
  <div class="ss-filters" id="ss-filters">
    <button class="ss-filter active" data-filter="all" onclick="setFilter('all', this)">Tudo <span class="ss-filter-count" id="fc-all">0</span></button>
    <button class="ss-filter" data-filter="tasks" onclick="setFilter('tasks', this)"><i data-lucide="circle-check" class="pg-icon" aria-hidden="true"></i> Tarefas</button>
    <button class="ss-filter" data-filter="projects" onclick="setFilter('projects', this)"><i data-lucide="folder" class="pg-icon" aria-hidden="true"></i> Projetos</button>
    <button class="ss-filter" data-filter="documents" onclick="setFilter('documents', this)"><i data-lucide="file-text" class="pg-icon" aria-hidden="true"></i> Documentos</button>
    <button class="ss-filter" data-filter="photos" onclick="setFilter('photos', this)"><i data-lucide="image" class="pg-icon" aria-hidden="true"></i> Fotos</button>
    <button class="ss-filter" data-filter="events" onclick="setFilter('events', this)"><i data-lucide="calendar" class="pg-icon" aria-hidden="true"></i> Calendário</button>
    <button class="ss-filter" data-filter="crm" onclick="setFilter('crm', this)"><i data-lucide="users" class="pg-icon" aria-hidden="true"></i> CRM</button>
    <button class="ss-filter" data-filter="messages" onclick="setFilter('messages', this)"><i data-lucide="message-circle" class="pg-icon" aria-hidden="true"></i> Mensagens</button>
    <button class="ss-filter" data-filter="habits" onclick="setFilter('habits', this)"><i data-lucide="refresh-cw" class="pg-icon" aria-hidden="true"></i> Hábitos</button>
    <button class="ss-filter" data-filter="goals" onclick="setFilter('goals', this)"><i data-lucide="target" class="pg-icon" aria-hidden="true"></i> Metas</button>
    <button class="ss-filter" data-filter="finance" onclick="setFilter('finance', this)"><i data-lucide="credit-card" class="pg-icon" aria-hidden="true"></i> Finanças</button>
  </div>

  <!-- MAIN AREA -->
  <div id="ss-main">
    <!-- FAVORITES -->
    <div class="ss-section" id="ss-favorites-section" style="display:none">
      <div class="ss-section-title">Favoritos de busca</div>
      <div class="ss-recent-tags" id="ss-favorites-tags"></div>
    </div>

    <!-- RECENT SEARCHES -->
    <div class="ss-section" id="ss-recent-section">
      <div class="ss-section-title">Buscas recentes</div>
      <div class="ss-recent-tags" id="ss-recent-tags"></div>
    </div>

    <!-- SUGGESTED -->
    <div class="ss-section" id="ss-suggested-section">
      <div class="ss-section-title">Acessar módulo</div>
      <div class="ss-suggestions" id="ss-suggestions"></div>
    </div>
  </div>

  <!-- RESULTS AREA (hidden initially) -->
  <div id="ss-results-area" style="display:none">
    <div class="ss-stats" id="ss-stats"></div>
    <div id="ss-results-list"></div>
    <div class="ss-keyboard-hints">
      <div class="ss-hint"><span class="ss-key">↑</span><span class="ss-key">↓</span> Navegar</div>
      <div class="ss-hint"><span class="ss-key">↵</span> Abrir</div>
      <div class="ss-hint"><span class="ss-key">Esc</span> Fechar</div>
      <div class="ss-hint"><span class="ss-key">f</span> Favoritar</div>
    </div>
  </div>

  <script>
    // ── STATE ──────────────────────────────────────────────────
    let currentFilter = 'all';
    let currentQuery = '';
    let focusedIndex = -1;
    let currentResults = [];
    let recentSearches = JSON.parse(localStorage.getItem('lifeos_recent_searches') || '[]');
    let favorites = JSON.parse(localStorage.getItem('lifeos_search_favorites') || '[]');
    let lastResults = null;

    // ── INIT ──────────────────────────────────────────────────
    const input = document.getElementById('ss-input');
    input.addEventListener('input', debounce(handleSearch, 180));
    input.addEventListener('keydown', handleKeyNav);
    input.focus();
    renderRecentTags();
    renderFavorites();
    renderSuggestions();

    // ── SEARCH HANDLER ───────────────────────────────────────
    function handleSearch() {
      const q = input.value.trim();
      currentQuery = q;
      const clearBtn = document.getElementById('ss-clear');
      const shortcut = document.getElementById('ss-shortcut-hint');
      clearBtn.classList.toggle('visible', q.length > 0);
      shortcut.style.display = q.length > 0 ? 'none' : '';
      if (!q) { showDefault(); return; }
      performSearch(q);
    }

    async function performSearch(q) {
      document.getElementById('ss-main').style.display = 'none';
      document.getElementById('ss-results-area').style.display = 'block';
      const listEl = document.getElementById('ss-results-list');
      listEl.innerHTML = '<div class="ss-loading"><div class="ss-spinner"></div> Buscando em seus dados reais...</div>';

      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&filter=${currentFilter}`, { credentials: 'same-origin' });
        const data = await res.json();
        if (data.ok && data.results) {
          lastResults = data.results;
          currentResults = data.results;
          renderResults(data.results, q, data.total);
        } else {
          currentResults = [];
          renderResults([], q, 0);
        }
      } catch (err) {
        currentResults = [];
        renderResults([], q, 0);
      }
    }

    function renderResults(results, q, total) {
      const statsEl = document.getElementById('ss-stats');
      const listEl = document.getElementById('ss-results-list');
      // Update filter count
      document.getElementById('fc-all').textContent = total || results.length;
      // Stats
      const counts = {};
      results.forEach(r => { const k = r.category || r.typeLabel || 'outro'; counts[k] = (counts[k] || 0) + 1; });
      statsEl.innerHTML = `<div class="ss-stat"><span class="ss-stat-val">${total || results.length}</span> resultado${(total || results.length) !== 1 ? 's' : ''}</div>` +
        Object.entries(counts).map(([k, v]) => `<span class="ss-stat-sep">·</span><div class="ss-stat"><span class="ss-stat-val">${v}</span> ${k}</div>`).join('');

      if (!results.length) {
        listEl.innerHTML = `<div class="ss-empty"><div class="ss-empty-icon"><i data-lucide="search-x" class="pg-icon" style="width:48px;height:48px"></i></div><div class="ss-empty-title">Nenhum resultado para "${q}"</div><div class="ss-empty-desc">Tente outros termos ou verifique os filtros ativos.</div></div>`;
        return;
      }
      // Group by category
      const groups = {};
      results.forEach(r => { const k = r.category || 'outro'; if (!groups[k]) groups[k] = []; groups[k].push(r); });
      let html = '';
      Object.entries(groups).forEach(([type, items]) => {
        html += `<div class="ss-group-header">${type} <div class="ss-group-divider"></div></div>`;
        items.forEach((item, i) => {
          const highlighted = item.title.replace(new RegExp(`(${escapeRegex(q)})`, 'gi'), '<mark>$1</mark>');
          const isFav = favorites.some(f => f.id === item.id && f.category === item.category);
          html += `<div class="ss-result-item" data-page="${item.category}" data-id="${item.id}" data-category="${item.category}" data-title="${escapeAttr(item.title)}" onclick="openResult('${item.category}', '${escapeAttr(item.title)}')">
            <div class="ss-result-icon" style="background:rgba(99,102,241,0.12)">${item.icon || '<i data-lucide="search" class="pg-icon"></i>'}</div>
            <div class="ss-result-content">
              <div class="ss-result-title">${highlighted}</div>
              <div class="ss-result-meta">${item.desc || ''}</div>
            </div>
            <span class="ss-result-fav ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite(this, '${item.id}', '${item.category}', '${escapeAttr(item.title)}')" title="Favoritar">${isFav ? '<i data-lucide="star" class="pg-icon" style="color:var(--amber);width:14px;height:14px"></i>' : '<i data-lucide="star" class="pg-icon" style="width:14px;height:14px"></i>'}</span>
            <span class="ss-result-action">Abrir →</span>
          </div>`;
        });
      });
      listEl.innerHTML = html;
      focusedIndex = -1;
    }

    // ── KEYBOARD NAV ───────────────────────────────────────
    function handleKeyNav(e) {
      const items = document.querySelectorAll('.ss-result-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        focusedIndex = Math.min(focusedIndex + 1, items.length - 1);
        updateFocus(items);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        focusedIndex = Math.max(focusedIndex - 1, 0);
        updateFocus(items);
      } else if (e.key === 'Enter' && focusedIndex >= 0) {
        items[focusedIndex]?.click();
      } else if (e.key === 'f' && focusedIndex >= 0 && items[focusedIndex]) {
        const item = items[focusedIndex];
        const favBtn = item.querySelector('.ss-result-fav');
        if (favBtn) favBtn.click();
      }
    }
    function updateFocus(items) {
      items.forEach((el, i) => el.classList.toggle('focused', i === focusedIndex));
      if (focusedIndex >= 0) items[focusedIndex]?.scrollIntoView({ block: 'nearest' });
    }

    // ── FILTER ────────────────────────────────────────────
    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.ss-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (currentQuery) performSearch(currentQuery);
    }

    // ── FAVORITES ─────────────────────────────────────────
    function toggleFavorite(el, id, category, title) {
      const idx = favorites.findIndex(f => f.id === id && f.category === category);
      if (idx >= 0) {
        favorites.splice(idx, 1);
        el.textContent = '☆';
        el.classList.remove('active');
      } else {
        favorites.push({ id, category, title, addedAt: Date.now() });
        el.textContent = '★';
        el.classList.add('active');
      }
      try { localStorage.setItem('lifeos_search_favorites', JSON.stringify(favorites)); } catch (_) {}
      renderFavorites();
    }

    function renderFavorites() {
      const section = document.getElementById('ss-favorites-section');
      const container = document.getElementById('ss-favorites-tags');
      if (!favorites.length) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      container.innerHTML = favorites.map(f =>
        `<span class="ss-recent-tag" onclick="navigateTo('${f.category}')"><i data-lucide="star" class="pg-icon" aria-hidden="true" style="color:var(--amber)"></i> ${escapeHtml(f.title)} <span style="color:var(--text-muted);font-size:10px">${f.category}</span></span>`
      ).join('');
    }

    // ── ACTIONS ──────────────────────────────────────────
    function openResult(page, title) {
      addRecentSearch(title);
      navigateTo(page);
    }

    function navigateTo(page) {
      // Try parent window first (embedded in iframe)
      if (window.parent && typeof window.parent.showPage === 'function') {
        window.parent.showPage(page);
      } else if (typeof window.showPage === 'function') {
        window.showPage(page);
      } else {
        // Fallback: try to call the global navigation
        const event = new CustomEvent('lifeos-navigate', { detail: { page } });
        document.dispatchEvent(event);
        // Also try window.location hash for SPA routing
        window.location.hash = '#/' + page;
      }
    }

    function fillSearch(q) {
      input.value = q;
      input.dispatchEvent(new Event('input'));
      input.focus();
    }

    function clearSearch() {
      input.value = '';
      currentQuery = '';
      currentResults = [];
      document.getElementById('ss-clear').classList.remove('visible');
      document.getElementById('ss-shortcut-hint').style.display = '';
      showDefault();
      input.focus();
    }

    function showDefault() {
      document.getElementById('ss-main').style.display = 'block';
      document.getElementById('ss-results-area').style.display = 'none';
      renderRecentTags();
      renderFavorites();
    }

    // ── RECENT SEARCHES ──────────────────────────────────
    function addRecentSearch(title) {
      recentSearches = [title, ...recentSearches.filter(r => r !== title)].slice(0, 8);
      try { localStorage.setItem('lifeos_recent_searches', JSON.stringify(recentSearches)); } catch (_) {}
    }

    function renderRecentTags() {
      const container = document.getElementById('ss-recent-tags');
      if (!recentSearches.length) { container.innerHTML = '<span style="font-size:12px;color:var(--text-muted)">Nenhuma busca recente</span>'; return; }
      container.innerHTML = recentSearches.map(r =>
        `<span class="ss-recent-tag" onclick="fillSearch('${escapeAttr(r)}')">🕐 ${escapeHtml(r)}</span>`
      ).join('');
    }

    // ── SUGGESTIONS ──────────────────────────────────────
    function renderSuggestions() {
      const suggestions = [
        { title: 'Tarefas', page: 'tasks', icon: '📋' },
        { title: 'Projetos', page: 'projects', icon: '🚀' },
        { title: 'Documentos', page: 'documents', icon: '📄' },
        { title: 'Fotos', page: 'photos', icon: '🖼️' },
        { title: 'Calendário', page: 'calendar', icon: '📅' },
        { title: 'CRM', page: 'crm', icon: '👥' },
        { title: 'Mensagens', page: 'messages', icon: '💬' },
        { title: 'Finanças', page: 'finance', icon: '💰' },
        { title: 'Hábitos', page: 'habits', icon: '🔄' },
        { title: 'Metas', page: 'goals', icon: '🎯' },
        { title: 'Configurações', page: 'settings', icon: '⚙️' },
        { title: 'IA Copilot', page: 'ai-copilot', icon: '🤖' },
      ];
      const container = document.getElementById('ss-suggestions');
      container.innerHTML = suggestions.map(s =>
        `<div class="ss-suggestion" onclick="navigateTo('${s.page}')">
          <span class="ss-suggestion-icon">${s.icon}</span>
          <div><div class="ss-suggestion-title">${s.title}</div><div class="ss-suggestion-type">Módulo</div></div>
        </div>`
      ).join('');
    }

    // ── UTILS ────────────────────────────────────────────
    function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function escapeAttr(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
    function debounce(fn, delay) {
      let t;
      return function(...args) { clearTimeout(t); t = setTimeout(() => fn.apply(this, args), delay); };
    }
  </script>
</body>
</html>
