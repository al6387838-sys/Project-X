<!-- LifeOS Enterprise — Photos Module v1.0 -->
<div id="module-photos" style="display:none">
<style>
  .photo-modal-shell { position:fixed; inset:0; z-index:var(--z-modal); display:flex; align-items:center; justify-content:center; padding:var(--space-4); }
  .photo-modal-shell .modal-backdrop { z-index:0; }
  .photo-modal-shell .modal-content { position:relative; z-index:1; max-height:90vh; overflow:auto; }
</style>

<!-- ─── PHOTOS GALLERY ─── -->
<div class="page" id="page-photos">
  <div class="page-header">
    <div>
      <div class="page-title"><i data-lucide="image" class="pg-icon" aria-hidden="true"></i> Fotos</div>
      <div class="page-subtitle">Galeria de fotos com upload, álbuns e organização</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="photosShowAlbums()">Álbuns</button>
      <button class="btn btn-primary" onclick="photosOpenUpload()"><i data-lucide="upload" class="pg-icon" aria-hidden="true"></i> Upload</button>
    </div>
  </div>

  <div style="margin-bottom:16px">
    <input type="search" id="photos-search-input" class="form-input" style="width:100%" placeholder="Buscar fotos por nome, tags, descrição ou local" oninput="photosSearch(this.value)">
  </div>

  <!-- Stats -->
  <div class="grid-4" style="margin-bottom:20px" id="photos-stats">
    <div class="card kpi-card"><div class="kpi-icon" style="background:rgba(99,102,241,.15);color:var(--accent)"><i data-lucide="image" class="pg-icon" aria-hidden="true"></i></div><div class="kpi-value" id="photos-stat-total">—</div><div class="kpi-label">Fotos</div></div>
    <div class="card kpi-card"><div class="kpi-icon" style="background:rgba(139,92,246,.15);color:var(--purple)"><i data-lucide="folder" class="pg-icon" aria-hidden="true"></i></div><div class="kpi-value" id="photos-stat-albums">—</div><div class="kpi-label">Álbuns</div></div>
    <div class="card kpi-card"><div class="kpi-icon" style="background:rgba(16,185,129,.15);color:var(--green)"><i data-lucide="hard-drive" class="pg-icon" aria-hidden="true"></i></div><div class="kpi-value" id="photos-stat-size">—</div><div class="kpi-label">Armazenamento</div></div>
    <div class="card kpi-card"><div class="kpi-icon" style="background:rgba(245,158,11,.15);color:var(--amber)"><i data-lucide="heart" class="pg-icon" aria-hidden="true"></i></div><div class="kpi-value" id="photos-stat-favorites">—</div><div class="kpi-label">Favoritas</div></div>
  </div>

  <!-- Gallery Grid -->
  <div id="photos-gallery" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">
    <div style="padding:32px;text-align:center;color:var(--text-muted);grid-column:1/-1">Carregando fotos...</div>
  </div>
</div>

<!-- ─── ALBUMS VIEW ─── -->
<div class="page" id="page-photos-albums" style="display:none">
  <div class="page-header">
    <div>
      <div class="page-title"><i data-lucide="folder" class="pg-icon" aria-hidden="true"></i> Álbuns</div>
      <div class="page-subtitle">Organize suas fotos em álbuns</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="photosShowGallery()">Galeria</button>
      <button class="btn btn-primary" onclick="photosOpenNewAlbum()"><i data-lucide="folder-plus" class="pg-icon" aria-hidden="true"></i> Novo Álbum</button>
    </div>
  </div>
  <div id="photos-albums-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">
    <div style="padding:32px;text-align:center;color:var(--text-muted);grid-column:1/-1">Carregando álbuns...</div>
  </div>
</div>

<!-- ─── UPLOAD MODAL ─── -->
<div id="modal-photos-upload" class="photo-modal-shell" style="display:none">
  <div class="modal-backdrop" onclick="photosCloseModal('modal-photos-upload')"></div>
  <div class="modal-content" style="width:500px;max-width:90vw">
    <div class="modal-header">
      <div class="modal-title"><i data-lucide="upload" class="pg-icon" aria-hidden="true"></i> Upload de Fotos</div>
      <button class="modal-close" onclick="photosCloseModal('modal-photos-upload')"><i data-lucide="x" class="pg-icon" aria-hidden="true"></i></button>
    </div>
    <div class="modal-body">
      <form id="photos-upload-form">
        <div style="margin-bottom:12px">
          <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Fotos</label>
          <input type="file" id="photos-upload-files" accept="image/jpeg,image/png,image/webp,image/gif,image/heic,image/heif" multiple class="form-input" style="width:100%">
        </div>
        <div style="margin-bottom:12px">
          <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Álbum (opcional)</label>
          <select id="photos-upload-album" class="form-input" style="width:100%"><option value="">Nenhum</option></select>
        </div>
        <div style="margin-bottom:12px">
          <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Tags (separadas por vírgula)</label>
          <input type="text" id="photos-upload-tags" class="form-input" style="width:100%" placeholder="ex: família, viagem, natureza">
        </div>
        <div id="photos-upload-error" style="color:var(--red);font-size:12px;margin-bottom:12px;display:none"></div>
        <div style="display:flex;justify-content:flex-end;gap:8px">
          <button type="button" class="btn btn-ghost" onclick="photosCloseModal('modal-photos-upload')">Cancelar</button>
          <button type="submit" class="btn btn-primary">Upload</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- ─── NEW ALBUM MODAL ─── -->
<div id="modal-photos-album" class="photo-modal-shell" style="display:none">
  <div class="modal-backdrop" onclick="photosCloseModal('modal-photos-album')"></div>
  <div class="modal-content" style="width:420px;max-width:90vw">
    <div class="modal-header">
      <div class="modal-title"><i data-lucide="folder-plus" class="pg-icon" aria-hidden="true"></i> Novo Álbum</div>
      <button class="modal-close" onclick="photosCloseModal('modal-photos-album')"><i data-lucide="x" class="pg-icon" aria-hidden="true"></i></button>
    </div>
    <div class="modal-body">
      <form id="photos-album-form">
        <div style="margin-bottom:12px">
          <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Nome do Álbum</label>
          <input type="text" id="photos-album-name" class="form-input" style="width:100%" required>
        </div>
        <div style="margin-bottom:12px">
          <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Descrição (opcional)</label>
          <textarea id="photos-album-desc" class="form-input" style="width:100%;resize:vertical;min-height:60px"></textarea>
        </div>
        <div id="photos-album-error" style="color:var(--red);font-size:12px;margin-bottom:12px;display:none"></div>
        <div style="display:flex;justify-content:flex-end;gap:8px">
          <button type="button" class="btn btn-ghost" onclick="photosCloseModal('modal-photos-album')">Cancelar</button>
          <button type="submit" class="btn btn-primary">Criar Álbum</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- ─── PHOTO VIEWER MODAL ─── -->
<div id="modal-photo-viewer" class="photo-modal-shell" style="display:none">
  <div class="modal-backdrop" onclick="photosCloseModal('modal-photo-viewer')"></div>
  <div class="modal-content" style="width:90vw;max-width:900px;height:85vh">
    <div class="modal-header">
      <div class="modal-title" id="photo-viewer-title">Foto</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost" style="padding:8px" id="photo-viewer-fav" title="Favoritar" onclick="photosToggleFavorite()">❤</button>
        <button class="btn btn-ghost" style="padding:8px" title="Editar" onclick="photosEditCurrent()"><i data-lucide="pencil" class="pg-icon" aria-hidden="true"></i></button>
        <button class="btn btn-ghost" style="padding:8px" title="Mover para álbum" onclick="photosMoveCurrent()"><i data-lucide="folder-input" class="pg-icon" aria-hidden="true"></i></button>
        <button class="btn btn-ghost" style="padding:8px" title="Compartilhar" onclick="photosShareCurrent()"><i data-lucide="share-2" class="pg-icon" aria-hidden="true"></i></button>
        <button class="btn btn-ghost" style="padding:8px" title="Excluir (lixeira)" onclick="photosDeleteCurrent()"><i data-lucide="trash-2" class="pg-icon" aria-hidden="true"></i></button>
        <button class="btn btn-ghost" style="padding:8px" title="Lixeira" onclick="photosCloseModal('modal-photo-viewer');photosShowTrash()"><i data-lucide="trash" class="pg-icon" aria-hidden="true"></i></button>
        <button class="modal-close" onclick="photosCloseModal('modal-photo-viewer')"><i data-lucide="x" class="pg-icon" aria-hidden="true"></i></button>
      </div>
    </div>
    <div class="modal-body" style="display:flex;gap:16px;overflow-y:auto">
      <div style="flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg-base);border-radius:var(--radius-md);overflow:hidden;position:relative">
        <div style="position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10">
          <button class="btn btn-ghost" style="padding:4px 8px;font-size:12px" onclick="photosZoomIn()" title="Zoom in"><i data-lucide="zoom-in" class="pg-icon" aria-hidden="true" style="width:14px;height:14px"></i></button>
          <button class="btn btn-ghost" style="padding:4px 8px;font-size:12px" onclick="photosZoomOut()" title="Zoom out"><i data-lucide="zoom-out" class="pg-icon" aria-hidden="true" style="width:14px;height:14px"></i></button>
          <button class="btn btn-ghost" style="padding:4px 8px;font-size:12px" onclick="photosZoomReset()" title="Reset zoom">1:1</button>
          <button class="btn btn-ghost" style="padding:4px 8px;font-size:12px" onclick="photosRotateLeft()" title="Rotacionar esquerda"><i data-lucide="rotate-ccw" class="pg-icon" aria-hidden="true" style="width:14px;height:14px"></i></button>
          <button class="btn btn-ghost" style="padding:4px 8px;font-size:12px" onclick="photosRotateRight()" title="Rotacionar direita"><i data-lucide="rotate-cw" class="pg-icon" aria-hidden="true" style="width:14px;height:14px"></i></button>
          <button class="btn btn-ghost" style="padding:4px 8px;font-size:12px" onclick="photosShareCurrent()" title="Compartilhar"><i data-lucide="share-2" class="pg-icon" aria-hidden="true" style="width:14px;height:14px"></i></button>
        </div>
        <img id="photo-viewer-img" src="" style="max-width:100%;max-height:70vh;object-fit:contain;transition:transform 0.2s" alt="">
      </div>
      <div style="width:260px;flex-shrink:0">
        <div style="font-size:14px;font-weight:600;margin-bottom:8px" id="photo-viewer-name"></div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px" id="photo-viewer-meta"></div>
        <div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px" id="photo-viewer-desc"></div>
        <div id="photo-viewer-tags" style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px"></div>
      </div>
    </div>
  </div>
</div>

</div>
<!-- END module-photos -->

<script>
(() => {
  'use strict';
  const API = '/api/photos';
  let state = { photos: [], allPhotos: [], albums: [], stats: null, currentPhoto: null, view: 'gallery', activeAlbumId: null, searchQuery: '' };
  let searchTimer = null;

  function esc(v) { return String(v ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
  function fmtSize(b) { if (!b) return '0 B'; const k = 1024, s = ['B','KB','MB','GB']; const i = Math.floor(Math.log(b) / Math.log(k)); return (b / Math.pow(k, i)).toFixed(1) + ' ' + s[i]; }
  function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('pt-BR', { dateStyle: 'short' }); }

  async function fetchPhotos(view = 'list', params = '') {
    const res = await fetch(`${API}?view=${view}${params}`, { credentials: 'same-origin' });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) throw new Error(data.error || 'Erro ao carregar dados');
    return data;
  }

  async function request(body) {
    const res = await fetch(API, {
      method: 'POST', credentials: 'same-origin',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) throw new Error(data.error || 'Erro na operação');
    return data;
  }

  async function uploadFiles(formData) {
    const res = await fetch(API, { method: 'POST', credentials: 'same-origin', body: formData });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) throw new Error(data.error || 'Erro no upload');
    return data;
  }

  async function photosLoad() {
    try {
      const query = state.searchQuery.trim();
      const [allPhotoData, searchData, albumData, statsData] = await Promise.all([
        fetchPhotos('list'),
        query ? fetchPhotos('search', `&q=${encodeURIComponent(query)}`) : Promise.resolve(null),
        fetchPhotos('albums'),
        fetchPhotos('stats'),
      ]);
      state.allPhotos = allPhotoData.photos || [];
      state.photos = searchData?.photos || state.allPhotos;
      state.albums = albumData.albums || [];
      state.stats = statsData.stats || {};
      renderStats();
      if (state.view === 'gallery') renderGallery();
      else renderAlbums();
    } catch (err) {
      const gallery = document.getElementById('photos-gallery');
      if (gallery) gallery.innerHTML = `<div style="padding:32px;text-align:center;color:var(--red);grid-column:1/-1">Erro: ${esc(err.message)}</div>`;
    }
  }

  function renderStats() {
    const s = state.stats || {};
    document.getElementById('photos-stat-total').textContent = (s.totalPhotos || 0).toLocaleString('pt-BR');
    document.getElementById('photos-stat-albums').textContent = (s.totalAlbums || 0).toLocaleString('pt-BR');
    document.getElementById('photos-stat-size').textContent = fmtSize(s.totalSize || 0);
    document.getElementById('photos-stat-favorites').textContent = (s.favoriteCount || 0).toLocaleString('pt-BR');
  }

  function renderGallery() {
    const grid = document.getElementById('photos-gallery');
    if (!grid) return;
    const galleryPhotos = state.activeAlbumId ? state.photos.filter(photo => photo.albumId === state.activeAlbumId) : state.photos;
    if (!galleryPhotos.length) {
      grid.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted);grid-column:1/-1">Nenhuma foto encontrada. Faça upload ou ajuste a busca.</div>';
      return;
    }
    grid.innerHTML = galleryPhotos.map(p => `
      <div class="photo-thumb" style="position:relative;aspect-ratio:1;border-radius:var(--radius-md);overflow:hidden;cursor:pointer;border:1px solid var(--border);background:var(--bg-elevated)" onclick="photosOpenViewer('${esc(p.id)}')">
        <img src="${esc(p.url)}" alt="${esc(p.name)}" style="width:100%;height:100%;object-fit:cover" loading="lazy">
        ${p.favorite ? '<div style="position:absolute;top:6px;right:6px;background:rgba(239,68,68,.8);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px">❤</div>' : ''}
        <div style="position:absolute;bottom:0;left:0;right:0;padding:6px 8px;background:linear-gradient(transparent,rgba(0,0,0,.7));font-size:10px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.name)}</div>
      </div>
    `).join('');
  }

  function renderAlbums() {
    const grid = document.getElementById('photos-albums-grid');
    if (!state.albums.length) {
      grid.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted);grid-column:1/-1">Nenhum álbum. Crie um para organizar suas fotos.</div>';
      return;
    }
    grid.innerHTML = state.albums.map(a => {
      const albumPhotos = state.allPhotos.filter(p => p.albumId === a.id);
      const cover = albumPhotos[0];
      return `
      <div class="card" style="padding:12px;cursor:pointer" onclick="photosOpenAlbum('${esc(a.id)}')">
        <div style="aspect-ratio:16/9;background:var(--bg-elevated);border-radius:var(--radius-md);overflow:hidden;margin-bottom:8px;position:relative">
          ${cover ? `<img src="${esc(cover.url)}" alt="" style="width:100%;height:100%;object-fit:cover">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-muted)"><i data-lucide="image" class="pg-icon" style="width:32px;height:32px"></i></div>'}
        </div>
        <div style="display:flex;align-items:center;gap:8px"><div style="font-size:14px;font-weight:600;flex:1">${esc(a.name)}</div><button class="btn btn-ghost" type="button" style="padding:3px 6px;color:var(--red)" onclick="event.stopPropagation();photosDeleteAlbum('${esc(a.id)}')" title="Excluir álbum"><i data-lucide="trash-2" class="pg-icon" aria-hidden="true"></i></button></div>
        <div style="font-size:11px;color:var(--text-muted)">${albumPhotos.length} foto(s) · ${esc(a.description || 'Sem descrição')}</div>
      </div>`;
    }).join('');
  }

  // ─── PUBLIC API ───
  window.photosShowGallery = () => {
    state.view = 'gallery';
    state.activeAlbumId = null;
    const gallery = document.getElementById('page-photos');
    const albums = document.getElementById('page-photos-albums');
    if (gallery) { gallery.classList.add('active'); gallery.style.display = ''; }
    if (albums) { albums.classList.remove('active'); albums.style.display = 'none'; }
    renderGallery();
  };

  window.photosSearch = (value) => {
    state.searchQuery = String(value || '');
    state.activeAlbumId = null;
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { void photosLoad(); }, 250);
  };

  window.photosShowAlbums = () => {
    state.view = 'albums';
    const gallery = document.getElementById('page-photos');
    const albums = document.getElementById('page-photos-albums');
    if (gallery) { gallery.classList.remove('active'); gallery.style.display = 'none'; }
    if (albums) { albums.classList.add('active'); albums.style.display = ''; }
    renderAlbums();
  };

  window.photosOpenUpload = () => {
    // Populate album dropdown
    const sel = document.getElementById('photos-upload-album');
    sel.innerHTML = '<option value="">Nenhum</option>' + state.albums.map(a => `<option value="${esc(a.id)}">${esc(a.name)}</option>`).join('');
    document.getElementById('photos-upload-error').style.display = 'none';
    document.getElementById('modal-photos-upload').style.display = '';
  };

  window.photosOpenNewAlbum = () => {
    document.getElementById('photos-album-error').style.display = 'none';
    document.getElementById('photos-album-name').value = '';
    document.getElementById('photos-album-desc').value = '';
    document.getElementById('modal-photos-album').style.display = '';
  };

  window.photosOpenViewer = (photoId) => {
    const photo = state.photos.find(p => p.id === photoId);
    if (!photo) return;
    state.currentPhoto = photo;
    document.getElementById('photo-viewer-title').textContent = esc(photo.name);
    document.getElementById('photo-viewer-img').src = photo.url;
    document.getElementById('photo-viewer-name').textContent = esc(photo.name);
    document.getElementById('photo-viewer-meta').textContent = `${fmtDate(photo.createdAt)} · ${fmtSize(photo.size)} · ${esc(photo.mimeType || 'image')}`;
    document.getElementById('photo-viewer-desc').textContent = esc(photo.description || '');
    document.getElementById('photo-viewer-tags').innerHTML = (photo.tags || []).map(t => `<span style="font-size:10px;padding:2px 6px;background:var(--accent-glow);color:var(--accent);border-radius:4px">${esc(t)}</span>`).join('');
    document.getElementById('photo-viewer-fav').textContent = photo.favorite ? '❤' : '♡';
    document.getElementById('modal-photo-viewer').style.display = '';
  };

  window.photosCloseModal = (id) => { document.getElementById(id).style.display = 'none'; };

  window.photosToggleFavorite = async () => {
    if (!state.currentPhoto) return;
    try {
      await request({ action: 'toggle-favorite', photoId: state.currentPhoto.id });
      state.currentPhoto.favorite = !state.currentPhoto.favorite;
      document.getElementById('photo-viewer-fav').textContent = state.currentPhoto.favorite ? '❤' : '♡';
      if (typeof showToast === 'function') showToast(state.currentPhoto.favorite ? 'Favoritada' : 'Desfavoritada', 'success');
      await photosLoad();
    } catch (err) {
      if (typeof showToast === 'function') showToast(err.message, 'error');
    }
  };

  window.photosDeleteCurrent = async () => {
    if (!state.currentPhoto) return;
    if (!confirm('Enviar para lixeira? Esta foto poderá ser restaurada.')) return;
    try {
      await request({ action: 'delete-photo', photoId: state.currentPhoto.id });
      photosCloseModal('modal-photo-viewer');
      if (typeof showToast === 'function') showToast('Enviada para lixeira', 'success');
      await photosLoad();
    } catch (err) {
      if (typeof showToast === 'function') showToast(err.message, 'error');
    }
  };

  // Zoom controls
  window.photosZoomIn = () => {
    const img = document.getElementById('photo-viewer-img');
    if (!img) return;
    const current = parseFloat(img.dataset.zoom || '1');
    const next = Math.min(3, current + 0.25);
    img.dataset.zoom = next;
    img.style.transform = `scale(${next})`;
    img.style.cursor = next > 1 ? 'zoom-out' : 'zoom-in';
  };
  window.photosZoomOut = () => {
    const img = document.getElementById('photo-viewer-img');
    if (!img) return;
    const current = parseFloat(img.dataset.zoom || '1');
    const next = Math.max(0.25, current - 0.25);
    img.dataset.zoom = next;
    img.style.transform = `scale(${next})`;
    img.style.cursor = next > 1 ? 'zoom-out' : 'zoom-in';
  };
  window.photosZoomReset = () => {
    const img = document.getElementById('photo-viewer-img');
    if (!img) return;
    img.dataset.zoom = '1';
    img.style.transform = 'scale(1)';
    img.style.cursor = 'zoom-in';
  };

  // Rotation
  window.photosRotateRight = () => {
    const img = document.getElementById('photo-viewer-img');
    if (!img) return;
    const current = parseInt(img.dataset.rotation || '0', 10);
    const next = (current + 90) % 360;
    img.dataset.rotation = next;
    img.style.transform = `scale(${parseFloat(img.dataset.zoom || '1')}) rotate(${next}deg)`;
  };
  window.photosRotateLeft = () => {
    const img = document.getElementById('photo-viewer-img');
    if (!img) return;
    const current = parseInt(img.dataset.rotation || '0', 10);
    const next = ((current - 90) + 360) % 360;
    img.dataset.rotation = next;
    img.style.transform = `scale(${parseFloat(img.dataset.zoom || '1')}) rotate(${next}deg)`;
  };

  // Share
  window.photosShareCurrent = async () => {
    if (!state.currentPhoto) return;
    try {
      const data = await request({ action: 'share-photo', photoId: state.currentPhoto.id, permission: 'view' });
      if (data.shareUrl) {
        await navigator.clipboard.writeText(data.shareUrl);
        if (typeof showToast === 'function') showToast('Link copiado para a área de transferência', 'success');
      }
    } catch (err) {
      if (typeof showToast === 'function') showToast(err.message, 'error');
    }
  };

  // Trash
  window.photosShowTrash = async () => {
    try {
      const data = await fetchPhotos('list');
      const trashPhotos = (data.photos || []).filter(p => p.deleted);
      state.photos = trashPhotos;
      state.view = 'gallery';
      const gallery = document.getElementById('page-photos');
      const albums = document.getElementById('page-photos-albums');
      if (gallery) { gallery.style.display = ''; }
      if (albums) { albums.style.display = 'none'; }
      const grid = document.getElementById('photos-gallery');
      if (!grid) return;
      if (!trashPhotos.length) {
        grid.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted);grid-column:1/-1">Lixeira vazia</div>';
        return;
      }
      grid.innerHTML = trashPhotos.map(p => `
        <div class="photo-thumb" style="position:relative;aspect-ratio:1;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border);background:var(--bg-elevated);opacity:0.6">
          <img src="${esc(p.url)}" alt="${esc(p.name)}" style="width:100%;height:100%;object-fit:cover;filter:grayscale(100%)" loading="lazy">
          <div style="position:absolute;bottom:0;left:0;right:0;padding:6px 8px;background:linear-gradient(transparent,rgba(0,0,0,.7));font-size:10px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.name)}</div>
          <div style="position:absolute;top:6px;left:6px;display:flex;gap:4px">
            <button style="background:rgba(16,185,129,.9);border:none;border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px" onclick="photosRestoreById('${esc(p.id)}')" title="Restaurar">↩</button>
            <button style="background:rgba(239,68,68,.9);border:none;border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px" onclick="photosPermanentDelete('${esc(p.id)}')" title="Excluir definitivamente">🗑</button>
          </div>
        </div>
      `).join('');
    } catch (err) {
      if (typeof showToast === 'function') showToast('Erro ao carregar lixeira', 'error');
    }
  };

  window.photosRestoreById = async (photoId) => {
    try {
      await request({ action: 'restore-photo', photoId });
      if (typeof showToast === 'function') showToast('Foto restaurada', 'success');
      await photosLoad();
    } catch (err) {
      if (typeof showToast === 'function') showToast(err.message, 'error');
    }
  };

  window.photosPermanentDelete = async (photoId) => {
    if (!confirm('Excluir permanentemente? Esta ação não pode ser desfeita.')) return;
    try {
      await request({ action: 'permanent-delete', photoId });
      if (typeof showToast === 'function') showToast('Excluída permanentemente', 'success');
      await photosLoad();
    } catch (err) {
      if (typeof showToast === 'function') showToast(err.message, 'error');
    }
  };

  window.photosOpenAlbum = (albumId) => {
    const album = state.albums.find(a => a.id === albumId);
    if (!album) return;
    state.activeAlbumId = albumId;
    window.photosShowGallery();
  };

  window.photosEditCurrent = async () => {
    if (!state.currentPhoto) return;
    const current = state.currentPhoto;
    const name = prompt('Nome da foto:', current.name);
    if (name === null || !name.trim()) return;
    const description = prompt('Descrição da foto:', current.description || '');
    if (description === null) return;
    const tags = prompt('Tags separadas por vírgula:', (current.tags || []).join(', '));
    if (tags === null) return;
    try {
      const data = await request({
        action: 'update-photo',
        photoId: current.id,
        name: name.trim(),
        description: description.trim(),
        tags: tags.split(',').map(tag => tag.trim()).filter(Boolean),
      });
      Object.assign(current, data.photo || {});
      if (typeof showToast === 'function') showToast('Foto atualizada', 'success');
      await photosLoad();
      window.photosOpenViewer(current.id);
    } catch (err) {
      if (typeof showToast === 'function') showToast(err.message, 'error');
    }
  };

  window.photosMoveCurrent = async () => {
    if (!state.currentPhoto) return;
    const options = state.albums.map((album, index) => `${index + 1}. ${album.name}`).join('\n');
    const selection = prompt(`Digite o número do álbum de destino ou deixe vazio para remover da pasta.\n${options}`);
    if (selection === null) return;
    let albumId = null;
    if (selection.trim()) {
      const selected = state.albums[Number(selection) - 1];
      if (!selected) {
        if (typeof showToast === 'function') showToast('Álbum inválido', 'error');
        return;
      }
      albumId = selected.id;
    }
    try {
      await request({ action: 'move-to-album', photoId: state.currentPhoto.id, albumId });
      state.currentPhoto.albumId = albumId;
      if (typeof showToast === 'function') showToast(albumId ? 'Foto movida para o álbum' : 'Foto removida do álbum', 'success');
      await photosLoad();
    } catch (err) {
      if (typeof showToast === 'function') showToast(err.message, 'error');
    }
  };

  window.photosDeleteAlbum = async (albumId) => {
    const album = state.albums.find(item => item.id === albumId);
    if (!album || !confirm(`Excluir o álbum “${album.name}”? As fotos permanecerão disponíveis na galeria.`)) return;
    try {
      await request({ action: 'delete-album', albumId });
      if (state.activeAlbumId === albumId) state.activeAlbumId = null;
      if (typeof showToast === 'function') showToast('Álbum excluído', 'success');
      await photosLoad();
    } catch (err) {
      if (typeof showToast === 'function') showToast(err.message, 'error');
    }
  };

  // ─── FORM HANDLERS ───
  document.getElementById('photos-upload-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const files = document.getElementById('photos-upload-files').files;
    if (!files || files.length === 0) {
      const err = document.getElementById('photos-upload-error');
      err.textContent = 'Selecione pelo menos uma foto.';
      err.style.display = 'block';
      return;
    }
    const albumId = document.getElementById('photos-upload-album').value;
    const tags = document.getElementById('photos-upload-tags').value;

    try {
      for (const file of files) {
        const formData = new FormData();
        formData.append('file', file);
        if (albumId) formData.append('albumId', albumId);
        if (tags) formData.append('tags', tags);
        await uploadFiles(formData);
      }
      photosCloseModal('modal-photos-upload');
      document.getElementById('photos-upload-form').reset();
      if (typeof showToast === 'function') showToast(`${files.length} foto(s) enviada(s)`, 'success');
      await photosLoad();
    } catch (err) {
      const error = document.getElementById('photos-upload-error');
      error.textContent = err.message;
      error.style.display = 'block';
    }
  });

  document.getElementById('photos-album-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('photos-album-name').value.trim();
    if (!name) {
      const err = document.getElementById('photos-album-error');
      err.textContent = 'Nome obrigatório.';
      err.style.display = 'block';
      return;
    }
    try {
      await request({
        action: 'create-album',
        name,
        description: document.getElementById('photos-album-desc').value.trim(),
      });
      photosCloseModal('modal-photos-album');
      if (typeof showToast === 'function') showToast('Álbum criado', 'success');
      await photosLoad();
    } catch (err) {
      const error = document.getElementById('photos-album-error');
      error.textContent = err.message;
      error.style.display = 'block';
    }
  });

  // ─── DRAG AND DROP ───
  (function initPhotosDragDrop() {
    const gallery = document.getElementById('photos-gallery');
    if (!gallery) return;
    gallery.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; gallery.style.outline = '2px dashed var(--accent)'; });
    gallery.addEventListener('dragleave', () => { gallery.style.outline = ''; });
    gallery.addEventListener('drop', async (e) => {
      e.preventDefault();
      gallery.style.outline = '';
      const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
      if (!files.length) return;
      try {
        if (typeof showToast === 'function') showToast(`Enviando ${files.length} foto(s)...`, 'info');
        for (const file of files) {
          const formData = new FormData();
          formData.append('file', file);
          formData.append('action', 'upload');
          await uploadFiles(formData);
        }
        if (typeof showToast === 'function') showToast(`${files.length} foto(s) enviada(s)`, 'success');
        await photosLoad();
      } catch (err) {
        if (typeof showToast === 'function') showToast('Erro ao enviar fotos: ' + err.message, 'error');
      }
    });
  })();

  // ─── INIT ───
  photosLoad();
})();
</script>
