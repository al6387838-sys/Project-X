<!-- LifeOS Enterprise — Productivity Module v2.0 -->
<!-- Kanban/Gantt/Wiki dinâmicos via /api/tasks e /api/ai-insights -->
<div id="module-productivity" style="display:none">

<!-- ─── KANBAN ─── -->
<div class="page" id="page-kanban">
  <div class="page-header">
    <div>
      <div class="page-title"><i data-lucide="clipboard-list" class="pg-icon" aria-hidden="true"></i> Kanban</div>
      <div class="page-subtitle">Gerencie suas tarefas visualmente</div>
    </div>
    <div style="display:flex;gap:8px">
      <select class="form-input" id="kanban-project" style="width:auto;font-size:13px" onchange="kanbanLoad()">
        <option value="">Todos os projetos</option>
      </select>
      <button class="btn btn-ghost" onclick="showPage('gantt')">Gantt</button>
      <button class="btn btn-primary" onclick="kanbanOpenNewTask()"><i data-lucide="plus" class="pg-icon" aria-hidden="true"></i> Tarefa</button>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;height:calc(100vh - 180px);overflow-x:auto">
    <div class="kanban-col">
      <div class="kanban-col-header" style="border-top-color:var(--text-muted)"><span><i data-lucide="download" class="pg-icon" aria-hidden="true"></i> Backlog</span><span class="kanban-count" id="kanban-count-backlog">—</span></div>
      <div class="kanban-cards" id="kanban-backlog" ondragover="kanbanDragOver(event)" ondrop="kanbanDrop(event,'backlog')"></div>
      <button class="kanban-add-btn" onclick="kanbanOpenNewTask()"><i data-lucide="plus" class="pg-icon" aria-hidden="true"></i> Adicionar</button>
    </div>
    <div class="kanban-col">
      <div class="kanban-col-header" style="border-top-color:var(--accent)"><span><i data-lucide="refresh-cw" class="pg-icon" aria-hidden="true"></i> Em Progresso</span><span class="kanban-count" id="kanban-count-progress">—</span></div>
      <div class="kanban-cards" id="kanban-progress" ondragover="kanbanDragOver(event)" ondrop="kanbanDrop(event,'progress')"></div>
      <button class="kanban-add-btn" onclick="kanbanOpenNewTask()"><i data-lucide="plus" class="pg-icon" aria-hidden="true"></i> Adicionar</button>
    </div>
    <div class="kanban-col">
      <div class="kanban-col-header" style="border-top-color:var(--amber)"><span><i data-lucide="eye" class="pg-icon" aria-hidden="true"></i> Revisão</span><span class="kanban-count" id="kanban-count-review">—</span></div>
      <div class="kanban-cards" id="kanban-review" ondragover="kanbanDragOver(event)" ondrop="kanbanDrop(event,'review')"></div>
      <button class="kanban-add-btn" onclick="kanbanOpenNewTask()"><i data-lucide="plus" class="pg-icon" aria-hidden="true"></i> Adicionar</button>
    </div>
    <div class="kanban-col">
      <div class="kanban-col-header" style="border-top-color:var(--green)"><span><i data-lucide="circle-check" class="pg-icon" aria-hidden="true"></i> Concluído</span><span class="kanban-count" id="kanban-count-done">—</span></div>
      <div class="kanban-cards" id="kanban-done" ondragover="kanbanDragOver(event)" ondrop="kanbanDrop(event,'done')"></div>
      <button class="kanban-add-btn" onclick="kanbanOpenNewTask()"><i data-lucide="plus" class="pg-icon" aria-hidden="true"></i> Adicionar</button>
    </div>
  </div>
</div>

<!-- ─── GANTT ─── -->
<div class="page" id="page-gantt">
  <div class="page-header">
    <div>
      <div class="page-title"><i data-lucide="chart-no-axes-combined" class="pg-icon" aria-hidden="true"></i> Gantt</div>
      <div class="page-subtitle">Cronograma visual do projeto</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="showPage('kanban')">Kanban</button>
    </div>
  </div>
  <div class="card" style="overflow-x:auto">
    <div style="min-width:900px" id="gantt-content">
      <div style="padding:32px;text-align:center;color:var(--text-muted)">Carregando tarefas...</div>
    </div>
  </div>
</div>

<!-- ─── CRM ─── -->
<div class="page" id="page-crm">
  <div id="crm-client-view" aria-live="polite"></div>
</div>
<div class="page" id="page-crm-pipeline">
  <div id="crm-pipeline-view" aria-live="polite"></div>
</div>
<div class="page" id="page-crm-agenda">
  <div id="crm-agenda-view" aria-live="polite"></div>
</div>

<!-- ─── WIKI ─── -->
<div class="page" id="page-wiki">
  <div class="page-header">
    <div>
      <div class="page-title"><i data-lucide="book-open" class="pg-icon" aria-hidden="true"></i> Wiki</div>
      <div class="page-subtitle">Base de conhecimento da equipe</div>
    </div>
    <button class="btn btn-primary" onclick="wikiNewPage()"><i data-lucide="plus" class="pg-icon" aria-hidden="true"></i> Nova Página</button>
  </div>
  <div id="wiki-content" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">
    <div style="padding:32px;text-align:center;color:var(--text-muted);grid-column:1/-1">Carregando wiki...</div>
  </div>
</div>

<!-- ─── NEW TASK MODAL ─── -->
<div id="modal-new-task" class="modal" style="display:none">
  <div class="modal-backdrop" onclick="kanbanCloseModal('modal-new-task')"></div>
  <div class="modal-content" style="width:500px;max-width:90vw">
    <div class="modal-header">
      <div class="modal-title"><i data-lucide="plus" class="pg-icon" aria-hidden="true"></i> Nova Tarefa</div>
      <button class="modal-close" onclick="kanbanCloseModal('modal-new-task')"><i data-lucide="x" class="pg-icon" aria-hidden="true"></i></button>
    </div>
    <div class="modal-body">
      <form id="new-task-form">
        <div style="margin-bottom:10px">
          <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Título</label>
          <input type="text" id="task-title" class="form-input" style="width:100%" required>
        </div>
        <div style="margin-bottom:10px">
          <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Descrição</label>
          <textarea id="task-desc" class="form-input" style="width:100%;min-height:80px;resize:vertical"></textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div>
            <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Status</label>
            <select id="task-status" class="form-input" style="width:100%">
              <option value="todo">Backlog</option>
              <option value="progress">Em Progresso</option>
              <option value="review">Revisão</option>
              <option value="done">Concluído</option>
            </select>
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Prioridade</label>
            <select id="task-priority" class="form-input" style="width:100%">
              <option value="low">Baixa</option>
              <option value="medium">Média</option>
              <option value="high">Alta</option>
              <option value="urgent">Urgente</option>
            </select>
          </div>
        </div>
        <div style="margin-bottom:10px">
          <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px">Prazo</label>
          <input type="date" id="task-due" class="form-input" style="width:100%">
        </div>
        <div id="task-form-error" style="color:var(--red);font-size:12px;margin-bottom:10px;display:none"></div>
        <div style="display:flex;justify-content:flex-end;gap:8px">
          <button type="button" class="btn btn-ghost" onclick="kanbanCloseModal('modal-new-task')">Cancelar</button>
          <button type="submit" class="btn btn-primary">Criar</button>
        </div>
      </form>
    </div>
  </div>
</div>

</div>
<!-- END module-productivity -->

<script>
(() => {
  'use strict';
  const TASKS_API = '/api/tasks';
  const WIKI_API = '/api/documents';
  let state = { tasks: [], wikiPages: [], draggedId: null };

  function esc(v) { return String(v ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
  function fmtDate(d) { if (!d) return 'Sem prazo'; try { return new Date(d).toLocaleDateString('pt-BR', { dateStyle: 'short' }); } catch { return String(d); } }

  async function fetchTasks() {
    const res = await fetch(TASKS_API, { credentials: 'same-origin' });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) throw new Error(data.error || 'Erro ao carregar tarefas');
    return data.tasks || data.items || [];
  }

  async function createTask(body) {
    const res = await fetch(TASKS_API, {
      method: 'POST', credentials: 'same-origin',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) throw new Error(data.error || 'Erro ao criar tarefa');
    return data;
  }

  async function updateTaskStatus(id, newStatus) {
    const res = await fetch(TASKS_API, {
      method: 'PUT', credentials: 'same-origin',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ id, status: newStatus }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) throw new Error(data.error || 'Erro ao atualizar tarefa');
    return data;
  }

  async function loadTasks() {
    try {
      state.tasks = await fetchTasks();
      renderKanban();
      renderGantt();
    } catch (err) {
      /* error handled */
    }
  }

  function getStatusColumn(status) {
    const s = String(status || 'todo').toLowerCase();
    if (s === 'done' || s === 'completed') return 'done';
    if (s === 'progress' || s === 'in_progress' || s === 'inprogress') return 'progress';
    if (s === 'review') return 'review';
    return 'backlog';
  }

  function renderKanban() {
    const cols = { backlog: [], progress: [], review: [], done: [] };
    state.tasks.forEach(t => {
      const col = getStatusColumn(t.status);
      cols[col].push(t);
    });

    Object.entries(cols).forEach(([col, tasks]) => {
      const el = document.getElementById(`kanban-${col}`);
      if (el) {
        el.innerHTML = tasks.map(t => `
          <div class="kanban-card ${col === 'done' ? 'done' : ''}" draggable="true" ondragstart="kanbanDragStart(event,'${esc(t.id)}')">
            <div class="kanban-card-title">${esc(t.title || t.name || 'Sem título')}</div>
            ${t.description ? `<div style="font-size:11px;color:var(--text-muted);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.description)}</div>` : ''}
            ${t.priority ? `<div class="kanban-card-meta"><span class="kanban-tag" style="background:${t.priority === 'urgent' ? 'rgba(239,68,68,.15)' : t.priority === 'high' ? 'rgba(245,158,11,.15)' : 'rgba(99,102,241,.15)'};color:${t.priority === 'urgent' ? 'var(--red)' : t.priority === 'high' ? 'var(--amber)' : 'var(--accent)'}">${esc(t.priority)}</span></div>` : ''}
            <div class="kanban-card-footer">
              <span style="font-size:11px;color:var(--text-muted)">${fmtDate(t.dueDate)}</span>
            </div>
          </div>
        `).join('');
      }
      const countEl = document.getElementById(`kanban-count-${col}`);
      if (countEl) countEl.textContent = tasks.length;
    });
  }

  function renderGantt() {
    const container = document.getElementById('gantt-content');
    const tasks = state.tasks.filter(t => t.status !== 'done');
    if (!tasks.length) {
      container.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted)">Nenhuma tarefa ativa para exibir no Gantt.</div>';
      return;
    }
    // Dynamic Gantt — show last 30 days
    const now = new Date();
    const days = Array.from({ length: 30 }, (_, i) => {
      const d = new Date(now);
      d.setDate(d.getDate() - 15 + i);
      return d;
    });
    container.innerHTML = `
      <div style="display:grid;grid-template-columns:200px repeat(${days.length},1fr);border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:8px">
        <div style="font-size:12px;font-weight:600;color:var(--text-muted)">Tarefa</div>
        ${days.map(d => `<div style="font-size:10px;color:${d.toDateString() === now.toDateString() ? 'var(--accent)' : 'var(--text-muted)'};text-align:center">${d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' })}</div>`).join('')}
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${tasks.map(t => {
          const start = t.startDate ? new Date(t.startDate) : (t.createdAt ? new Date(t.createdAt) : now);
          const due = t.dueDate ? new Date(t.dueDate) : now;
          const startOffset = Math.max(0, Math.floor((start - days[0]) / 86400000));
          const endOffset = Math.min(days.length - 1, Math.floor((due - days[0]) / 86400000));
          const span = Math.max(1, endOffset - startOffset + 1);
          const col = startOffset + 2; // +2 because grid starts at col 2
          return `<div class="gantt-row"><div class="gantt-task-name" style="padding:4px 0">${esc(t.title || t.name || 'Tarefa')}</div><div class="gantt-bar-container"><div class="gantt-bar" style="grid-column:${col}/${col + span};background:var(--accent);opacity:0.7"></div></div></div>`;
        }).join('')}
      </div>`;
  }

  // ─── WIKI ───
  async function loadWiki() {
    try {
      const res = await fetch('/api/documents?view=notes', { credentials: 'same-origin' });
      const data = await res.json().catch(() => ({}));
      state.wikiPages = data.notes || data.items || [];
      renderWiki();
    } catch {
      document.getElementById('wiki-content').innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted);grid-column:1/-1">Wiki não disponível. Crie uma página para começar.</div>';
    }
  }

  function renderWiki() {
    const el = document.getElementById('wiki-content');
    if (!state.wikiPages.length) {
      el.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted);grid-column:1/-1">Nenhuma página na wiki. Crie uma para começar.</div>';
      return;
    }
    el.innerHTML = state.wikiPages.map(w => `
      <div class="card" style="cursor:pointer;padding:16px" onclick="wikiOpenPage('${esc(w.id)}')">
        <div style="font-size:14px;font-weight:600;margin-bottom:6px">${esc(w.name || w.title || 'Sem título')}</div>
        <div style="font-size:12px;color:var(--text-muted)">${esc((w.description || w.content || '').slice(0, 100))}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:8px">${fmtDate(w.updatedAt || w.createdAt)}</div>
      </div>
    `).join('');
  }

  // ─── PUBLIC API ───
  window.kanbanOpenNewTask = () => {
    document.getElementById('task-form-error').style.display = 'none';
    document.getElementById('task-title').value = '';
    document.getElementById('task-desc').value = '';
    document.getElementById('task-status').value = 'todo';
    document.getElementById('task-priority').value = 'medium';
    document.getElementById('task-due').value = '';
    document.getElementById('modal-new-task').style.display = '';
  };

  window.kanbanCloseModal = (id) => { document.getElementById(id).style.display = 'none'; };

  window.kanbanDragStart = (e, taskId) => { state.draggedId = taskId; e.dataTransfer.effectAllowed = 'move'; };
  window.kanbanDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
  window.kanbanDrop = async (e, newStatus) => {
    e.preventDefault();
    if (!state.draggedId) return;
    try {
      await updateTaskStatus(state.draggedId, newStatus);
      if (typeof showToast === 'function') showToast('Tarefa movida', 'success');
      await loadTasks();
    } catch (err) {
      if (typeof showToast === 'function') showToast(err.message, 'error');
    }
    state.draggedId = null;
  };

  window.kanbanLoad = loadTasks;

  window.wikiNewPage = () => { if (typeof showToast === 'function') showToast('Funcionalidade de criação de páginas wiki — utilize Documentos para criar notas', 'info'); };
  window.wikiOpenPage = (id) => { if (typeof showToast === 'function') showToast('Abrindo página wiki: ' + id, 'info'); };

  // ─── FORM HANDLER ───
  document.getElementById('new-task-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('task-form-error');
    const title = document.getElementById('task-title').value.trim();
    if (!title) { errEl.textContent = 'Título obrigatório.'; errEl.style.display = 'block'; return; }

    try {
      await createTask({
        title,
        description: document.getElementById('task-desc').value.trim(),
        status: document.getElementById('task-status').value === 'todo' ? 'todo' : document.getElementById('task-status').value,
        priority: document.getElementById('task-priority').value,
        dueDate: document.getElementById('task-due').value || null,
      });
      kanbanCloseModal('modal-new-task');
      if (typeof showToast === 'function') showToast('Tarefa criada', 'success');
      await loadTasks();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    }
  });

  // ─── INIT ───
  loadTasks();
  loadWiki();
})();
</script>
