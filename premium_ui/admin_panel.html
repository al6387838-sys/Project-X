<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title data-lifeos-title-prefix="Admin — LifeOS Enterprise">Admin — LifeOS Enterprise</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: #f4f6fb; color: #1a2332; }
    body { -webkit-font-smoothing: antialiased; }

    /* Shell base — será substituído pelo admin_completion.js */
    .admin-shell-base {
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background: #f4f6fb;
    }

    /* Splash de carregamento */
    .admin-splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 48px;
    }
    .admin-splash-logo {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; color: #fff;
      box-shadow: 0 8px 24px rgba(79,70,229,0.3);
    }
    .admin-splash-title {
      font-size: 18px; font-weight: 800; color: #111827;
      letter-spacing: -0.03em;
    }
    .admin-splash-sub {
      font-size: 13px; color: #667085;
    }
    .admin-splash-spinner {
      width: 28px; height: 28px;
      border: 3px solid #e5e9f0;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Estrutura que o admin_completion.js vai substituir */
    .app-shell { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: #0f1623; color: #c8d3e6;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .content { flex: 1; overflow-y: auto; padding: 24px; }
  </style>
  <link rel="stylesheet" href="/precision_graphite.css" data-visual-system="precision-graphite" />
</head>
<body>

<!-- Shell estrutural — admin_completion.js vai substituir este conteúdo -->
<div class="app-shell">
  <aside class="sidebar" id="admin-sidebar"></aside>
  <div class="main-area">
    <main class="content" id="admin-content" role="main">
      <div class="admin-splash">
        <div class="admin-splash-logo">L</div>
        <div class="admin-splash-title">LifeOS Enterprise</div>
        <div class="admin-splash-sub">Carregando painel administrativo…</div>
        <div class="admin-splash-spinner"></div>
      </div>
    </main>
  </div>
</div>

<script>
  'use strict';

  // Verificação de sessão — admin_completion.js faz a verificação completa
  // Este bloco apenas garante redirecionamento rápido se não autenticado
  (async () => {
    try {
      const r = await fetch('/api/session', { credentials: 'same-origin' });
      if (!r.ok) { location.replace('/login'); return; }
      const data = await r.json();
      if (!data.ok) { location.replace('/login'); return; }
      if (data.user?.role !== 'admin') { location.replace('/app'); return; }
      // admin_completion.js vai assumir o controle
    } catch (_) {
      location.replace('/login');
    }
  })();
</script>

<script src="/precision_graphite.js" defer data-visual-system="precision-graphite"></script>
<script src="/admin_completion.js" defer></script>
</body>
</html>
