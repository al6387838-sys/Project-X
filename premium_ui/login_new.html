<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A0E14" />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="description" content="Acesso seguro à plataforma LifeOS Enterprise para gestão integrada de vida e negócios." />
  <title>Entrar — LifeOS Enterprise v48.0.0</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base: #0A0E14;
      --bg-elevated: #0F1520;
      --bg-card: #141B28;
      --border: rgba(255,255,255,0.07);
      --border-accent: rgba(99,102,241,0.3);
      --text-primary: #F0F4FF;
      --text-secondary: #8892A4;
      --text-muted: #7F8CA3;
      --accent: #6366F1;
      --accent-light: #818CF8;
      --green: #10B981;
      --red: #EF4444;
      --amber: #F59E0B;
      --gradient-hero: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #06B6D4 100%);
      --radius-md: 10px;
      --radius-lg: 16px;
    }
    body {
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 20%, rgba(99,102,241,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 70% 80%, rgba(139,92,246,0.07) 0%, transparent 50%);
      pointer-events: none;
    }
    .auth-container {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
      text-decoration: none;
      color: var(--text-primary);
    }
    .auth-logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--gradient-hero);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 24px rgba(99,102,241,0.4);
    }
    .auth-logo-text {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .auth-logo-badge {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent-light);
      background: rgba(99,102,241,0.15);
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid rgba(99,102,241,0.3);
    }
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .auth-tabs {
      display: flex;
      background: var(--bg-elevated);
      border-radius: var(--radius-md);
      padding: 4px;
      margin-bottom: 32px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      border: none;
      background: transparent;
    }
    .auth-tab.active {
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .auth-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    .auth-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .form-input-wrap {
      position: relative;
    }
    .form-input {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      font-size: 14px;
      color: var(--text-primary);
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .form-input.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
    }
    .form-input-icon {
      position: absolute;
      right: 2px;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 16px;
      background: none;
      border: none;
      padding: 0;
    }
    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .form-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .form-checkbox input { accent-color: var(--accent); }
    .form-link {
      font-size: 13px;
      color: var(--accent-light);
      text-decoration: none;
      font-weight: 500;
    }
    .form-link:hover { text-decoration: underline; }
    .status-msg {
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
    }
    .status-msg.show { display: block; }
    .status-msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #FCA5A5; }
    .status-msg.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); color: #6EE7B7; }
    .status-msg.info { background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2); color: var(--accent-light); }
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--gradient-hero);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      font-family: inherit;
    }
    .btn-submit:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(99,102,241,0.4);
    }
    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-submit.loading::after {
      content: '';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      font-size: 12px;
      color: var(--text-muted);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .sso-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .sso-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .sso-btn:hover {
      border-color: var(--border-accent);
      color: var(--text-primary);
    }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--accent-light);
      text-decoration: none;
      font-weight: 500;
    }
    .auth-footer a:hover { text-decoration: underline; }
    .security-badge {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .panel { display: none; }
    .panel.active { display: block; }
  </style>
  <link rel="stylesheet" href="/precision_graphite.css?v=48.0.0" data-visual-system="precision-graphite" />
</head>
<body>
  <div class="auth-container">
    <a href="/" class="auth-logo">
      <div class="auth-logo-icon"><i data-lucide="zap" class="pg-icon" aria-hidden="true"></i></div>
      <span class="auth-logo-text">LifeOS</span>
      <span class="auth-logo-badge">Enterprise</span>
    </a>

    <div class="auth-card">
      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Entrar</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Criar conta</button>
      </div>

      <!-- LOGIN PANEL -->
      <div class="panel active" id="panel-login">
        <div class="auth-title">Bem-vindo de volta</div>
        <div class="auth-subtitle">Entre com sua conta LifeOS</div>

        <div class="status-msg" id="login-status" role="alert" aria-live="polite" aria-atomic="true"></div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="login-email">E-mail</label>
            <input type="email" id="login-email" class="form-input" placeholder="seu@email.com" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">Senha</label>
            <div class="form-input-wrap">
              <input type="password" id="login-password" class="form-input" placeholder="••••••••" autocomplete="current-password" required />
              <button type="button" class="form-input-icon" id="login-pwd-toggle" aria-label="Mostrar senha"><i data-lucide="eye" class="pg-icon" aria-hidden="true"></i></button>
            </div>
          </div>
          <div class="form-row">
            <label class="form-checkbox">
              <input type="checkbox" id="remember-me" /> Lembrar de mim
            </label>
            <a href="/forgot-password" class="form-link">Esqueci a senha</a>
          </div>
          <button type="submit" class="btn-submit" id="login-btn">Entrar</button>
        </form>

        <div class="divider">ou continue com</div>
        <div class="sso-grid">
          <button type="button" class="sso-btn" onclick="showGoogleSignIn()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button type="button" class="sso-btn" id="sso-apple" onclick="showAppleSignIn()" aria-label="Continuar com Apple">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.39-1.32 2.76-2.54 3.99zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
            Apple
          </button>
        </div>
      </div>

      <!-- REGISTER PANEL -->
      <div class="panel" id="panel-register">
        <div class="auth-title">Criar sua conta</div>
        <div class="auth-subtitle">Comece gratuitamente hoje</div>

        <div class="status-msg" id="register-status" role="alert" aria-live="polite" aria-atomic="true"></div>

        <form id="register-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="reg-name">Nome completo</label>
            <input type="text" id="reg-name" class="form-input" placeholder="Seu nome" autocomplete="name" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-email">E-mail</label>
            <input type="email" id="reg-email" class="form-input" placeholder="seu@email.com" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-password">Senha</label>
            <div class="form-input-wrap">
              <input type="password" id="reg-password" class="form-input" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required />
              <button type="button" class="form-input-icon" id="reg-pwd-toggle" aria-label="Mostrar senha"><i data-lucide="eye" class="pg-icon" aria-hidden="true"></i></button>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:20px">
            <label class="form-checkbox">
              <input type="checkbox" id="terms" required />
              Concordo com os <a href="/terms" class="form-link">Termos de Uso</a> e <a href="/privacy" class="form-link">Privacidade</a>
            </label>
          </div>
          <button type="submit" class="btn-submit" id="register-btn">Criar conta grátis</button>
        </form>
      </div>
    </div>

    <div class="auth-footer">
      <a href="/"><i data-lucide="arrow-left" class="pg-icon" aria-hidden="true"></i> Voltar ao LifeOS</a>
    </div>
    <div class="security-badge">
      <i data-lucide="lock-keyhole" class="pg-icon" aria-hidden="true"></i> Conexão segura HTTPS · Sessão criptografada · SOC 2 Type II
    </div>
  </div>

  <script>
    'use strict';

    // Tab switching
    function switchTab(tab) {
      document.getElementById('panel-login').classList.toggle('active', tab === 'login');
      document.getElementById('panel-register').classList.toggle('active', tab === 'register');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    }

    // Open the registration panel when using the dedicated /register route
    if (location.pathname.replace(/\/+$/, '') === '/register') switchTab('register');

    // Check existing session
    (async () => {
      try {
        const r = await fetch('/api/session?optional=1', { credentials: 'same-origin' });
        if (r.ok) {
          const data = await r.json();
          if (data.ok && data.redirect) location.replace(data.redirect);
        }
      } catch (_) {}
    })();

    // Password toggles
    function setupPwdToggle(inputId, btnId) {
      const input = document.getElementById(inputId);
      const btn = document.getElementById(btnId);
      btn.addEventListener('click', () => {
        const isText = input.type === 'text';
        input.type = isText ? 'password' : 'text';
        btn.textContent = isText ? '\u{1F441}' : '\u{1F648}';
      });
    }
    setupPwdToggle('login-password', 'login-pwd-toggle');
    setupPwdToggle('reg-password', 'reg-pwd-toggle');

    // Status helpers
    function showStatus(id, type, msg) {
      const el = document.getElementById(id);
      el.className = 'status-msg show ' + type;
      el.textContent = msg;
    }
    function clearStatus(id) {
      const el = document.getElementById(id);
      el.className = 'status-msg';
      el.textContent = '';
    }
    function setLoading(btnId, v) {
      const btn = document.getElementById(btnId);
      btn.disabled = v;
      btn.classList.toggle('loading', v);
    }

    // ── FASE 332/333 — Auto-detect OAuth + Fallback Automático ─────────────
    // Detecta via /api/auth/config quais provedores estão configurados.
    // Botões são ocultados/desabilitados elegantemente se não configurados.
    // Quando as variáveis aparecerem no Cloudflare, os botões reaparecem
    // automaticamente — SEM alterar código.
    (async function initOAuthButtons() {
      let googleEnabled = false;
      let appleEnabled = false;
      try {
        const r = await fetch('/api/auth/config', { credentials: 'same-origin' });
        if (r.ok) {
          const cfg = await r.json();
          googleEnabled = Boolean(cfg.providers && cfg.providers.google);
          appleEnabled = Boolean(cfg.providers && cfg.providers.apple);
        }
      } catch (_) {
        // Se /api/auth/config falhar, manter botões visíveis mas com fallback
        googleEnabled = false;
        appleEnabled = false;
      }

      const googleBtn = document.querySelector('.sso-btn[onclick="showGoogleSignIn()"]');
      const appleBtn = document.getElementById('sso-apple');
      const ssoGrid = document.querySelector('.sso-grid');
      const divider = document.querySelector('.divider');

      if (!googleEnabled && googleBtn) {
        googleBtn.disabled = true;
        googleBtn.title = 'Google Login será ativado quando configurado';
        googleBtn.style.opacity = '0.4';
        googleBtn.style.cursor = 'not-allowed';
        googleBtn.style.pointerEvents = 'none';
      }
      if (!appleEnabled && appleBtn) {
        appleBtn.disabled = true;
        appleBtn.title = 'Apple Login será ativado quando configurado';
        appleBtn.style.opacity = '0.4';
        appleBtn.style.cursor = 'not-allowed';
        appleBtn.style.pointerEvents = 'none';
      }
      // Ocultar seção SSO inteira se nenhum provedor estiver configurado
      if (!googleEnabled && !appleEnabled && ssoGrid && divider) {
        ssoGrid.style.display = 'none';
        divider.style.display = 'none';
      }
    })();

    // Tratar redirecionamento de volta com ?oauth=*_unavailable
    (function handleOAuthUnavailable() {
      const params = new URLSearchParams(location.search);
      const oauthParam = params.get('oauth');
      if (oauthParam === 'google_unavailable') {
        showStatus('login-status', 'info', 'Google Login ainda não está configurado. Use e-mail e senha para entrar.');
        // Limpar o parâmetro da URL sem recarregar
        const clean = location.pathname + (params.size > 1 ? '?' + [...params.entries()].filter(([k]) => k !== 'oauth').map(([k,v]) => k+'='+v).join('&') : '');
        history.replaceState({}, '', clean);
      } else if (oauthParam === 'apple_unavailable') {
        showStatus('login-status', 'info', 'Apple Login ainda não está configurado. Use e-mail e senha para entrar.');
        const clean = location.pathname + (params.size > 1 ? '?' + [...params.entries()].filter(([k]) => k !== 'oauth').map(([k,v]) => k+'='+v).join('&') : '');
        history.replaceState({}, '', clean);
      }
    })();

    // Google Sign In — OAuth 2.0 real
    function showGoogleSignIn() {
      const btn = document.querySelector('.sso-btn[onclick="showGoogleSignIn()"]');
      if (btn && btn.disabled) {
        showStatus('login-status', 'info', 'Google Login será ativado automaticamente quando configurado no Cloudflare.');
        return;
      }
      if (btn) { btn.disabled = true; btn.style.opacity = '0.7'; }
      window.location.href = '/api/auth/google';
    }

    // Apple Sign In — OAuth 2.0 / OpenID Connect real
    function showAppleSignIn() {
      const appleBtn = document.getElementById('sso-apple');
      if (appleBtn && appleBtn.disabled) {
        showStatus('login-status', 'info', 'Apple Login será ativado automaticamente quando configurado no Cloudflare.');
        return;
      }
      if (appleBtn) { appleBtn.disabled = true; appleBtn.style.opacity = '0.7'; }
      window.location.href = '/api/auth/apple';
    }

    // LOGIN FORM
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearStatus('login-status');
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email) { showStatus('login-status', 'error', 'Informe seu e-mail.'); return; }
      if (!password) { showStatus('login-status', 'error', 'Informe sua senha.'); return; }
      setLoading('login-btn', true);
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          if (data.code === 'EMAIL_CONFIRMATION_REQUIRED') {
            showStatus('login-status', 'info', 'Confirme seu e-mail para continuar. Redirecionando para o reenvio…');
            setLoading('login-btn', false);
            setTimeout(() => location.href = '/confirm-email?email=' + encodeURIComponent(data.confirmationEmail || email), 900);
            return;
          }
          throw new Error(data.error || 'Credenciais inválidas.');
        }
        showStatus('login-status', 'success', '\u{2713} Autenticado! Redirecionando...');
        setTimeout(() => location.replace(data.redirect || '/app'), 800);
      } catch (err) {
        showStatus('login-status', 'error', err.message);
        setLoading('login-btn', false);
      }
    });

    // REGISTER FORM
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearStatus('register-status');
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const terms = document.getElementById('terms').checked;
      if (!name) { showStatus('register-status', 'error', 'Informe seu nome.'); return; }
      if (!email) { showStatus('register-status', 'error', 'Informe seu e-mail.'); return; }
      if (password.length < 8) { showStatus('register-status', 'error', 'Senha deve ter pelo menos 8 caracteres.'); return; }
      if (!terms) { showStatus('register-status', 'error', 'Aceite os termos para continuar.'); return; }
      setLoading('register-btn', true);
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ name, email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Erro ao criar conta.');
        showStatus('register-status', 'success', '\u{2713} Conta criada. Verifique seu e-mail para ativar o acesso.');
        setTimeout(() => location.replace(data.redirect || ('/confirm-email?email=' + encodeURIComponent(email))), 1000);
      } catch (err) {
        showStatus('register-status', 'error', err.message);
        setLoading('register-btn', false);
      }
    });

    // Clear errors on input
    document.querySelectorAll('.form-input').forEach(el => {
      el.addEventListener('input', () => el.classList.remove('error'));
    });
  </script>
  <script src="/precision_graphite.js?v=48.0.0" defer data-visual-system="precision-graphite"></script>
</body>
</html>
