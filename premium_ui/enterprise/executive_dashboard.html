<!DOCTYPE html>
<html lang="pt-BR" data-theme="enterprise-dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0E14" />
  <meta name="description" content="LifeOS — Executive Dashboard | Enterprise" />
  <title>Executive Dashboard — LifeOS Enterprise</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="../design_system/enterprise_identity.css" />
  <link rel="stylesheet" href="../design_system/enterprise_components.css" />
  <link rel="stylesheet" href="../design_system/responsive.css" />
  <link rel="stylesheet" href="../animations/animations.css" />
  <link rel="stylesheet" href="../animations/premium_motion.css" />
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <style>
    .executive-shell { display: flex; height: 100vh; overflow: hidden; background: var(--bg-base); }
    .executive-sidebar { width: var(--sidebar-width); background: var(--bg-elevated); border-right: 1px solid var(--border-default); display: flex; flex-direction: column; overflow-y: auto; z-index: var(--z-raised); }
    .executive-sidebar-header { padding: var(--space-6); border-bottom: 1px solid var(--border-default); display: flex; align-items: center; gap: var(--space-3); }
    .executive-sidebar-logo { width: 40px; height: 40px; background: var(--gradient-primary); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; font-weight: var(--font-bold); color: #FFFFFF; font-size: var(--text-xl); }
    .executive-sidebar-title { font-size: var(--text-base); font-weight: var(--font-bold); color: var(--text-primary); }
    .executive-sidebar-nav { flex: 1; padding: var(--space-4); display: flex; flex-direction: column; gap: var(--space-2); }
    .executive-sidebar-item { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-4); border-radius: var(--radius-md); color: var(--text-secondary); cursor: pointer; transition: all var(--duration-normal) var(--ease-out); text-decoration: none; font-size: var(--text-base); border-left: 3px solid transparent; }
    .executive-sidebar-item:hover { background: var(--bg-surface-1); color: var(--text-primary); }
    .executive-sidebar-item.active { background: rgba(91, 127, 255, 0.15); color: var(--brand-primary-400); border-left-color: var(--brand-primary-600); }
    .executive-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .executive-topbar { height: var(--topbar-height); background: var(--bg-card); border-bottom: 1px solid var(--border-default); display: flex; align-items: center; justify-content: space-between; padding: 0 var(--space-6); gap: var(--space-6); }
    .executive-topbar-left { display: flex; align-items: center; gap: var(--space-4); flex: 1; }
    .executive-topbar-title { font-size: var(--text-lg); font-weight: var(--font-semibold); color: var(--text-primary); }
    .executive-topbar-right { display: flex; align-items: center; gap: var(--space-4); }
    .executive-content { flex: 1; overflow-y: auto; padding: var(--space-6); }
    .dashboard-section { margin-bottom: var(--space-8); }
    .dashboard-section-title { font-size: var(--text-2xl); font-weight: var(--font-bold); color: var(--text-primary); margin-bottom: var(--space-4); display: flex; align-items: center; gap: var(--space-3); }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: var(--space-5); margin-bottom: var(--space-6); }
    .kpi-card { background: var(--bg-card); border: 1px solid var(--border-default); border-radius: var(--radius-xl); padding: var(--space-6); transition: all var(--duration-normal) var(--ease-out); position: relative; overflow: hidden; }
    .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--gradient-primary); opacity: 0; transition: opacity var(--duration-normal) var(--ease-out); }
    .kpi-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-md); }
    .kpi-card:hover::before { opacity: 1; }
    .kpi-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-4); }
    .kpi-label { font-size: var(--text-sm); font-weight: var(--font-medium); color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
    .kpi-badge { display: inline-flex; align-items: center; gap: var(--space-1); padding: var(--space-1) var(--space-3); background: rgba(16, 185, 129, 0.15); color: var(--status-success-500); border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: var(--font-medium); }
    .kpi-value { font-size: var(--text-4xl); font-weight: var(--font-bold); color: var(--text-primary); margin-bottom: var(--space-2); letter-spacing: -0.02em; }
    .kpi-change { font-size: var(--text-sm); color: var(--text-secondary); }
    .chart-container { background: var(--bg-card); border: 1px solid var(--border-default); border-radius: var(--radius-xl); padding: var(--space-6); margin-bottom: var(--space-6); }
    .chart-title { font-size: var(--text-lg); font-weight: var(--font-semibold); color: var(--text-primary); margin-bottom: var(--space-4); }
    .chart-wrapper { position: relative; height: 300px; }
    @media (max-width: 768px) {
      .executive-sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border-default); flex-direction: row; overflow-x: auto; }
      .executive-sidebar-nav { flex-direction: row; flex: 1; }
      .executive-content { padding: var(--space-4); }
      .kpi-grid { grid-template-columns: 1fr; }
    }
  </style>
  <link rel="stylesheet" href="/precision_graphite.css" data-visual-system="precision-graphite" />
</head>
<body style="visibility:hidden">
<script>
  fetch('/api/enterprise-data', { credentials: 'same-origin' })
    .then(r => { if (!r.ok) throw new Error('unauthorized'); return r.json(); })
    .then(() => { document.body.style.visibility = 'visible'; })
    .catch(() => { location.replace('/login?next=' + encodeURIComponent('/enterprise/executive')); });
</script>
  <div class="executive-shell">
    <aside class="executive-sidebar">
      <div class="executive-sidebar-header"><div class="executive-sidebar-logo">L</div><div class="executive-sidebar-title">LifeOS</div></div>
      <nav class="executive-sidebar-nav">
        <a href="#dashboard" class="executive-sidebar-item active" data-view="dashboard"><i data-lucide="chart-no-axes-combined" class="pg-icon" aria-hidden="true"></i> Dashboard</a>
        <a href="#analytics" class="executive-sidebar-item" data-view="analytics"><i data-lucide="trending-up" class="pg-icon" aria-hidden="true"></i> Analytics</a>
        <a href="/enterprise" class="executive-sidebar-item"><i data-lucide="arrow-left" class="pg-icon" aria-hidden="true"></i> Voltar</a>
      </nav>
    </aside>
    <div class="executive-main">
      <header class="executive-topbar">
        <div class="executive-topbar-left"><div class="executive-topbar-title">Executive Dashboard</div></div>
        <div class="executive-topbar-right">
          <span class="exec-user-name" style="font-size: var(--text-sm); color: var(--text-secondary);">Carregando...</span>
          <button class="enterprise-btn ghost" type="button" onclick="execLogout()">Encerrar sessão</button>
        </div>
      </header>
      <main class="executive-content" id="exec-view-root"></main>
    </div>
  </div>
  <script>
    (() => {
      const API = '/api/enterprise-data';
      const state = { data: null };
      const money = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v || 0));

      async function execLogout() {
        try { await fetch('/api/admin-logout', { method: 'POST', credentials: 'same-origin' }); } catch (_) {}
        location.replace('/login');
      }
      async function request() {
        const response = await fetch(API, { credentials: 'same-origin' });
        if (response.status === 401) { location.replace('/login'); return; }
        const result = await response.json();
        state.data = result.data;
        return result.data;
      }

      function renderDashboard() {
        const sub = state.data.subscription;
        const sys = state.data.system;
        return `
          <div class="dashboard-section">
            <div class="dashboard-section-title">\u{1F4B0} Receita & Faturamento</div>
            <div class="kpi-grid">
              <div class="kpi-card">
                <div class="kpi-header"><span class="kpi-label">MRR</span><span class="kpi-badge">Estável</span></div>
                <div class="kpi-value">${money(sub.monthlyValue)}</div>
                <div class="kpi-change">Plano ${esc(sub.plan)}</div>
              </div>
              <div class="kpi-card">
                <div class="kpi-header"><span class="kpi-label">ARR</span><span class="kpi-badge">Projeção</span></div>
                <div class="kpi-value">${money(sub.monthlyValue * 12)}</div>
                <div class="kpi-change">Base anualizada</div>
              </div>
              <div class="kpi-card">
                <div class="kpi-header"><span class="kpi-label">Status</span><span class="kpi-badge">Ativo</span></div>
                <div class="kpi-value">${esc(sub.status)}</div>
                <div class="kpi-change">Pagamento: ${esc(sub.paymentMethod)}</div>
              </div>
            </div>
          </div>
          <div class="chart-container">
            <div class="chart-title">Crescimento de Membros (Últimos 6 meses)</div>
            <div class="chart-wrapper"><canvas id="growthChart"></canvas></div>
          </div>
        `;
      }

      const esc = (v) => String(v ?? '').replace(/[&<>'"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[c]));

      async function init() {
        await request();
        document.querySelector('.exec-user-name').textContent = state.data.members[0]?.name || 'Executivo';
        document.getElementById('exec-view-root').innerHTML = renderDashboard();
        
        const ctx = document.getElementById('growthChart').getContext('2d');
        new Chart(ctx, {
          type: 'line',
          data: {
            labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'],
            datasets: [{
              label: 'Membros Ativos',
              data: [state.data.members.length - 5, state.data.members.length - 3, state.data.members.length - 2, state.data.members.length - 1, state.data.members.length, state.data.members.length],
              borderColor: '#5B7FFF',
              backgroundColor: 'rgba(91, 127, 255, 0.1)',
              fill: true,
              tension: 0.4
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, grid: { color: 'rgba(255, 255, 255, 0.05)' } }, x: { grid: { display: false } } }
          }
        });
      }
      init();
    })();
  </script>
  <script src="/precision_graphite.js" defer data-visual-system="precision-graphite"></script>
</body>
</html>
