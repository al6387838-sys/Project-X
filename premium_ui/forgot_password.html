<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Recuperar Senha — LifeOS Enterprise</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base: #0A0E14; --bg-card: #141B28; --bg-elevated: #0F1520;
      --border: rgba(255,255,255,0.07); --border-accent: rgba(99,102,241,0.3);
      --text-primary: #F0F4FF; --text-secondary: #8892A4; --text-muted: #4A5568;
      --accent: #6366F1; --accent-light: #818CF8; --green: #10B981; --red: #EF4444;
      --gradient-hero: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #06B6D4 100%);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 20%, rgba(99,102,241,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .container {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
      text-decoration: none;
      color: var(--text-primary);
    }
    .logo-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: var(--gradient-hero);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 24px rgba(99,102,241,0.4);
    }
    .logo-text { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .card-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: rgba(99,102,241,0.15);
      border: 1px solid var(--border-accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
    }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
    p { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; line-height: 1.6; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    input {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: var(--text-primary);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
    .btn {
      width: 100%;
      padding: 13px;
      background: var(--gradient-hero);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(99,102,241,0.4); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .status {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
    }
    .status.show { display: block; }
    .status.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); color: #6EE7B7; }
    .status.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #FCA5A5; }
    .footer { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-muted); }
    .footer a { color: var(--accent-light); text-decoration: none; font-weight: 500; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">LifeOS</span>
    </a>
    <div class="card">
      <div class="card-icon">🔑</div>
      <h1>Recuperar senha</h1>
      <p>Informe seu e-mail cadastrado e enviaremos as instruções para redefinir sua senha.</p>
      <div class="status" id="status"></div>
      <form id="form" novalidate>
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" required />
        <button type="submit" class="btn" id="btn">Enviar instruções</button>
      </form>
    </div>
    <div class="footer">
      <a href="/login">← Voltar ao login</a>
    </div>
  </div>
  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const status = document.getElementById('status');
      const btn = document.getElementById('btn');
      if (!email) {
        status.className = 'status show error';
        status.textContent = 'Informe seu e-mail.';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Enviando...';
      try {
        await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        status.className = 'status show success';
        status.textContent = '✓ Se este e-mail estiver cadastrado, você receberá as instruções em breve.';
        document.getElementById('email').value = '';
      } catch (_) {
        status.className = 'status show error';
        status.textContent = 'Erro ao enviar. Tente novamente.';
      }
      btn.disabled = false;
      btn.textContent = 'Enviar instruções';
    });
  </script>
</body>
</html>
