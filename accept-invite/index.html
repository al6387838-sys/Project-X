<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Aceitar Convite — LifeOS Enterprise</title><meta name="robots" content="noindex,nofollow"><link rel="manifest" href="/manifest.webmanifest"><link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="icon" type="image/x-icon" href="/favicon.ico"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="/precision_graphite.css?v=13.0.0"><style>*,::after,::before{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg-base,#0a0a0a);color:var(--text-primary,#fff);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.invite-card{background:var(--bg-elevated,#111);border:1px solid var(--border,#222);border-radius:16px;padding:40px;width:100%;max-width:460px;text-align:center}.invite-logo{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:24px}.invite-logo span{color:var(--accent,#3b82f6)}.invite-org-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:24px;padding:6px 16px;font-size:13px;font-weight:600;color:var(--accent,#3b82f6);margin-bottom:20px}.invite-title{font-size:22px;font-weight:700;margin-bottom:8px}.invite-subtitle{font-size:14px;color:var(--text-secondary,#888);margin-bottom:28px;line-height:1.6}.invite-meta{background:var(--bg-base,#0a0a0a);border:1px solid var(--border,#222);border-radius:10px;padding:16px;margin-bottom:24px;text-align:left}.invite-meta-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px}.invite-meta-label{color:var(--text-secondary,#888)}.invite-meta-value{font-weight:600}.role-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}.role-owner{background:rgba(139,92,246,.15);color:#a78bfa}.role-admin{background:rgba(239,68,68,.15);color:#ef4444}.role-manager{background:rgba(245,158,11,.15);color:#f59e0b}.role-employee{background:rgba(59,130,246,.15);color:#60a5fa}.role-guest{background:rgba(107,114,128,.15);color:#9ca3af}.btn-accept{width:100%;background:var(--accent,#3b82f6);color:#fff;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-bottom:10px}.btn-accept:hover{opacity:.9}.btn-accept:disabled{opacity:.5;cursor:not-allowed}.btn-decline{width:100%;background:0 0;color:var(--text-secondary,#888);border:1px solid var(--border,#222);border-radius:8px;padding:11px;font-size:14px;cursor:pointer;transition:all .2s}.btn-decline:hover{border-color:#ef4444;color:#ef4444}.status-msg{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}.status-msg.show{display:block}.status-msg.success{background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.2)}.status-msg.error{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}.status-msg.info{background:rgba(59,130,246,.1);color:#3b82f6;border:1px solid rgba(59,130,246,.2)}.loading-state{color:var(--text-secondary,#888);font-size:14px;padding:20px 0}.expired-state{color:#ef4444;font-size:14px;padding:20px 0}</style></head><body><div class="invite-card"><div class="invite-logo">Life<span>OS</span></div><div id="loading-view" class="loading-state">Verificando convite...</div><div id="invite-view" style="display:none"><div class="invite-org-badge" id="org-badge">🏢 <span id="org-name">Organização</span></div><div class="invite-title">Você foi convidado!</div><div class="invite-subtitle" id="invite-desc">Alguém convidou você para colaborar no LifeOS Enterprise.</div><div class="invite-meta"><div class="invite-meta-row"><span class="invite-meta-label">Convidado por</span> <span class="invite-meta-value" id="inviter-name">—</span></div><div class="invite-meta-row"><span class="invite-meta-label">Organização</span> <span class="invite-meta-value" id="invite-org">—</span></div><div class="invite-meta-row"><span class="invite-meta-label">Papel</span> <span class="invite-meta-value"><span class="role-badge" id="invite-role">member</span></span></div><div class="invite-meta-row"><span class="invite-meta-label">Expira em</span> <span class="invite-meta-value" id="invite-expires">—</span></div></div><div class="status-msg" id="invite-status"></div><button class="btn-accept" id="accept-btn" onclick="acceptInvite()">Aceitar Convite</button> <button class="btn-decline" onclick="declineInvite()">Recusar</button></div><div id="error-view" style="display:none"><div class="expired-state" id="error-msg">Convite inválido ou expirado.</div><a href="/login" style="color:var(--accent,#3b82f6);font-size:13px;text-decoration:none">← Ir para o login</a></div></div><script>"use strict";const params=new URLSearchParams(location.search),inviteToken=params.get("token");function showStatus(e,t){const n=document.getElementById("invite-status");n.className=`status-msg show ${e}`,n.textContent=t}function formatDate(e){try{return new Date(e).toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"})}catch{return e}}function getRoleLabel(e){return{owner:"Owner",admin:"Admin",manager:"Manager",employee:"Employee",guest:"Guest"}[e]||e}async function loadInvite(){if(!inviteToken)return document.getElementById("loading-view").style.display="none",document.getElementById("error-view").style.display="block",void(document.getElementById("error-msg").textContent="Token de convite n\xe3o encontrado.");try{const e=await fetch(`/api/enterprise/invite?token=${encodeURIComponent(inviteToken)}`,{credentials:"same-origin"}),t=await e.json();if(document.getElementById("loading-view").style.display="none",!t.ok)return document.getElementById("error-view").style.display="block",void(document.getElementById("error-msg").textContent=t.error||"Convite inv\xe1lido ou expirado.");const n=t.invite;document.getElementById("org-name").textContent=n.orgName||"LifeOS Enterprise",document.getElementById("inviter-name").textContent=n.inviterName||n.invitedBy,document.getElementById("invite-org").textContent=n.orgName||"LifeOS Enterprise",document.getElementById("invite-desc").textContent=`${n.inviterName||n.invitedBy} convidou voc\xea para colaborar em ${n.orgName||"LifeOS Enterprise"}.`,document.getElementById("invite-expires").textContent=formatDate(n.expiresAt);const o=document.getElementById("invite-role");o.textContent=getRoleLabel(n.role),o.className=`role-badge role-${n.role}`,document.getElementById("invite-view").style.display="block"}catch{document.getElementById("loading-view").style.display="none",document.getElementById("error-view").style.display="block",document.getElementById("error-msg").textContent="Erro ao carregar convite. Tente novamente."}}async function acceptInvite(){const e=document.getElementById("accept-btn");e.disabled=!0,e.textContent="Aceitando...";try{const e=await fetch("/api/enterprise/invite",{method:"POST",headers:{"content-type":"application/json"},credentials:"same-origin",body:JSON.stringify({action:"accept",token:inviteToken})}),t=await e.json();if(!e.ok){if(401===e.status)return void location.replace(`/login?redirect=${encodeURIComponent(location.href)}`);throw new Error(t.error||"Erro ao aceitar convite")}showStatus("success","Convite aceito. Redirecionando para o Workspace Enterprise...");const n=t.organization?.id?`?orgId=${encodeURIComponent(t.organization.id)}`:"";setTimeout(()=>location.replace(`/enterprise${n}#workspaces`),1500)}catch(t){showStatus("error",t.message),e.disabled=!1,e.textContent="Aceitar Convite"}}function declineInvite(){confirm("Tem certeza que deseja recusar este convite?")&&location.replace("/login")}loadInvite()</script><script src="/precision_graphite.js?v=13.0.0" defer data-visual-system="precision-graphite"></script></body></html>
