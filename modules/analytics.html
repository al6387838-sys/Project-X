<!-- LifeOS Enterprise — Analytics Center -->
<div id="module-analytics" style="display:none">
  <div class="page" id="page-analytics">
    <div class="page-header">
      <div>
        <div class="page-title"><i data-lucide="chart-no-axes-combined" class="pg-icon" aria-hidden="true"></i> Analytics Center</div>
        <div class="page-subtitle">Indicadores calculados a partir dos dados persistidos na sua conta.</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <label for="analytics-period" style="font-size:12px;color:var(--text-muted)">Período</label>
        <select id="analytics-period" class="form-input" style="width:auto" onchange="analyticsLoad()"><option value="7d">7 dias</option><option value="30d" selected>30 dias</option><option value="90d">90 dias</option></select>
        <button class="btn btn-ghost" type="button" onclick="analyticsExport()"><i data-lucide="download" class="pg-icon" aria-hidden="true"></i> Exportar</button>
        <button class="btn btn-ghost" type="button" onclick="analyticsLoad()"><i data-lucide="refresh-cw" class="pg-icon" aria-hidden="true"></i> Atualizar</button>
      </div>
    </div>

    <div class="dv11-tabs" role="tablist" style="margin-bottom:18px">
      <button class="dv11-tab active" type="button" onclick="analyticsTab('summary')" role="tab">Resumo</button>
      <button class="dv11-tab" type="button" onclick="analyticsTab('productivity')" role="tab">Produtividade</button>
      <button class="dv11-tab" type="button" onclick="analyticsTab('habits')" role="tab">Hábitos</button>
      <button class="dv11-tab" type="button" onclick="analyticsTab('finance')" role="tab">Financeiro</button>
      <button class="dv11-tab" type="button" onclick="analyticsTab('goals')" role="tab">Metas</button>
    </div>

    <section id="analytics-summary-tab" class="analytics-tab-panel active" role="tabpanel"></section>
    <section id="analytics-productivity-tab" class="analytics-tab-panel" role="tabpanel" style="display:none"></section>
    <section id="analytics-habits-tab" class="analytics-tab-panel" role="tabpanel" style="display:none"></section>
    <section id="analytics-finance-tab" class="analytics-tab-panel" role="tabpanel" style="display:none"></section>
    <section id="analytics-goals-tab" class="analytics-tab-panel" role="tabpanel" style="display:none"></section>
  </div>

  <style>
    #page-analytics .analytics-card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
    #page-analytics .analytics-tab-panel.active{display:block!important}
    #page-analytics .analytics-metric{font-size:24px;font-weight:800;line-height:1.1;margin-top:8px}
    #page-analytics .analytics-label{font-size:12px;color:var(--text-muted)}
    #page-analytics .analytics-list{display:grid;gap:8px;margin-top:16px}
    #page-analytics .analytics-row{display:flex;justify-content:space-between;gap:12px;padding:11px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px}
  </style>

  <script>
  (() => {
    'use strict';
    if (window.LifeOSAnalytics) return;
    const state = { data: null, error: '', active: 'summary' };
    const money = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 2 }).format(Number(value) || 0);
    const integer = (value) => new Intl.NumberFormat('pt-BR').format(Number(value) || 0);
    const html = (value) => String(value ?? '').replace(/[&<>"']/g, (character) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[character]));
    const metric = (label, value, tone = 'var(--accent)') => `<article class="card" style="padding:16px"><div class="analytics-label">${html(label)}</div><div class="analytics-metric" style="color:${tone}">${html(value)}</div></article>`;
    const empty = (title, copy) => `<div class="card" style="text-align:center;padding:42px 20px"><i data-lucide="chart-no-axes-combined" style="width:32px;height:32px;color:var(--text-muted);margin-bottom:10px" aria-hidden="true"></i><div style="font-size:15px;font-weight:700;margin-bottom:7px">${html(title)}</div><div style="font-size:13px;color:var(--text-muted);max-width:520px;margin:0 auto">${html(copy)}</div></div>`;
    const rows = (items, label, value, formatter = integer) => items?.length ? `<div class="analytics-list">${items.map((item) => `<div class="analytics-row"><span>${html(label(item))}</span><strong>${html(formatter(value(item)))}</strong></div>`).join('')}</div>` : '<div style="font-size:13px;color:var(--text-muted);padding:18px 0">Ainda não há dados suficientes neste período.</div>';
    const panel = (id, content) => { const node = document.getElementById(`analytics-${id}-tab`); if (node) node.innerHTML = content; };
    const refreshIcons = () => { try { window.lucide?.createIcons?.(); } catch (_) {} };
    const render = () => {
      if (state.error) {
        ['summary', 'productivity', 'habits', 'finance', 'goals'].forEach((id) => panel(id, `<div class="card" style="padding:28px;color:var(--red)"><strong>Analytics indisponível</strong><div style="font-size:13px;margin-top:8px">${html(state.error)}</div><button class="btn btn-ghost" style="margin-top:14px" type="button" onclick="analyticsLoad()">Tentar novamente</button></div>`));
        return;
      }
      if (!state.data) {
        ['summary', 'productivity', 'habits', 'finance', 'goals'].forEach((id) => panel(id, '<div class="card" style="padding:28px;color:var(--text-muted)">Carregando indicadores persistidos...</div>'));
        return;
      }
      const { productivity = {}, crm = {}, documents = {}, platform = {}, finance = {} } = state.data;
      const p = productivity.kpis || {}, c = crm.kpis || {}, d = documents.kpis || {}, pl = platform.kpis || {}, f = finance.kpis || {};
      const hasData = [p.totalTasks, c.totalContacts, d.totalContent, pl.totalEvents, f.totalIncome, f.totalExpenses].some((value) => Number(value) > 0);
      panel('summary', hasData ? `<div class="analytics-card-grid">${metric('Tarefas concluídas', integer(p.completedTasks), 'var(--green)')}${metric('Contatos comerciais', integer(c.totalContacts))}${metric('Conteúdos registrados', integer(d.totalContent), 'var(--cyan)')}${metric('Eventos de atividade', integer(pl.totalEvents), 'var(--purple)')}</div><div class="card" style="padding:18px;margin-top:16px"><div style="font-size:14px;font-weight:800">Visão consolidada</div><div class="analytics-list"><div class="analytics-row"><span>Taxa de conclusão de tarefas</span><strong>${integer(p.completionRate)}%</strong></div><div class="analytics-row"><span>Pipeline comercial</span><strong>${money(c.totalValue)}</strong></div><div class="analytics-row"><span>Saldo financeiro do período</span><strong>${money(f.netBalance)}</strong></div><div class="analytics-row"><span>Módulo mais utilizado</span><strong>${html(pl.mostUsedModule || '—')}</strong></div></div></div>` : empty('Ainda não há indicadores consolidados.', 'Registre tarefas, documentos, metas, contatos ou lançamentos para começar a visualizar análises.'));
      panel('productivity', `<div class="analytics-card-grid">${metric('Tarefas criadas', integer(p.totalTasks))}${metric('Tarefas concluídas', integer(p.completedTasks), 'var(--green)')}${metric('Em atraso', integer(p.overdueTasks), p.overdueTasks ? 'var(--amber)' : 'var(--text-primary)')}${metric('Conclusão', `${integer(p.completionRate)}%`, 'var(--cyan)')}</div><div class="card" style="padding:18px;margin-top:16px"><div style="font-size:14px;font-weight:800">Atividade diária</div>${rows((productivity.labels || []).map((label, index) => ({ label, created: productivity.taskCreated?.[index] || 0, completed: productivity.taskCompleted?.[index] || 0 })).filter((item) => item.created || item.completed), (item) => item.label, (item) => `${item.completed} concluída(s) · ${item.created} criada(s)`, (value) => value)}</div>`);
      panel('habits', `<div class="analytics-card-grid">${metric('Hábitos ativos', integer(p.activeHabits), 'var(--green)')}${metric('Conclusões no período', integer((productivity.habitCompleted || []).reduce((total, value) => total + (Number(value) || 0), 0)), 'var(--accent')}${metric('Metas ativas', integer(p.activeGoals), 'var(--purple)')}${metric('Progresso médio das metas', `${integer(p.avgGoalProgress)}%`, 'var(--cyan)')}</div><div class="card" style="padding:18px;margin-top:16px"><div style="font-size:14px;font-weight:800">Conclusões de hábitos por dia</div>${rows((productivity.labels || []).map((label, index) => ({ label, count: productivity.habitCompleted?.[index] || 0 })).filter((item) => item.count), (item) => item.label, (item) => item.count)}</div>`);
      panel('finance', `<div class="analytics-card-grid">${metric('Receitas', money(f.totalIncome), 'var(--green)')}${metric('Despesas', money(f.totalExpenses), 'var(--red)')}${metric('Saldo', money(f.netBalance), f.netBalance < 0 ? 'var(--red)' : 'var(--accent)')}${metric('Taxa de poupança', `${integer(f.savingsRate)}%`, 'var(--cyan)')}</div><div class="card" style="padding:18px;margin-top:16px"><div style="font-size:14px;font-weight:800">Movimentações no período</div>${rows((finance.labels || []).map((label, index) => ({ label, income: finance.income?.[index] || 0, expenses: finance.expenses?.[index] || 0 })).filter((item) => item.income || item.expenses), (item) => item.label, (item) => `${money(item.income)} de receitas · ${money(item.expenses)} de despesas`, (value) => value)}</div>`);
      panel('goals', `<div class="analytics-card-grid">${metric('Metas ativas', integer(p.activeGoals), 'var(--purple)')}${metric('Progresso médio', `${integer(p.avgGoalProgress)}%`, 'var(--cyan)')}${metric('Documentos criados', integer(d.totalDocuments), 'var(--accent')}${metric('Notas registradas', integer(d.totalNotes), 'var(--green)')}</div><div class="card" style="padding:18px;margin-top:16px"><div style="font-size:14px;font-weight:800">Conteúdo criado por dia</div>${rows((documents.labels || []).map((label, index) => ({ label, count: documents.createdByDay?.[index] || 0 })).filter((item) => item.count), (item) => item.label, (item) => item.count)}</div>`);
      refreshIcons();
    };
    window.analyticsTab = (id) => { state.active = id; document.querySelectorAll('#page-analytics .analytics-tab-panel').forEach((node) => { const active = node.id === `analytics-${id}-tab`; node.classList.toggle('active', active); node.style.display = active ? 'block' : 'none'; }); document.querySelectorAll('#page-analytics .dv11-tab').forEach((node) => node.classList.toggle('active', node.getAttribute('onclick') === `analyticsTab('${id}')`)); };
    window.analyticsLoad = async () => {
      state.error = ''; state.data = null; render();
      const period = document.getElementById('analytics-period')?.value || '30d';
      try {
        const response = await fetch(`/api/analytics-pro?module=all&period=${encodeURIComponent(period)}`, { credentials: 'same-origin' });
        const result = await response.json().catch(() => ({}));
        if (!response.ok || !result.ok || !result.data) throw new Error(result.error || 'Não foi possível carregar os indicadores.');
        state.data = result.data;
      } catch (error) { state.error = error instanceof Error ? error.message : 'Não foi possível carregar os indicadores.'; }
      render(); window.analyticsTab(state.active);
    };
    window.analyticsPeriod = (period) => { const select = document.getElementById('analytics-period'); if (select) select.value = period === 'week' ? '7d' : period === 'quarter' ? '90d' : '30d'; window.analyticsLoad(); };
    window.analyticsExport = () => { if (!state.data) { if (typeof window.showToast === 'function') window.showToast('Carregue os indicadores antes de exportar.', 'info'); return; } const blob = new Blob([JSON.stringify(state.data, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const link = document.createElement('a'); link.href = url; link.download = 'lifeos-analytics.json'; link.click(); URL.revokeObjectURL(url); };
    window.LifeOSAnalytics = { load: window.analyticsLoad, state };
    window.setTimeout(window.analyticsLoad, 0);
  })();
  </script>
</div>
<!-- END module-analytics -->
