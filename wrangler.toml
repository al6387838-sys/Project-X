# LifeOS Enterprise — Cloudflare Pages Configuration
# Production hardening configuration:
#   LIFEOS_SESSION_SECRET  → configurar via: wrangler secret put LIFEOS_SESSION_SECRET
#   LIFEOS_ADMIN_PASSWORD_HASH → configurar via: wrangler secret put LIFEOS_ADMIN_PASSWORD_HASH
#   Secrets NÃO devem constar em [vars] em produção — usar Cloudflare Pages Secrets
#
# ── VARIÁVEIS OPCIONAIS (OAuth) ──────────────────────────────────────────────
# Google OAuth (opcional — Login Google será ativado automaticamente quando configurado):
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
#
# Apple Sign In (opcional — Login Apple será ativado automaticamente quando configurado):
#   wrangler secret put APPLE_CLIENT_ID
#   wrangler secret put APPLE_TEAM_ID
#   wrangler secret put APPLE_KEY_ID
#   wrangler secret put APPLE_PRIVATE_KEY
#
# Email (opcional — Cadastro/Recuperação de senha requerem um provedor):
#   wrangler secret put RESEND_API_KEY   (recomendado)
#   wrangler secret put EMAIL_FROM       (ex: "LifeOS <noreply@lifeos.app>")
#   OU
#   wrangler secret put SENDGRID_API_KEY
#   wrangler secret put EMAIL_FROM
# ─────────────────────────────────────────────────────────────────────────────
name = "lifeos-enterprise"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[[kv_namespaces]]
binding = "LIFEOS_KV"
id = "153546d515a343d181420186ee70f994"
preview_id = "153546d515a343d181420186ee70f994"

[[r2_buckets]]
binding = "LIFEOS_R2"
bucket_name = "lifeos-files"
preview_bucket_name = "lifeos-files-preview"

[[r2_buckets]]
binding = "LIFEOS_FILES"
bucket_name = "lifeos-documents"
preview_bucket_name = "lifeos-documents-preview"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "lifeos-storage"
preview_bucket_name = "lifeos-storage-preview"

[vars]
LIFEOS_ADMIN_USER = "al6387838@gmail.com"
# LIFEOS_ADMIN_PASSWORD_HASH e LIFEOS_SESSION_SECRET devem ser configurados
# como Cloudflare Pages Secrets (não como [vars]):
#   npx wrangler secret put LIFEOS_SESSION_SECRET
#   npx wrangler secret put LIFEOS_ADMIN_PASSWORD_HASH
LIFEOS_ENV = "production"
