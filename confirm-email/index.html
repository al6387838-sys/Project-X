<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="dark"><title>Confirmar e-mail — LifeOS Enterprise</title><style>:root{color-scheme:dark;--bg:#080b11;--panel:#111722;--line:rgba(255,255,255,.09);--text:#f4f7ff;--muted:#919bad;--primary:#6366f1;--danger:#f87171;--success:#34d399}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 50% 0,rgba(99,102,241,.15),transparent 38%),var(--bg);color:var(--text);font:15px/1.5 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{width:min(100%,480px);padding:34px;border:1px solid var(--line);border-radius:22px;background:rgba(17,23,34,.94);box-shadow:0 26px 80px rgba(0,0,0,.42)}.brand{font-size:13px;font-weight:850;letter-spacing:.14em;color:#a5b4fc;margin-bottom:28px}.icon{width:58px;height:58px;display:grid;place-items:center;border-radius:16px;background:rgba(99,102,241,.15);color:#a5b4fc;margin-bottom:20px}.icon svg{width:28px}h1{font-size:27px;line-height:1.2;margin:0 0 10px}p{margin:0 0 22px;color:var(--muted)}label{display:block;font-size:13px;font-weight:700;margin:0 0 7px}input{width:100%;height:48px;border:1px solid var(--line);border-radius:11px;background:#0b1019;color:var(--text);padding:0 14px;font:inherit;outline:0}input:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(99,102,241,.16)}.button,button{width:100%;min-height:48px;border:0;border-radius:11px;background:var(--primary);color:#fff;font:700 15px Inter,system-ui;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;margin-top:14px}button:disabled{opacity:.6;cursor:wait}.message{display:none;padding:13px 14px;margin:18px 0 0;border:1px solid var(--line);border-radius:10px;color:var(--muted)}.message.show{display:block}.message.error{border-color:rgba(248,113,113,.35);color:var(--danger);background:rgba(248,113,113,.07)}.message.success{border-color:rgba(52,211,153,.35);color:var(--success);background:rgba(52,211,153,.07)}.spinner{width:23px;height:23px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.back{display:block;text-align:center;color:#a5b4fc;text-decoration:none;margin-top:22px;font-weight:650}.hidden{display:none}</style></head><body><main class="card" aria-live="polite"><div class="brand">LIFEOS ENTERPRISE</div><div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="m4 7 8 6 8-6"/></svg></div><section id="confirmState" class="hidden"><h1>Confirmando seu e-mail</h1><p>Estamos validando o link e ativando sua conta com segurança.</p><div class="message show" id="confirmMessage"><span class="spinner" aria-label="Carregando"></span></div><a class="button hidden" id="continueButton" href="/app">Continuar</a></section><section id="resendState" class="hidden"><h1>Confirme seu e-mail</h1><p>Enviaremos um novo link para concluir a ativação da sua conta.</p><form id="resendForm"><label for="email">E-mail da conta</label> <input id="email" name="email" type="email" autocomplete="email" required maxlength="254"> <button id="resendButton" type="submit">Reenviar confirmação</button></form><div class="message" id="resendMessage"></div></section><a class="back" href="/login">Voltar ao login</a></main><script>const params=new URLSearchParams(location.search),token=params.get("token"),email=params.get("email")||"",confirmState=document.getElementById("confirmState"),resendState=document.getElementById("resendState"),confirmMessage=document.getElementById("confirmMessage"),continueButton=document.getElementById("continueButton");function showMessage(e,t,n){e.textContent=t,e.className="message show "+(n||"")}async function confirmEmail(){confirmState.classList.remove("hidden");try{const e=await fetch("/api/email-confirmation",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({action:"confirm",token:token})}),t=await e.json();if(!e.ok)throw new Error(t.error||"N\xe3o foi poss\xedvel confirmar o e-mail.");showMessage(confirmMessage,t.message||"E-mail confirmado.","success"),continueButton.href=t.redirect||"/app",continueButton.classList.remove("hidden")}catch(e){showMessage(confirmMessage,e.message,"error"),setTimeout(()=>{confirmState.classList.add("hidden"),resendState.classList.remove("hidden")},1600)}}token?confirmEmail():(resendState.classList.remove("hidden"),document.getElementById("email").value=email),document.getElementById("resendForm").addEventListener("submit",async e=>{e.preventDefault();const t=document.getElementById("resendButton"),n=document.getElementById("resendMessage");t.disabled=!0,t.textContent="Enviando\u2026";try{const e=await fetch("/api/email-confirmation",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({action:"resend",email:document.getElementById("email").value})}),t=await e.json();if(!e.ok)throw new Error(t.error||"N\xe3o foi poss\xedvel enviar o link.");showMessage(n,t.message,"success")}catch(e){showMessage(n,e.message,"error")}finally{t.disabled=!1,t.textContent="Reenviar confirma\xe7\xe3o"}})</script></body></html>
