server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: lifeos-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: lifeos
          __path__: /var/log/lifeos/*.log

  - job_name: lifeos-errors
    static_configs:
      - targets:
          - localhost
        labels:
          job: lifeos-errors
          level: error
          __path__: /var/log/lifeos/error.log
