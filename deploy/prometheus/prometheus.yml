global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "lifeos-monitor"
    environment: "${LIFEOS_ENV:-production}"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts/*.yml"

scrape_configs:
  - job_name: "lifeos-core"
    static_configs:
      - targets: ["lifeos-core:8080"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
