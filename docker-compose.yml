version: "3.9"

# LifeOS — Docker Compose
# Environments: production, staging

services:
  # ─── LifeOS Core ──────────────────────────────────────────────────────────
  lifeos-core:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: lifeos:${LIFEOS_VERSION:?LIFEOS_VERSION must be derived from config/release.json}
    container_name: lifeos-core
    restart: unless-stopped
    environment:
      - LIFEOS_ENV=${LIFEOS_ENV:-production}
      - LIFEOS_VERSION=${LIFEOS_VERSION:?LIFEOS_VERSION must be derived from config/release.json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CLOUD_SYNC_ENDPOINT=${CLOUD_SYNC_ENDPOINT}
    volumes:
      - lifeos-data:/app/data
      - lifeos-logs:/app/logs
    networks:
      - lifeos-network
    healthcheck:
      test: ["CMD", "python3", "-c", "from life_kernel.core import LifeKernel; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "lifeos.service=core"
      - "lifeos.version=${LIFEOS_VERSION:?LIFEOS_VERSION must be derived from config/release.json}"

  # ─── Observability: Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: lifeos-prometheus
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - lifeos-network
    labels:
      - "lifeos.service=monitoring"

  # ─── Observability: Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: lifeos-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-lifeos_admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - lifeos-network
    depends_on:
      - prometheus
    labels:
      - "lifeos.service=monitoring"

  # ─── Log Aggregation: Loki ────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: lifeos-loki
    restart: unless-stopped
    volumes:
      - ./deploy/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - lifeos-network
    labels:
      - "lifeos.service=logging"

  # ─── Log Shipper: Promtail ────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: lifeos-promtail
    restart: unless-stopped
    volumes:
      - ./deploy/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - lifeos-logs:/var/log/lifeos:ro
    networks:
      - lifeos-network
    depends_on:
      - loki
    labels:
      - "lifeos.service=logging"

# ─── Volumes ────────────────────────────────────────────────────────────────
volumes:
  lifeos-data:
    driver: local
  lifeos-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

# ─── Networks ───────────────────────────────────────────────────────────────
networks:
  lifeos-network:
    driver: bridge
    name: lifeos-network
